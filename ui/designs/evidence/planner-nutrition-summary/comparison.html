<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Planner nutrition summary before / after</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; background: #eef2f6; color: #17202a; font: 14px/1.45 system-ui, sans-serif; }
      main { width: min(1720px, 100%); margin: 0 auto; padding: 28px; }
      h1 { margin: 0 0 8px; font-size: 24px; }
      .note { margin: 0 0 24px; color: #52606d; }
      .pair { margin-top: 24px; border: 1px solid #d8dee6; border-radius: 14px; background: #fff; padding: 18px; }
      .pair h2 { margin: 0 0 14px; font-size: 18px; }
      .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; align-items: start; }
      figure { margin: 0; min-width: 0; }
      figcaption { margin-bottom: 8px; font-weight: 700; }
      img { display: block; max-width: 100%; height: auto; border: 1px solid #cad2dc; background: #fff; }
      .mobile img { width: auto; max-height: 844px; }
      .desktop img { width: 100%; }
    </style>
  </head>
  <body>
    <main>
      <h1>계획 영양 Stage 4 — before / after</h1>
      <p class="note">같은 fixture, 날짜, viewport로 캡처했습니다. Before는 master 기준이며 After는 영양 요약과 고정 CTA를 포함합니다.</p>

      <section class="pair mobile">
        <h2>PLANNER_WEEK · 390×844</h2>
        <div class="grid">
          <figure><figcaption>Before</figcaption><img src="before/PLANNER_WEEK-390.png" alt="PLANNER_WEEK 390 before" /></figure>
          <figure><figcaption>After</figcaption><img src="after/PLANNER_WEEK-390.png" alt="PLANNER_WEEK 390 after" /></figure>
        </div>
      </section>
      <section class="pair mobile">
        <h2>PLANNER_WEEK · 320×568</h2>
        <div class="grid">
          <figure><figcaption>Before</figcaption><img src="before/PLANNER_WEEK-320.png" alt="PLANNER_WEEK 320 before" /></figure>
          <figure><figcaption>After</figcaption><img src="after/PLANNER_WEEK-320.png" alt="PLANNER_WEEK 320 after" /></figure>
        </div>
      </section>
      <section class="pair desktop">
        <h2>PLANNER_WEEK · desktop 1280×900</h2>
        <div class="grid">
          <figure><figcaption>Before</figcaption><img src="before/PLANNER_WEEK-desktop-1280.png" alt="PLANNER_WEEK desktop before" /></figure>
          <figure><figcaption>After</figcaption><img src="after/PLANNER_WEEK-desktop-1280.png" alt="PLANNER_WEEK desktop after" /></figure>
        </div>
      </section>
      <section class="pair mobile">
        <h2>MEAL_SCREEN · 390×844</h2>
        <div class="grid">
          <figure><figcaption>Before</figcaption><img src="before/MEAL_SCREEN-390.png" alt="MEAL_SCREEN 390 before" /></figure>
          <figure><figcaption>After</figcaption><img src="after/MEAL_SCREEN-390.png" alt="MEAL_SCREEN 390 after" /></figure>
        </div>
      </section>
      <section class="pair mobile">
        <h2>MEAL_SCREEN · 320×568</h2>
        <div class="grid">
          <figure><figcaption>Before</figcaption><img src="before/MEAL_SCREEN-320.png" alt="MEAL_SCREEN 320 before" /></figure>
          <figure><figcaption>After</figcaption><img src="after/MEAL_SCREEN-320.png" alt="MEAL_SCREEN 320 after" /></figure>
        </div>
      </section>
      <section class="pair desktop">
        <h2>MEAL_SCREEN · desktop 1280×900</h2>
        <div class="grid">
          <figure><figcaption>Before</figcaption><img src="before/MEAL_SCREEN-desktop-1280.png" alt="MEAL_SCREEN desktop before" /></figure>
          <figure><figcaption>After</figcaption><img src="after/MEAL_SCREEN-desktop-1280.png" alt="MEAL_SCREEN desktop after" /></figure>
        </div>
      </section>
    </main>
  </body>
</html>
