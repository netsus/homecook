// P2 вҖ” PantryAdd
function DesktopPantryAddDialog({ pantry, onClose, onAddItem, onOpenBundle }) {
  const [query, setQuery] = dUseState('');
  const [activeCat, setActiveCat] = dUseState('м „мІҙ');
  const [picked, setPicked] = dUseState(new Set());
  const ownedNames = new Set(Object.values(pantry || {}).filter(item => item.have).map(item => item.name));
  const categories = ['м „мІҙ', ...PANTRY_CATEGORIES];
  const filtered = PANTRY_ADD_ITEMS.filter(item => {
    if (activeCat !== 'м „мІҙ' && item.section !== activeCat) return false;
    if (query.trim() && !item.name.includes(query.trim())) return false;
    return true;
  });
  const togglePick = (name) => setPicked(prev => {
    if (ownedNames.has(name)) return prev;
    const next = new Set(prev);
    next.has(name) ? next.delete(name) : next.add(name);
    return next;
  });
  const pickedItems = PANTRY_ADD_ITEMS.filter(item => picked.has(item.name));
  return (
    <DskOverlay onClose={onClose} width={620}>
      <DskDialogHeader title="мһ¬лЈҢ м¶”к°Җ" onClose={onClose} />
      <div style={{ padding: '18px 22px', overflowY: 'auto' }}>
        <input value={query} onChange={e => setQuery(e.target.value)} autoFocus
          placeholder="мһ¬лЈҢ кІҖмғү" style={{ ...dskInputStyle, background: T.surfaceFill, marginBottom: 10 }} />
        <div style={{ display: 'flex', gap: 8, overflowX: 'auto', marginBottom: 16 }}>
          {categories.map(cat => (
            <button key={cat} onClick={() => setActiveCat(cat)} style={{
              flexShrink: 0, padding: '8px 14px', borderRadius: 9999,
              border: activeCat === cat ? `1.5px solid ${T.mint}` : `1px solid ${T.border}`,
              background: activeCat === cat ? T.mintSoft : '#fff',
              color: activeCat === cat ? T.mintDeep : T.text2,
              fontSize: 12, fontWeight: 800, cursor: 'pointer',
            }}>{cat}</button>
          ))}
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8 }}>
          {filtered.map(item => {
            const on = picked.has(item.name);
            const owned = ownedNames.has(item.name);
            return (
              <button key={item.name} disabled={owned} onClick={() => togglePick(item.name)} style={{
                display: 'flex', alignItems: 'center', gap: 8, minHeight: 54,
                padding: '10px 12px', borderRadius: 12,
                border: on ? `1.5px solid ${T.mint}` : `1px solid ${T.border}`,
                background: owned ? T.surfaceFill : on ? T.mintSoft : '#fff',
                cursor: owned ? 'not-allowed' : 'pointer', opacity: owned ? 0.55 : 1,
                textAlign: 'left',
              }}>
                <span style={{ width: 30, height: 30, borderRadius: 10, background: T.surfaceFill,
                  display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18 }}>{item.image}</span>
                <span style={{ flex: 1, fontSize: 13, color: T.ink, fontWeight: 800 }}>{item.name}</span>
                {owned && <span style={{ fontSize: 10, color: T.text3, fontWeight: 800 }}>ліҙмң мӨ‘</span>}
                {on && Icon.check(T.mintDeep, 16)}
              </button>
            );
          })}
        </div>
        {filtered.length === 0 && (
          <div style={{ padding: 34, textAlign: 'center', color: T.text3, fontSize: 13 }}>кІҖмғү кІ°кіјк°Җ м—Ҷм–ҙмҡ”</div>
        )}
        <button onClick={onOpenBundle} style={{
          marginTop: 14, width: '100%', borderRadius: 10, border: `1px solid ${T.border}`,
          background: '#fff', color: T.text2, padding: '11px 14px',
          fontSize: 13, fontWeight: 800, cursor: 'pointer',
        }}>л¬¶мқҢ м¶”к°Җ</button>
      </div>
      <DskDialogFooter>
        <button onClick={onClose} style={dskGhostBtn}>м·ЁмҶҢ</button>
        <button disabled={picked.size === 0} onClick={() => onAddItem?.(pickedItems)} style={{
          ...dskPrimaryBtn, opacity: picked.size ? 1 : 0.5, cursor: picked.size ? 'pointer' : 'default',
        }}>{picked.size > 0 ? `${picked.size}к°ң м¶”к°Җ` : 'мһ¬лЈҢ м„ нғқ'}</button>
      </DskDialogFooter>
    </DskOverlay>
  );
}

// P2 вҖ” PantryMatchPicker
function DesktopPantryMatchPickerDialog({ pantry, slotLabel, onClose, onPick }) {
  const haveSet = new Set(Object.values(pantry || {}).filter(v => v.have).map(v => v.name));
  const ranked = dUseMemo(() => RECIPES.map(r => {
    const need = r.ingredients.length || 1;
    const matched = r.ingredients.filter(i => haveSet.has(i.name)).length;
    return { r, score: Math.round((matched / need) * 100), matched, need };

  return (
    <DskOverlay onClose={onClose} width={620}>
      <DskDialogHeader
        title="нҢ¬нҠёлҰ¬ л§Өм№ӯ"

const { useState: useState_X, useMemo: useMemo_X } = React;

// Utility вҖ” collect aggregated ingredients across selected planner slots
function aggregateIngredients(planner, selection, pantry) {
  const map = new Map();
  selection.forEach(({ date, slot, mealIndex }) => {
    const slotMeals = mealItems(planner[date]?.[slot]);
    const targets = mealIndex == null ? slotMeals : [slotMeals[mealIndex]].filter(Boolean);
    targets.forEach((meal) => {
      const recipe = RECIPES.find(r => r.id === meal.recipeId);
      if (!recipe) return;
      recipe.ingredients.forEach(ing => {
        const key = ing.name;
        const have = Object.values(pantry || {}).some(p => p.name === ing.name && p.have);
        if (!map.has(key)) {
          map.set(key, { name: ing.name, qty: ing.qty, section: ing.section, have, fromMeals: [] });
        }
        map.get(key).fromMeals.push(`${date} ${slot} В· ${recipe.name}`);
      });
    });
  });
  return [...map.values()];
}

function ShoppingCreateScreen({ planner, pantry, presetDate, presetSlot, presetMealIndex, onBack, onComplete, showToast }) {

  const excludedItems = items.filter(it => (it.have && !reviewRestored.has(it.name)) || reviewExcluded.has(it.name));
  const sectionsMap = buyItems.reduce((acc, it) => {
    (acc[it.section] = acc[it.section] || []).push(it); return acc;

  const shoppingListTitle = singleMealMode ? `${presetDate} ${presetSlot} мқҢмӢқ мһҘліҙкё°` : '2026.05.10 В· мһҘліҙкё° лӘ©лЎқ';
  const progress = buyItems.length ? Math.round([...checked].filter(k => buyItems.find(n => n.name === k)).length / buyItems.length * 100) : 0;
  const completeCurrentShopping = () => {
    const skipNames = new Set(excludedItems.map(i => i.name));
    const currentItems = items.map(i => {
      const isHave = skipNames.has(i.name);
      return {
        ...i,
        have: isHave,
        checked: isHave ? false : true,

    onComplete?.({
      id: 'sl_' + Date.now(),
      name: shoppingListTitle,
      createdAt: '2026-05-10',
      status: 'active',

    });

    setChecked(c => {
      const n = new Set(c);
      n.has(name) ? n.delete(name) : n.add(name);
      return n;
    });
  };
  const moveToExcluded = (name) => {
    setReviewExcluded(s => {
      const n = new Set(s);
      n.add(name);
      return n;
    });
    setReviewRestored(s => {
      const n = new Set(s);
      n.delete(name);
      return n;
    });
    setChecked(c => {
      const n = new Set(c);
      n.delete(name);
      return n;
    });
  };
  const restoreToBuy = (name) => {
    setReviewExcluded(s => {
      const n = new Set(s);

          dayKeys.forEach(d => {
            ['м•„м№Ё','м җмӢ¬','м Җл…Ғ'].forEach(s => {
              mealItems(planner[d]?.[s]).forEach((m, mealIndex) => {
                if (m.status !== 'cooked') meals.push({ date: d, slot: s, meal: m, mealIndex });
              });
            });
          });
          if (meals.length === 0 && label === 'мҳӨлҠҳ') {
            return (
              <div key={label} style={{ marginBottom: 24 }}>
                <div style={{ fontSize: 14, fontWeight: 700, color: T.ink, marginBottom: 10 }}>{label}</div>
                <div style={{ background: '#fff', border: `1px solid ${T.border}`, borderRadius: 12, padding: 24, textAlign: 'center' }}>
                  <div style={{ fontSize: 36, marginBottom: 6 }}>вңЁ</div>
                  <div style={{ fontSize: 14, color: T.text2, fontWeight: 600 }}>мҳӨлҠҳ мҡ”лҰ¬н•  лҒјлӢҲк°Җ м—Ҷм–ҙмҡ”</div>
                  <div style={{ fontSize: 12, color: T.text3, marginTop: 4 }}>н”Ңлһҳл„Ҳм—җм„ң мӢқлӢЁмқ„ л“ұлЎқн•ҙ ліҙм„ёмҡ”</div>
                </div>
              </div>
            );
          }
          if (meals.length === 0) return null;

          return (
            <div key={label} style={{ marginBottom: 24 }}>
              <div style={{ fontSize: 14, fontWeight: 700, color: T.ink, marginBottom: 10 }}>
                {label} <span style={{ color: T.text3, fontWeight: 500 }}>В· {meals.length}лҒј</span>
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                {meals.map(({ date, slot, meal, mealIndex }) => {
                  const recipe = RECIPES.find(r => r.id === meal.recipeId);
                  if (!recipe) return null;
                  const m = METHOD_COLORS[recipe.method] || METHOD_COLORS.prep;
                  return (
                    <div key={`${date}-${slot}-${mealIndex}`} style={{
                      background: '#fff', borderRadius: 12, overflow: 'hidden',
                      border: `1px solid ${T.border}`,
                      borderLeft: `4px solid ${m.border}`,
                    }}>
                      <div style={{ display: 'flex', padding: 14, gap: 12, alignItems: 'center' }}
                        onClick={() => onOpenMeal(date, slot)}>
                        <div style={{
                          width: 64, height: 64, borderRadius: 10, background: recipe.bg,
                          display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 36,
                        }}>{recipe.emoji}</div>
                        <div style={{ flex: 1 }}>
                          <div style={{ display: 'flex', gap: 6, alignItems: 'center', marginBottom: 4 }}>
                            <span style={{ fontSize: 11, fontWeight: 700, color: m.text, background: m.bg, padding: '2px 6px', borderRadius: 4 }}>
                              {m.label}
                            </span>
                            <StatusPill status={meal.status} />
                          </div>
                          <div style={{ fontSize: 15, fontWeight: 700, color: T.ink, marginBottom: 2 }}>
                            {recipe.name}
                          </div>
                          <div style={{ fontSize: 11, color: T.text3 }}>
                            {date} {slot} #{mealIndex + 1} В· {meal.servings}мқёл¶„ В· {recipe.minutes}л¶„
                          </div>
                        </div>
                      </div>
                      <div style={{ padding: '0 14px 14px' }}>
                        <Button full onClick={() => onStartCook(date, slot, mealIndex)}>
                          рҹҚі мҡ”лҰ¬ мӢңмһ‘
                        </Button>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// мҡ”лҰ¬н•ҳкё° м§„н–ү нҺҳмқҙм§Җ
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function CookRunScreen({ date, slot, mealIndex = 0, recipeId, planner, onBack, onComplete, showToast }) {
  const meal = date && slot ? mealItems(planner[date]?.[slot])[mealIndex] : null;
  const recipe = RECIPES.find(r => r.id === (recipeId || meal?.recipeId));
  const independentCook = !!recipeId && !meal;
  const [showConsumed, setShowConsumed] = useState_X(false);
  const [confirmCancel, setConfirmCancel] = useState_X(false);
  if (!recipe) return <div style={{ padding: 40 }}>л ҲмӢңн”јлҘј м°ҫмқ„ мҲҳ м—Ҷм–ҙмҡ”</div>;

  return (
    <div style={{ background: '#0E1014', minHeight: '100%', color: '#fff', display: 'flex', flexDirection: 'column', paddingBottom: 96 }}>
      {/* Top bar */}
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '52px 16px 14px',
      }}>
        <button onClick={() => setConfirmCancel(true)} style={{ ...iconBtn, background: 'rgba(255,255,255,0.1)' }}>{Icon.chevL('#fff')}</button>
        <div style={{ textAlign: 'center' }}>
          <div style={{ fontSize: 11, opacity: 0.65, fontWeight: 700, marginBottom: 2 }}>
            {independentCook ? 'мҡ”лҰ¬ лӘЁл“ң В· лҸ…лҰҪ мҡ”лҰ¬' : `мҡ”лҰ¬ лӘЁл“ң В· ${date} ${slot}`}
          </div>
          <div style={{ fontSize: 17, opacity: 0.95, fontWeight: 900, fontFamily: T.fontBrand }}>{recipe.name}</div>
          <div style={{ fontSize: 13, fontWeight: 700, fontFamily: T.fontBrand }}>
            {recipe.steps.length}лӢЁкі„
          </div>
        </div>
        <div style={{ width: 36 }} />
      </div>

      {/* All steps вҖ” scrollable */}
      <div style={{ flex: 1, overflowY: 'auto', padding: '0 16px 16px' }}>
        {recipe.steps.map((step, i) => {
          const m = METHOD_COLORS[step.method] || METHOD_COLORS.prep;
          return (
            <div key={i} style={{
              background: m.bg, borderRadius: 16, padding: 20, marginBottom: 12,
              color: '#1a1a2e', borderLeft: `5px solid ${m.border}`,
            }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
                <span style={{
                  fontSize: 11, fontWeight: 800, color: '#fff', background: m.border,
                  padding: '3px 10px', borderRadius: 9999,
                }}>STEP {i + 1}</span>
                <span style={{
                  fontSize: 11, fontWeight: 700, color: m.text, background: '#fff',
                  padding: '3px 8px', borderRadius: 9999,
                }}>{m.label}</span>
              </div>
              <div style={{ fontSize: 18, fontWeight: 800, color: '#1a1a2e', marginBottom: 8, fontFamily: T.fontBrand }}>
                {step.title}
              </div>
              <div style={{ fontSize: 15, color: '#1a1a2e', lineHeight: 1.6 }}>{step.body}</div>
            </div>
          );
        })}
      </div>

      {/* Bottom controls: м·ЁмҶҢ + мҡ”лҰ¬мҷ„лЈҢ */}
      <div style={{
        position: 'sticky', bottom: 80, zIndex: 45,
        padding: '12px 16px 18px', display: 'flex', gap: 8, alignItems: 'center',
        background: 'linear-gradient(180deg, transparent, rgba(0,0,0,0.5))',
      }}>
        <button onClick={() => setConfirmCancel(true)} style={{
          background: 'rgba(255,255,255,0.12)', color: '#fff', border: 'none',
          height: 56, padding: '0 20px', borderRadius: 12, fontSize: 14, fontWeight: 700,
          cursor: 'pointer',
        }}>м·ЁмҶҢ</button>
        <button onClick={() => setShowConsumed(true)} style={{
          flex: 1, background: T.mint, color: '#fff', border: 'none',
          height: 56, borderRadius: 12, fontSize: 16, fontWeight: 800, cursor: 'pointer',
          fontFamily: T.fontBrand, letterSpacing: 0.5,
        }}>мҡ”лҰ¬ мҷ„лЈҢ</button>
      </div>

      {showConsumed && (
        <ConsumedIngredientSheet recipe={recipe}
          onClose={() => setShowConsumed(false)}
          onConfirm={(picked) => {
            setShowConsumed(false);
            if (independentCook) {
              showToast?.('рҹҺү мҡ”лҰ¬ мҷ„лЈҢ!');
              onBack();
            } else {
              onComplete(date, slot, picked, mealIndex);
            }
          }} />
      )}
      {confirmCancel && (
        <ConfirmDialog title="мҡ”лҰ¬лҘј м·ЁмҶҢн• к№Ңмҡ”?"
          body="м§„н–ү мӨ‘мқё мҡ”лҰ¬ кё°лЎқмқҙ мӮ¬лқјм ёмҡ”."
          destructive confirmLabel="м·ЁмҶҢн•ҳкё°" cancelLabel="кі„мҶҚн•ҳкё°"
          onClose={() => setConfirmCancel(false)}
          onConfirm={() => { setConfirmCancel(false); onBack(); }} />
      )}
    </div>
  );
}

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// н”Ңлһҳл„Ҳ лҒјлӢҲ мғҒм„ё
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const servingMiniBtn = {
  width: 28, height: 28, borderRadius: 14, border: 'none',
  background: '#fff', color: T.text2, fontSize: 16, fontWeight: 800, cursor: 'pointer',
};
const mealActionBtn = {
  padding: '10px 8px', borderRadius: 10, border: `1px solid ${T.border}`,
  background: '#fff', color: T.text2, fontSize: 12, fontWeight: 800, cursor: 'pointer',
};
function MealDetailScreen({ date, slot, planner, onBack, onOpenRecipe, onStartCook, onCreateShopping, onChangeStatus, onRemove, onChangeServings }) {
  const meals = mealItems(planner[date]?.[slot]);
  const [askDelete, setAskDelete] = useState_X(null);
  if (meals.length === 0) return <div style={{ padding: 40 }}>лҒјлӢҲлҘј м°ҫмқ„ мҲҳ м—Ҷм–ҙмҡ”</div>;

  /* в”Җв”Җв”Җ Unified card renderer в”Җв”Җв”Җ */
  const MealCard = ({ meal, mealIndex }) => {
    const recipe = RECIPES.find(r => r.id === meal.recipeId);
    if (!recipe) return null;
    return (
      <div style={{
        background: '#fff', border: `1px solid ${T.border}`, borderRadius: 14,
        overflow: 'hidden', boxShadow: T.shadowNatural, position: 'relative',
      }}>
        {/* Trash icon вҖ” top-right */}
        <button aria-label="мӮӯм ң" onClick={() => setAskDelete({ index: mealIndex, recipe })} style={{
          position: 'absolute', top: 12, right: 12, zIndex: 1,
          width: 32, height: 32, borderRadius: 16, border: 'none',
          background: T.surfaceFill, cursor: 'pointer',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>{Icon.trash(T.text3, 16)}</button>

        <div style={{ display: 'flex', gap: 12, padding: 14 }}>
          <div style={{
            width: 76, height: 76, borderRadius: 12, background: recipe.bg,
            display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 40,
            flexShrink: 0,
          }}>{recipe.emoji}</div>
          <div style={{ flex: 1, minWidth: 0, paddingRight: 28 }}>
            <button onClick={() => onOpenRecipe(recipe.id)} style={{
              background: 'none', border: 'none', padding: 0, cursor: 'pointer', textAlign: 'left',
            }}>
              <div style={{ fontSize: 16, fontWeight: 800, color: T.ink, marginBottom: 3 }}>
                {recipe.name}
              </div>
            </button>
            <div style={{ fontSize: 12, color: T.text3, marginBottom: 6 }}>
              {recipe.minutes}л¶„ В· {meal.servings}мқёл¶„
            </div>
          </div>
        </div>

        <div style={{ padding: '0 14px 14px' }}>
          {/* Servings stepper */}
          <div style={{
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            padding: 10, background: T.surfaceFill, borderRadius: 10, marginBottom: 10,
          }}>
            <span style={{ fontSize: 12, fontWeight: 800, color: T.text2 }}>кі„нҡҚ мқёл¶„</span>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <button onClick={() => onChangeServings(date, slot, Math.max(1, meal.servings - 1), mealIndex)} style={servingMiniBtn}>вҲ’</button>
              <span style={{ fontSize: 16, fontWeight: 800, color: T.ink, minWidth: 42, textAlign: 'center' }}>{meal.servings}мқёл¶„</span>
              <button onClick={() => onChangeServings(date, slot, Math.min(12, meal.servings + 1), mealIndex)} style={{ ...servingMiniBtn, background: T.mint, color: '#fff' }}>+</button>
            </div>
          </div>

          {/* Ingredient chips */}
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 5, marginBottom: 12 }}>
            {recipe.ingredients.slice(0, 5).map(ing => (
              <span key={ing.name} style={{ fontSize: 11, color: T.text2, background: T.surfaceFill, padding: '5px 8px', borderRadius: 9999 }}>
                {ing.name}
              </span>
            ))}
            {recipe.ingredients.length > 5 && (
              <span style={{ fontSize: 11, color: T.text3, padding: '5px 2px' }}>+{recipe.ingredients.length - 5}</span>
            )}
          </div>

          {/* Actions: мһҘліҙкё° + мҡ”лҰ¬н•ҳкё° */}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
            <button onClick={() => onCreateShopping(date, slot, mealIndex)} style={mealActionBtn}>мһҘліҙкё°</button>
            <button onClick={() => onStartCook(date, slot, mealIndex)} style={{ ...mealActionBtn, background: T.mint, borderColor: T.mint, color: '#fff' }}>мҡ”лҰ¬н•ҳкё°</button>
          </div>
        </div>
      </div>
    );
  };

  const totalServings = meals.reduce((sum, meal) => sum + (meal.servings || 1), 0);

  return (
    <div style={{ background: T.surfaceFill, minHeight: '100%', paddingBottom: 56 }}>
      <AppBar title={`${slot} мқҢмӢқ ${meals.length > 1 ? meals.length + 'к°ң' : ''}`}
        left={<button onClick={onBack} style={iconBtn}>{Icon.chevL()}</button>} />

      <div style={{ background: '#fff', padding: 20, borderBottom: `1px solid ${T.border}` }}>
        <div style={{ fontSize: 12, color: T.mintDeep, fontWeight: 800, marginBottom: 4 }}>
          {date} В· {slot}
        </div>
        <div style={{ fontSize: 22, fontWeight: 800, color: T.ink, fontFamily: T.fontBrand }}>
          {meals.length > 1 ? 'н•ң лҒјм—җ м—¬лҹ¬ мқҢмӢқмқ„ к°ҷмқҙ лЁ№м–ҙмҡ”' : meals[0] && RECIPES.find(r => r.id === meals[0].recipeId)?.name}
        </div>
        <div style={{ display: 'flex', gap: 8, marginTop: 12, flexWrap: 'wrap' }}>
          <span style={{ fontSize: 12, fontWeight: 700, color: T.text2, background: T.surfaceFill, padding: '6px 10px', borderRadius: 9999 }}>
            {meals.length}к°ң мқҢмӢқ
          </span>
          <span style={{ fontSize: 12, fontWeight: 700, color: T.text2, background: T.surfaceFill, padding: '6px 10px', borderRadius: 9999 }}>
            мҙқ {totalServings}мқёл¶„ кі„нҡҚ
          </span>
        </div>
      </div>

      <div style={{ padding: 16, display: 'flex', flexDirection: 'column', gap: 12 }}>
        {meals.map((meal, mealIndex) => (
          <MealCard key={`${meal.recipeId}-${mealIndex}`} meal={meal} mealIndex={mealIndex} />
        ))}
      </div>

      {askDelete && (
        <ConfirmDialog title="мқҙ мқҢмӢқмқ„ мӮӯм ңн• к№Ңмҡ”?"
          body={`${askDelete.recipe.name} (${date} ${slot}) к°Җ мӢқлӢЁм—җм„ң м ңкұ°лҸјмҡ”.`}
          destructive confirmLabel="мӮӯм ң"
          onClose={() => setAskDelete(null)}
          onConfirm={() => { const idx = askDelete.index; setAskDelete(null); onRemove(date, slot, idx); }} />
      )}
    </div>
  );
}

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// л§ҲмқҙнҺҳмқҙм§Җ м„ёл¶Җ вҖ” м ҖмһҘ л ҲмӢңн”ј / кі„м • / м•ҢлҰј / лҸ„мӣҖл§җ
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

        ))}

    </div>

// MENU_ADD вҖ” мӢқмӮ¬ м¶”к°Җ л°©мӢқ м„ нғқ hub + 4 pickers
// host: planner slot + (presetDate, presetSlot)
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function MenuAddScreen({ presetDate, presetSlot, initialMode, planner, pantry, onBack, onPickRecipe, onGoManual, onGoYtImport, showToast }) {
  // mode: 'hub' | 'search' | 'books' | 'pantry-match'
  const [mode, setMode] = useState_W(initialMode || 'hub');
  const slotLabel = presetDate && presetSlot ? `${presetDate} ${presetSlot}` : 'н”Ңлһҳл„Ҳ';

  if (mode === 'search') {
    return <RecipeSearchPicker title="кІҖмғүмңјлЎң м¶”к°Җ" slotLabel={slotLabel}
      onBack={() => setMode('hub')} onPick={onPickRecipe} />;
  }
  if (mode === 'books') {
    return <RecipeBookSelector slotLabel={slotLabel}
      onBack={() => setMode('hub')} onPick={onPickRecipe} />;
  }
  if (mode === 'pantry-match') {
    return <PantryMatchPicker pantry={pantry} slotLabel={slotLabel}
      onBack={() => setMode('hub')} onPick={onPickRecipe} />;
  }

  const tiles = [
    { k: 'search', emoji: 'рҹ”Һ', title: 'кІҖмғүн•ҙм„ң м¶”к°Җ', sub: 'л ҲмӢңн”ј мқҙлҰ„В·мһ¬лЈҢлЎң м°ҫкё°', go: () => setMode('search') },
    { k: 'books',  emoji: 'рҹ“ҡ', title: 'л ҲмӢңн”јл¶Ғм—җм„ң м¶”к°Җ', sub: 'м ҖмһҘн•ң л ҲмӢңн”ј / лӮҙ л ҲмӢңн”ј', go: () => setMode('books') },
    { k: 'pantry', emoji: 'рҹ§Ҡ', title: 'нҢ¬нҠёлҰ¬ кё°л°ҳ м¶”мІң', sub: 'лғүмһҘкі  мһ¬лЈҢлЎң л§Ңл“Ө мҲҳ мһҲлҠ” мҡ”лҰ¬', go: () => setMode('pantry-match') },
    { k: 'manual', emoji: 'вңҸпёҸ', title: 'м§Ғм ‘ л“ұлЎқ', sub: 'мһ¬лЈҢВ·мЎ°лҰ¬лІ• м§Ғм ‘ мһ…л Ҙ', go: () => onGoManual?.(presetDate, presetSlot) },
    { k: 'yt',     emoji: 'рҹ“ә', title: 'мң нҠңлёҢм—җм„ң к°Җм ёмҳӨкё°', sub: 'URL л¶ҷм—¬л„Јкё°лЎң мһҗлҸҷ м¶”м¶ң', go: () => onGoYtImport?.(presetDate, presetSlot) },
  ];
  return (
    <div style={{ background: T.surfaceFill, minHeight: '100%' }}>
      <AppBar title="мӢқмӮ¬ м¶”к°Җ" left={<button onClick={onBack} style={iconBtn}>{Icon.chevL()}</button>} />
      <div style={{ padding: '12px 20px 4px' }}>
        <div style={{ fontSize: 11, color: T.mintDeep, fontWeight: 700 }}>лҢҖмғҒ</div>
        <div style={{ fontSize: 16, fontWeight: 700, color: T.ink, fontFamily: T.fontBrand }}>{slotLabel}</div>
      </div>
      <div style={{ padding: 16, display: 'flex', flexDirection: 'column', gap: 10 }}>
        {tiles.map(t => (
          <button key={t.k} onClick={t.go} style={{
            display: 'flex', alignItems: 'center', gap: 14, padding: 16,
            background: '#fff', border: `1px solid ${T.border}`, borderRadius: 12,
            cursor: 'pointer', textAlign: 'left',
          }}>
            <div style={{
              width: 44, height: 44, borderRadius: 12, background: T.mintSoft,
              display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22,
            }}>{t.emoji}</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 15, fontWeight: 700, color: T.ink }}>{t.title}</div>
              <div style={{ fontSize: 12, color: T.text3, marginTop: 2 }}>{t.sub}</div>
            </div>
            <span style={{ color: T.text4 }}>{Icon.chevR(T.text4)}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// RECIPE_SEARCH_PICKER (surface inside MENU_ADD)
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function RecipeSearchPicker({ title='л ҲмӢңн”ј кІҖмғү', slotLabel, onBack, onPick }) {
  const [q, setQ] = useState_W('');
  const list = useMemo_W(() => {
    const ql = q.trim();
    if (!ql) return RECIPES.slice(0, 6);
    return RECIPES.filter(r =>
      r.name.includes(ql) ||
      (r.ingredients || []).some(i => i.name.includes(ql))
    );
  }, [q]);

  return (
    <div style={{ background: T.surfaceFill, minHeight: '100%' }}>
      <AppBar title={title} left={<button onClick={onBack} style={iconBtn}>{Icon.chevL()}</button>} />
      <div style={{ padding: 16, background: '#fff', borderBottom: `1px solid ${T.border}` }}>
        <div style={{
          display: 'flex', alignItems: 'center', gap: 8,
          background: T.surfaceFill, borderRadius: 10, padding: '10px 14px',
        }}>
          {Icon.search(T.text3)}
          <input value={q} onChange={e => setQ(e.target.value)} autoFocus
            placeholder="л ҲмӢңн”ј мқҙлҰ„ лҳҗлҠ” мһ¬лЈҢ"
            style={{ border: 'none', background: 'transparent', flex: 1, fontSize: 14, outline: 'none' }} />
          {q && <button onClick={() => setQ('')} style={{ background: 'none', border: 'none', cursor: 'pointer', color: T.text3 }}>вң•</button>}
        </div>
        {slotLabel && <div style={{ marginTop: 8, fontSize: 11, color: T.text3 }}>лҢҖмғҒ В· {slotLabel}</div>}
      </div>
      <div style={{ padding: 16 }}>
        {list.length === 0 ? (
          <div style={{ textAlign: 'center', padding: 60, color: T.text3 }}>
            <div style={{ fontSize: 36, marginBottom: 6 }}>рҹӨ”</div>
            <div style={{ fontSize: 13 }}>кІҖмғү кІ°кіјк°Җ м—Ҷм–ҙмҡ”</div>
          </div>
        ) : list.map(r => (
          <button key={r.id} onClick={() => onPick(r.id)} style={{
            width: '100%', display: 'flex', alignItems: 'center', gap: 12,
            background: '#fff', border: `1px solid ${T.border}`, borderRadius: 12,
            padding: 12, marginBottom: 8, cursor: 'pointer', textAlign: 'left',
          }}>
            <div style={{
              width: 56, height: 56, borderRadius: 10, background: r.bg,
              display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 30,
            }}>{r.emoji}</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 14, fontWeight: 700, color: T.ink }}>{r.name}</div>
              <div style={{ fontSize: 11, color: T.text3, marginTop: 2 }}>
                мЎ°нҡҢ {formatMetricCount(recipeViewCount(r))} В· {r.minutes}л¶„ В· {recipeSummaryTags(r).join(' В· ')}
              </div>
            </div>
            <span style={{
              fontSize: 12, fontWeight: 700, color: T.mintDeep,
              background: T.mintSoft, padding: '6px 10px', borderRadius: 6,
            }}>м„ нғқ</span>
          </button>
        ))}
      </div>
    </div>
  );
}

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// RecipeBookSelector вҖ” мұ… м„ нғқ вҶ’ RecipeBookDetailPicker
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function RecipeBookSelector({ slotLabel, onBack, onPick }) {
  const books = [
    { id: 'b_saved', kind: 'saved', name: 'м ҖмһҘн•ң л ҲмӢңн”ј', count: 8, emoji: 'рҹ”–', desc: 'мўӢм•„мҡ”В·л¶Ғл§ҲнҒ¬н•ң л ҲмӢңн”ј лӘЁмқҢ' },
    { id: 'b_custom1', kind: 'custom', name: 'нҸүмқј м Җл…Ғ л№ лҘёмҡ”лҰ¬', count: 12, emoji: 'рҹҚі', desc: '30л¶„ мқҙлӮҙ к°„лӢЁ м Җл…Ғ л©”лүҙ' },
    { id: 'b_custom2', kind: 'custom', name: 'мЈјл§җ н•ң мғҒ м°ЁлҰј', count: 5, emoji: 'рҹҚҪпёҸ', desc: 'мЈјл§җ нҠ№лі„ мӢқмӮ¬мҡ© л ҲмӢңн”ј' },
  ];
  const [openId, setOpenId] = useState_W(null);
  if (openId) return <RecipeBookDetailPicker bookId={openId}
    book={books.find(b => b.id === openId)} slotLabel={slotLabel}
    onBack={() => setOpenId(null)} onPick={onPick} />;
  return (
    <div style={{ background: T.surfaceFill, minHeight: '100%' }}>
      <AppBar title="л ҲмӢңн”јл¶Ғм—җм„ң м¶”к°Җ" left={<button onClick={onBack} style={iconBtn}>{Icon.chevL()}</button>} />
      <div style={{ padding: 16 }}>
        {books.map(b => (
          <button key={b.id} onClick={() => setOpenId(b.id)} style={{
            width: '100%', display: 'flex', alignItems: 'center', gap: 12,
            background: '#fff', border: `1px solid ${T.border}`, borderRadius: 12,
            padding: '14px 16px', marginBottom: 8, cursor: 'pointer', textAlign: 'left',
          }}>
            <div style={{
              width: 44, height: 44, borderRadius: 10, background: T.mintSoft,
              display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 20,
            }}>{b.emoji}</div>
            <div style={{ flex: 1 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <span style={{ fontSize: 15, fontWeight: 700, color: T.ink }}>{b.name}</span>
                <span style={{
                  fontSize: 12, fontWeight: 800, color: T.mintDeep,
                }}>{b.count}к°ң</span>
              </div>
              <div style={{ fontSize: 12, color: T.text3, marginTop: 2 }}>{b.desc}</div>
            </div>
            {Icon.chevR(T.text4)}
          </button>
        ))}
      </div>
    </div>
  );
}
function RecipeBookDetailPicker({ bookId, book, slotLabel, onBack, onPick }) {
  // simulate book-specific recipes; reuse RECIPES
  const items = RECIPES.slice(0, book?.count > 6 ? 6 : (book?.count || 4));
  return (
    <div style={{ background: T.surfaceFill, minHeight: '100%' }}>
      <AppBar title={book?.name || 'л ҲмӢңн”јл¶Ғ'} left={<button onClick={onBack} style={iconBtn}>{Icon.chevL()}</button>} />
      <div style={{ padding: 12 }}>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 10 }}>
          {items.map(r => (
            <button key={r.id} onClick={() => onPick(r.id)} style={{
              background: '#fff', border: `1px solid ${T.border}`, borderRadius: 12,
              padding: 0, overflow: 'hidden', cursor: 'pointer', textAlign: 'left',
            }}>
              <div style={{
                width: '100%', aspectRatio: '4/3', background: r.bg,
                display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 50,
              }}>{r.emoji}</div>
              <div style={{ padding: 10 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: T.ink }}>{r.name}</div>
                <div style={{ fontSize: 11, color: T.text3, marginTop: 2 }}>{r.minutes}л¶„ В· {r.servings}мқёл¶„</div>
              </div>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// PantryMatchPicker вҖ” нҢ¬нҠёлҰ¬ кё°л°ҳ м¶”мІң
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function PantryMatchPicker({ pantry, slotLabel, onBack, onPick }) {
  const have = new Set(Object.values(pantry || {}).filter(p => p.have).map(p => p.name));
  const ranked = useMemo_W(() => {
    return RECIPES.map(r => {
      const ings = r.ingredients || [];
      const hit = ings.filter(i => have.has(i.name)).length;
      const ratio = ings.length ? hit / ings.length : 0;
      return { r, hit, total: ings.length, ratio, missing: ings.filter(i => !have.has(i.name)).map(i => i.name) };
    }).sort((a, b) => b.ratio - a.ratio);
  }, [pantry]);

  return (
    <div style={{ background: T.surfaceFill, minHeight: '100%' }}>
      <AppBar title="нҢ¬нҠёлҰ¬ кё°л°ҳ м¶”мІң" left={<button onClick={onBack} style={iconBtn}>{Icon.chevL()}</button>} />
      <div style={{ padding: '14px 16px', background: T.mintSoft, borderBottom: `1px solid ${T.border}` }}>
        <div style={{ fontSize: 12, color: T.mintDeep, fontWeight: 700, lineHeight: 1.5 }}>
          нҢ¬нҠёлҰ¬м—җ мһҲлҠ” мһ¬лЈҢлЎң л§Ңл“Ө мҲҳ мһҲлҠ” мҡ”лҰ¬л¶Җн„° ліҙм—¬л“ңл Өмҡ”. л¶ҖмЎұн•ң мһ¬лЈҢлҠ” мһҘліҙкё° лӘ©лЎқмңјлЎң лӘЁм•„ліҙм„ёмҡ”.
        </div>
      </div>
      <div style={{ padding: 12 }}>
        {ranked.map(({ r, hit, total, ratio, missing }) => (
          <button key={r.id} onClick={() => onPick(r.id)} style={{
            width: '100%', display: 'flex', gap: 12, padding: 12,
            background: '#fff', border: `1px solid ${T.border}`, borderRadius: 12,
            marginBottom: 8, cursor: 'pointer', textAlign: 'left',
          }}>
            <div style={{
              width: 64, height: 64, borderRadius: 10, background: r.bg,
              display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 32,
            }}>{r.emoji}</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 14, fontWeight: 700, color: T.ink }}>{r.name}</div>
              <MatchProgressBar score={ratio * 100} sub={`${hit}/${total}к°ң ліҙмң `} style={{ marginTop: 7 }} />
              {missing.length > 0 && (
                <div style={{ fontSize: 11, color: T.text3, marginTop: 6, lineHeight: 1.4 }}>
                  л¶ҖмЎұ В· {missing.slice(0, 3).join(', ')}{missing.length > 3 ? ` мҷё ${missing.length-3}` : ''}
                </div>
              )}
            </div>
          </button>
        ))}
      </div>
    </div>
  );
}

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// LEFTOVERS вҖ” лӮЁмқҖмҡ”лҰ¬ кҙҖлҰ¬
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function LeftoversScreen({ planner, onBack, onReuse, onGoAteList, onMarkAte, onMarkPartial, showToast }) {
  // Derived: meals with status === 'cooked' but not consumed
  const days = Object.keys(planner);
  const items = [];
  days.forEach(d => {
    ['м•„м№Ё','м җмӢ¬','м Җл…Ғ'].forEach(s => {
      mealItems(planner[d]?.[s]).forEach((m, mealIndex) => {
        if (m?.status === 'cooked' && !m.ateAt) items.push({ date: d, slot: s, meal: m, mealIndex });
      });
    });
  });

  return (
    <div style={{ background: T.surfaceFill, minHeight: '100%', paddingBottom: 40 }}>
      <AppBar title="лӮЁмқҖмҡ”лҰ¬" left={<button onClick={onBack} style={iconBtn}>{Icon.chevL()}</button>}
        right={<button onClick={onGoAteList} style={mealSwitchBtn}>лӢӨлЁ№мқҖ мҡ”лҰ¬</button>} />
      <div style={{ padding: '14px 16px', background: '#fff', borderBottom: `1px solid ${T.border}` }}>
        <div style={{ fontSize: 18, fontWeight: 700, color: T.ink, fontFamily: T.fontBrand }}>
          {items.length === 0 ? 'лӮЁмқҖ мҡ”лҰ¬к°Җ м—Ҷм–ҙмҡ”' : `лӮЁмқҖ мҡ”лҰ¬ ${items.length}к°ң`}
        </div>
        <div style={{ fontSize: 12, color: T.text3, marginTop: 4 }}>
          мҡ”лҰ¬н•ң лҒјлӢҲлҘј лӢӨмӢң н”Ңлһҳл„Ҳм—җ мҳ¬лҰ¬кұ°лӮҳ лӢӨ лЁ№мқҖ кІғмңјлЎң м •лҰ¬н•  мҲҳ мһҲм–ҙмҡ”.
        </div>
      </div>
      {items.length === 0 ? (
        <div style={{ padding: 40, textAlign: 'center' }}>
          <div style={{ fontSize: 44, marginBottom: 8 }}>рҹҚұ</div>
          <div style={{ fontSize: 13, color: T.text3 }}>мҡ”лҰ¬лҘј л§Ҳм№ҳл©ҙ м—¬кё°м—җ лӘЁм—¬мҡ”</div>
        </div>
      ) : (
        <div style={{ padding: 16 }}>
          {items.map(({ date, slot, meal, mealIndex }) => {
            const r = RECIPES.find(x => x.id === meal.recipeId);
            if (!r) return null;
            return (
              <div key={`${date}-${slot}-${mealIndex}`} style={{
                background: '#fff', borderRadius: 12, marginBottom: 10,
                border: `1px solid ${T.border}`, overflow: 'hidden',
              }}>
                <div style={{ display: 'flex', padding: 14, gap: 12, alignItems: 'center' }}>
                  <div style={{
                    width: 56, height: 56, borderRadius: 10, background: r.bg,
                    display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 30,
                  }}>{r.emoji}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 14, fontWeight: 700, color: T.ink }}>{r.name}</div>
                    <div style={{ fontSize: 11, color: T.text3, marginTop: 2 }}>
                      {date} {slot} {meal.servings}мқёл¶„
                    </div>
                  </div>
                </div>
                <div style={{ display: 'flex', gap: 6, padding: '0 12px 12px' }}>
                  <button onClick={() => onReuse(date, slot, mealIndex)} style={smallSecBtn}>рҹ”Ғ н”Ңлһҳл„Ҳм—җ м¶”к°Җ</button>
                  <button onClick={() => onMarkAte(date, slot, mealIndex)} style={{
                    ...smallSecBtn, background: T.mint, color: '#fff', border: 'none', flex: 1,
                  }}>вң“ лӢӨлЁ№мқҢ</button>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// ATE_LIST вҖ” лӢӨлЁ№мқҖ нһҲмҠӨнҶ лҰ¬
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function AteListScreen({ planner, onBack, onGoLeftovers, onUndoAte, onRecreate }) {
  const days = Object.keys(planner);
  const items = [];
  days.forEach(d => {
    ['м•„м№Ё','м җмӢ¬','м Җл…Ғ'].forEach(s => {
      mealItems(planner[d]?.[s]).forEach((m, mealIndex) => {
        if (m?.ateAt) items.push({ date: d, slot: s, meal: m, mealIndex });
      });
    });
  });
  return (
    <div style={{ background: T.surfaceFill, minHeight: '100%' }}>
      <AppBar title="лӢӨлЁ№мқҖ мҡ”лҰ¬" left={<button onClick={onBack} style={iconBtn}>{Icon.chevL()}</button>}
        right={<button onClick={onGoLeftovers} style={mealSwitchBtn}>лӮЁмқҖ мҡ”лҰ¬</button>} />
      <div style={{ padding: 16 }}>
        {items.length === 0 ? (
          <div style={{ background: '#fff', borderRadius: 12, padding: 40, textAlign: 'center' }}>
            <div style={{ fontSize: 36, marginBottom: 8 }}>рҹ“’</div>
            <div style={{ fontSize: 13, color: T.text3 }}>м•„м§Ғ лӢӨлЁ№мқҖ мҡ”лҰ¬к°Җ м—Ҷм–ҙмҡ”</div>
          </div>
        ) : items.map(({ date, slot, meal, mealIndex }) => {
          const r = RECIPES.find(x => x.id === meal.recipeId);
          if (!r) return null;
          return (
            <div key={`${date}-${slot}-${mealIndex}`} style={{
              background: '#fff', borderRadius: 12, marginBottom: 10,
              border: `1px solid ${T.border}`, padding: 14,
              display: 'flex', alignItems: 'center', gap: 12,
            }}>
              <div style={{
                width: 48, height: 48, borderRadius: 10, background: r.bg,
                display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 24,
              }}>{r.emoji}</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 14, fontWeight: 700, color: T.ink }}>{r.name}</div>
	                <div style={{ fontSize: 11, color: T.text3, marginTop: 2 }}>
	                  {date} {slot} {meal.servings}мқёл¶„
	                </div>
              </div>
              <button onClick={() => onUndoAte(date, slot, mealIndex)} style={smallSecBtn}>лӮЁмқҖ мҡ”лҰ¬лЎң</button>
              <button onClick={() => onRecreate(meal.recipeId)} style={{ ...smallSecBtn, color: T.mintDeep, border: `1px solid ${T.mint}` }}>лӢӨмӢң л§Ңл“Өкё°</button>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// MANUAL_RECIPE_CREATE вҖ” м§Ғм ‘ л“ұлЎқ
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function ManualRecipeCreateScreen({ presetDate, presetSlot, onBack, onCreated, showToast }) {
  const [name, setName] = useState_W('');
  const [minutes, setMinutes] = useState_W(20);
  const [servings, setServings] = useState_W(2);
  const [ings, setIngs] = useState_W([]);
  const [steps, setSteps] = useState_W([{ method: 'prep', text: '' }]);
  const [ingModal, setIngModal] = useState_W(false);
  const ingredientsComplete = ings.length > 0 && ings.every(i => i.name && String(i.amount || '').trim());
  const stepsComplete = steps.length > 0 && steps.every(s => s.text.trim());
  const valid = name.trim() && ingredientsComplete && stepsComplete;
  const methods = Object.keys(METHOD_COLORS);
  const warnNumericOnly = () => showToast?.('мһ¬лЈҢ мҲҳлҹүмқҖ мҲ«мһҗл§Ң мһ…л Ҙн•  мҲҳ мһҲм–ҙмҡ”');
  const blockNonNumericInput = (e) => {
    const text = e.data ?? e.clipboardData?.getData('text') ?? '';
    if (text && /[^0-9]/.test(text)) {
      e.preventDefault();
      warnNumericOnly();
    }
  };
  const setIngredientAmount = (idx, value) => {
    if (/[^0-9]/.test(value)) warnNumericOnly();
    const amount = value.replace(/[^0-9]/g, '');
    setIngs(ings.map((x, j) => j === idx ? { ...x, amount } : x));
  };

  const submit = () => {
    if (!valid) {
      showToast?.('мһ¬лЈҢ мҲҳлҹүкіј мЎ°лҰ¬лІ• л№Ҳм№ёмқ„ мұ„мӣҢмЈјм„ёмҡ”');
      return;
    }
    const id = 'r_manual_' + Date.now();
    onCreated({
      id, name: name.trim(), minutes, servings,
      bg: T.mintSoft, emoji: 'рҹҚі', rating: 0, saves: 0, kcal: 0,
      tags: ['м§Ғм ‘ л“ұлЎқ'], method: 'prep',
      ingredients: ings.map(i => ({ name: i.name, qty: (i.amount || '') + (i.unit || 'g'), section: i.category || 'м§Ғм ‘ мһ…л Ҙ' })),
      steps: steps.filter(s => s.text.trim()).map((s, i) => ({ method: s.method, title: `Step ${i+1}`, body: s.text, minutes: 2, text: s.text, time: 'м•Ҫ 2л¶„' })),
    }, presetDate, presetSlot);
  };

  return (
    <div style={{ background: T.surfaceFill, minHeight: '100%', paddingBottom: 120 }}>
      <AppBar title="м§Ғм ‘ л“ұлЎқ" left={<button onClick={onBack} style={iconBtn}>{Icon.chevL()}</button>} />
      {/* кё°ліё м •ліҙ */}
      <Section title="кё°ліё м •ліҙ">
        <Field label="мҡ”лҰ¬ мқҙлҰ„">
          <input value={name} onChange={e => setName(e.target.value)} placeholder="мҳҲ: к№Җм№ҳм°Ңк°ң" style={inp} />
        </Field>
        <div style={{ display: 'flex', gap: 8 }}>
          <Field label="мЎ°лҰ¬ мӢңк°„(л¶„)" style={{ flex: 1 }}>
            <input type="number" value={minutes} onChange={e => setMinutes(+e.target.value || 0)} style={inp} />
          </Field>
          <Field label="кё°мӨҖ мқёл¶„" style={{ flex: 1 }}>
            <input type="number" value={servings} onChange={e => setServings(+e.target.value || 1)} style={inp} />
          </Field>
        </div>
      </Section>

      {/* мһ¬лЈҢ */}
      <Section title="мһ¬лЈҢ" right={
        <span style={{ fontSize: 12, color: T.text3 }}>{ings.length}к°ң м„ нғқлҗЁ</span>
      }>
        {ings.length > 0 && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 10 }}>
            {ings.map((it, i) => (
              <div key={it.name} style={{
                display: 'grid', gridTemplateColumns: '1fr 72px 88px 28px',
                gap: 8, alignItems: 'center',
                background: '#fff', border: `1px solid ${T.border}`,
                borderRadius: 10, padding: 10,
              }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: T.ink }}>{it.name}</div>
                <input type="text" inputMode="numeric" pattern="[0-9]*" value={it.amount || ''}
                  onBeforeInput={blockNonNumericInput}
                  onPaste={blockNonNumericInput}
                  onChange={e => setIngredientAmount(i, e.target.value)}
                  placeholder="м–‘" style={{ ...inp, padding: '7px 8px', textAlign: 'center' }} />
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 4 }}>
                  {['g', 'ml'].map(unit => (
                    <button key={unit} onClick={() => setIngs(ings.map((x, j) => j === i ? { ...x, unit } : x))} style={{
                      border: `1px solid ${it.unit === unit ? T.mint : T.border}`,
                      background: it.unit === unit ? T.mintSoft : '#fff',
                      color: it.unit === unit ? T.mintDeep : T.text2,
                      borderRadius: 7, padding: '7px 0', fontSize: 12, fontWeight: 800, cursor: 'pointer',
                    }}>{unit}</button>
                  ))}
                </div>
                <button onClick={() => setIngs(ings.filter((_, j) => j !== i))} style={{
                  background: T.surfaceFill, border: 'none', color: T.text3,
                  borderRadius: 7, fontSize: 16, cursor: 'pointer', height: 28,
                }}>Г—</button>
              </div>
            ))}
          </div>
        )}
        <button onClick={() => setIngModal(true)} style={{
          width: '100%', padding: '12px 16px', borderRadius: 10,
          border: `1.5px dashed ${T.mint}`, background: T.mintSoft,
          color: T.mintDeep, fontSize: 13, fontWeight: 700, cursor: 'pointer',
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
        }}>+ мһ¬лЈҢ м¶”к°Җн•ҳкё°</button>
        {/* CONTRACT_CHECK: POST /ingredients/search вҖ” vNextм—җм„ңлҠ” UI shapeл§Ң */}
      </Section>

      {/* мЎ°лҰ¬лІ• */}
      <Section title="мЎ°лҰ¬лІ•" right={
        <button onClick={() => setSteps([...steps, { method: 'prep', text: '' }])} style={addLinkBtn}>+ лӢЁкі„</button>
      }>
        {steps.map((s, i) => (
          <div key={i} style={{
            background: T.surfaceFill, borderRadius: 10, padding: 12, marginBottom: 8,
            borderLeft: `4px solid ${METHOD_COLORS[s.method].border}`,
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
              <span style={{ fontSize: 12, fontWeight: 700, color: T.text3 }}>STEP {i+1}</span>
              <select value={s.method} onChange={e => setSteps(steps.map((x, j) => j === i ? { ...x, method: e.target.value } : x))}
                style={{
                  fontSize: 11, fontWeight: 700, padding: '4px 8px', borderRadius: 6,
                  border: `1px solid ${METHOD_COLORS[s.method].border}`,
                  background: METHOD_COLORS[s.method].bg, color: METHOD_COLORS[s.method].text,
                }}>
                {methods.map(m => <option key={m} value={m}>{METHOD_COLORS[m].label}</option>)}
              </select>
              {steps.length > 1 && (
                <button onClick={() => setSteps(steps.filter((_, j) => j !== i))}
                  style={{ marginLeft: 'auto', ...removeBtn }}>вҲ’</button>
              )}
            </div>
            <textarea value={s.text} onChange={e => setSteps(steps.map((x, j) => j === i ? { ...x, text: e.target.value } : x))}
              rows={2} placeholder="мқҙ лӢЁкі„м—җм„ң л¬ҙм—Үмқ„ н•ҳлӮҳмҡ”?"
              style={{ ...inp, width: '100%', resize: 'none', minHeight: 56 }} />
          </div>
        ))}
      </Section>

      <div style={{
        position: 'sticky', bottom: 0, left: 0, right: 0, padding: 16,
        background: '#fff', borderTop: `1px solid ${T.border}`,
      }}>
        <Button full disabled={!valid} onClick={submit}>мҷ„лЈҢ</Button>
      </div>

      {ingModal && <IngredientPickerModal
        selected={ings}
        onConfirm={(picked) => { setIngs(picked); setIngModal(false); }}
        onClose={() => setIngModal(false)} />}
    </div>
  );
}

/* в”Җв”Җв”Җ Ingredient Picker Modal в”Җв”Җв”Җ */
function IngredientPickerModal({ selected, onConfirm, onClose }) {
  const categories = ['мұ„мҶҢ', 'мңЎлҘҳ', 'н•ҙмӮ°л¬ј', 'м–‘л…җ', 'мң м ңн’Ҳ', 'кіЎл¬ј'];
  const DEMO_INGS = {
    'мұ„мҶҢ': ['м–‘нҢҢ', 'лҢҖнҢҢ', 'л§ҲлҠҳ', 'к°җмһҗ', 'лӢ№к·ј', 'л°°м¶”', 'мӢңкёҲм№ҳ', 'м• нҳёл°•', 'кі м¶”', 'к№»мһҺ'],
    'мңЎлҘҳ': ['лҸјм§Җкі кё°', 'мҶҢкі кё°', 'лӢӯкі кё°', 'мӮјкІ№мӮҙ', 'лӘ©мӮҙ', 'м•ҲмӢ¬', 'лӢӨм§җмңЎ'],
    'н•ҙмӮ°л¬ј': ['мғҲмҡ°', 'мЎ°к°ң', 'мҳӨм§•м–ҙ', 'л©ём№ҳ', 'м°ём№ҳ', 'м—°м–ҙ', 'лҜём—ӯ'],
    'м–‘л…җ': ['к°„мһҘ', 'кі м¶”мһҘ', 'лҗңмһҘ', 'мҶҢкёҲ', 'м„Өнғ•', 'м°ёкё°лҰ„', 'мӢқмҡ©мң ', 'нӣ„м¶”', 'кі м¶§к°ҖлЈЁ'],
    'мң м ңн’Ҳ': ['мҡ°мң ', 'лІ„н„°', 'м№ҳмҰҲ', 'мғқнҒ¬лҰј', 'мҡ”кұ°нҠё'],
    'кіЎл¬ј': ['мҢҖ', 'л°Җк°ҖлЈЁ', 'лӢ№л©ҙ', 'л‘җл¶Җ', 'кі„лһҖ', 'л№өк°ҖлЈЁ'],
  };

  const [search, setSearch] = useState_W('');
  const [activeCat, setActiveCat] = useState_W('мұ„мҶҢ');
  const [picks, setPicks] = useState_W(selected.map(s => ({ ...s })));

  const isSelected = (name) => picks.some(p => p.name === name);
  const toggle = (ingName) => {
    if (isSelected(ingName)) {
      setPicks(picks.filter(p => p.name !== ingName));
    } else {
      setPicks([...picks, { name: ingName, amount: '', unit: 'g', category: activeCat }]);
    }
  };

  const filtered = search.trim()
    ? Object.values(DEMO_INGS).flat().filter(n => n.includes(search.trim()))
    : (DEMO_INGS[activeCat] || []);

  return (
    <div style={{
      position: 'fixed', inset: 0, zIndex: 9000,
      background: 'rgba(0,0,0,0.35)', display: 'flex', alignItems: 'flex-end',
      justifyContent: 'center', padding: '0 16px 12px',
    }} onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div style={{
        width: '100%', maxWidth: 420, maxHeight: '85vh', background: '#fff',
        borderRadius: 20, display: 'flex', flexDirection: 'column',
        overflow: 'hidden',
      }}>
        {/* Header */}
        <div style={{ padding: '16px 20px 12px', borderBottom: `1px solid ${T.border}` }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
            <span style={{ fontSize: 17, fontWeight: 800, color: T.ink }}>мһ¬лЈҢ м„ нғқ</span>
            <button onClick={onClose} style={{ background: 'none', border: 'none', fontSize: 22, color: T.text3, cursor: 'pointer' }}>Г—</button>
          </div>
          <input autoFocus value={search} onChange={e => setSearch(e.target.value)}
            placeholder="мһ¬лЈҢ кІҖмғү..."
            style={{ ...inp, background: T.surfaceFill }} />
        </div>

        {/* Category chips */}
        {!search.trim() && (
          <div style={{ padding: '10px 20px 6px' }}>
            <div style={{ fontSize: 11, fontWeight: 800, color: T.text3, marginBottom: 8 }}>м№ҙн…Ңкі лҰ¬</div>
            <div style={{ display: 'flex', gap: 6, overflowX: 'auto' }}>
            {categories.map(cat => (
              <button key={cat} onClick={() => setActiveCat(cat)} style={{
                padding: '8px 13px', borderRadius: 8, whiteSpace: 'nowrap',
                border: activeCat === cat ? `1.5px solid ${T.mintDeep}` : '1px solid transparent',
                background: activeCat === cat ? T.mint : T.surfaceFill,
                color: activeCat === cat ? '#fff' : T.text2,
                fontSize: 12, fontWeight: 800, cursor: 'pointer', flexShrink: 0,
              }}>{cat}</button>
            ))}
            </div>
          </div>
        )}

        {/* Ingredient grid */}
        <div style={{ flex: 1, overflowY: 'auto', padding: '10px 20px' }}>
          <div style={{ fontSize: 11, fontWeight: 800, color: T.text3, marginBottom: 8 }}>
            мһ¬лЈҢ м„ нғқ
          </div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
            {filtered.map(ingName => {
              const sel = isSelected(ingName);
              return (
                <button key={ingName} onClick={() => toggle(ingName)} style={{
                  padding: '8px 14px', borderRadius: 9999,
                  border: sel ? `1.5px solid ${T.mint}` : `1px solid ${T.border}`,
                  background: sel ? T.mintSoft : '#fff',
                  color: sel ? T.mintDeep : T.ink,
                  fontSize: 13, fontWeight: sel ? 700 : 500, cursor: 'pointer',
                }}>{sel && 'вң“ '}{ingName}</button>
              );
            })}
          </div>
        </div>

        {/* Selected items вҖ” м–‘ мһ…л ҘмқҖ м§Ғм ‘ л“ұлЎқ мһ¬лЈҢ нҷ”л©ҙм—җм„ң мІҳлҰ¬ */}
        {picks.length > 0 && (
          <div style={{ padding: '10px 20px', borderTop: `1px solid ${T.border}`, maxHeight: 150, overflowY: 'auto' }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: T.text3, marginBottom: 8 }}>
              м„ нғқлҗң мһ¬лЈҢ ({picks.length}к°ң)
            </div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {picks.map(p => (
                <button key={p.name} onClick={() => toggle(p.name)} style={{
                  display: 'inline-flex', alignItems: 'center', gap: 5,
                  padding: '6px 10px', borderRadius: 9999,
                  border: `1px solid ${T.mint}`, background: T.mintSoft,
                  color: T.mintDeep, fontSize: 12, fontWeight: 800, cursor: 'pointer',
                }}>
                  {p.name}<span style={{ color: T.text3 }}>Г—</span>
                </button>
              ))}
            </div>
          </div>
        )}

        {/* Footer */}
        <div style={{ padding: '12px 20px 16px', borderTop: `1px solid ${T.border}` }}>
          <Button full onClick={() => onConfirm(picks)}>
