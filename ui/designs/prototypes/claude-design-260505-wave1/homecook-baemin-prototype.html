// YT_IMPORT вҖ” URL мһ…л Ҙ вҶ’ loading вҶ’ review/edit вҶ’ л“ұлЎқ мҷ„лЈҢ
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function YtImportScreen({ presetDate, presetSlot, onBack, onCreated, onAddPlanner, showToast }) {
  // step: 'input' | 'loading' | 'error' | 'review'
  const [step, setStep] = useState_W('input');
  const [url, setUrl] = useState_W('');
  const [draft, setDraft] = useState_W(null);
  const validUrl = /youtu(\.be|be\.com)/i.test(url) || /^https?:\/\//.test(url);

  const startExtract = () => {
    if (!validUrl) return;
    setStep('loading');
    setTimeout(() => {
      // simulate: error 10% chance
      if (url.includes('fail')) { setStep('error'); return; }
      setDraft({
        name: 'л°ұмў…мӣҗ к№Җм№ҳм°Ңк°ң',
        thumbnail: 'рҹҘҳ',
        bg: '#FFE9E0',
        minutes: 25,
        servings: 2,
        channel: 'л°ұмў…мӣҗмқҳ мҡ”лҰ¬л№„мұ…',
        ingredients: [
          { name: 'к№Җм№ҳ', qty: '300g', section: 'лғүмһҘ' },
          { name: 'лҸјм§Җкі кё°', qty: '200g', section: 'лғүмһҘ' },
          { name: 'л‘җл¶Җ', qty: '1/2лӘЁ', section: 'лғүмһҘ' },
          { name: 'лҢҖнҢҢ', qty: '1лҢҖ', section: 'лғүмһҘ' },
        ],
        steps: [
          { method: 'prep', text: 'к№Җм№ҳлҠ” н•ңмһ… нҒ¬кё°лЎң мһҗлҘҙкі , лҸјм§Җкі кё°лҠ” к№Қл‘‘мҚ°кё° н•ңлӢӨ.' },
          { method: 'stirfry', text: 'лғ„л№„м—җ лҸјм§Җкі кё°мҷҖ к№Җм№ҳлҘј л„Јкі  5л¶„к°„ лі¶лҠ”лӢӨ.' },
          { method: 'boil', text: 'л¬ј 500mlлҘј л¶“кі  лҒ“мқё л’Ө л‘җл¶ҖмҷҖ лҢҖнҢҢлҘј л„ЈлҠ”лӢӨ.' },
        ],
      });
      setStep('review');
    }, 1400);
  };

  if (step === 'input' || step === 'error') {
    return (
      <div style={{ background: T.surfaceFill, minHeight: '100%' }}>
        <AppBar title="мң нҠңлёҢм—җм„ң к°Җм ёмҳӨкё°" left={<button onClick={onBack} style={iconBtn}>{Icon.chevL()}</button>} />
        <div style={{ padding: 24 }}>
          <div style={{ fontSize: 18, fontWeight: 700, color: T.ink, fontFamily: T.fontBrand, marginBottom: 6 }}>
            мң нҠңлёҢ мҳҒмғҒ URLмқ„ л¶ҷм—¬л„Јм–ҙ мЈјм„ёмҡ”
          </div>
          <div style={{ fontSize: 12, color: T.text3, lineHeight: 1.55, marginBottom: 16 }}>
            мҳҒмғҒ м„ӨлӘ…м—җм„ң мһ¬лЈҢмҷҖ мЎ°лҰ¬лІ•мқ„ мһҗлҸҷмңјлЎң м¶”м¶ңн•ҙмҡ”. м¶”м¶ң нӣ„ м§Ғм ‘ лӢӨл“¬мқ„ мҲҳ мһҲм–ҙмҡ”.
          </div>
          <input value={url} onChange={e => setUrl(e.target.value)}
            placeholder="https://youtu.be/..." style={inp} />
          {step === 'error' && (
            <div style={{
              marginTop: 12, padding: 12, background: '#FFF5F5',
              border: `1px solid ${T.red}`, borderRadius: 10, fontSize: 12, color: T.red,
            }}>
              вҡ  мҳҒмғҒм—җм„ң л ҲмӢңн”јлҘј м¶”м¶ңн•ҳм§Җ лӘ»н–Ҳм–ҙмҡ”. URLмқ„ лӢӨмӢң нҷ•мқён•ҳкұ°лӮҳ м§Ғм ‘ л“ұлЎқн•ҙ мЈјм„ёмҡ”.
            </div>
          )}
          <div style={{ marginTop: 16, padding: 14, background: '#fff', borderRadius: 10, border: `1px solid ${T.border}` }}>
            <div style={{ fontSize: 12, color: T.text3, fontWeight: 700, marginBottom: 6 }}>мқҙлҹ° мҳҒмғҒмқ„ к°Җм ёмҳ¬ мҲҳ мһҲм–ҙмҡ”</div>
            <ul style={{ margin: 0, paddingLeft: 18, fontSize: 12, color: T.text2, lineHeight: 1.7 }}>
              <li>м„ӨлӘ…м—җ мһ¬лЈҢ лӘ©лЎқмқҙ мһҲлҠ” мҳҒмғҒ</li>
              <li>10л¶„ мқҙлӮҙмқҳ м§§мқҖ мҡ”лҰ¬ мҳҒмғҒ</li>
              <li>н•ңкөӯм–ҙ мұ„л„җ (лІ нғҖ)</li>
            </ul>
          </div>
          <div style={{ marginTop: 24 }}>
            <Button full disabled={!validUrl} onClick={startExtract}>к°Җм ёмҳӨкё°</Button>
          </div>
        </div>
      </div>
    );
  }

  if (step === 'loading') {
    return (
      <div style={{ background: T.surfaceFill, minHeight: '100%' }}>
        <AppBar title="к°Җм ёмҳӨлҠ” мӨ‘" left={<button onClick={() => setStep('input')} style={iconBtn}>{Icon.chevL()}</button>} />
        <div style={{ padding: 60, textAlign: 'center' }}>
          <div style={{ fontSize: 56, marginBottom: 14, animation: 'pulse 1.2s infinite' }}>рҹ“ә</div>
          <div style={{ fontSize: 16, fontWeight: 700, color: T.ink, fontFamily: T.fontBrand }}>л ҲмӢңн”јлҘј к°Җм ёмҳӨкі  мһҲм–ҙмҡ”вҖҰ</div>
          <div style={{ fontSize: 12, color: T.text3, marginTop: 8 }}>мөңлҢҖ 30мҙҲ м •лҸ„ кұёл Өмҡ”</div>
          <style>{`@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }`}</style>
        </div>
      </div>
    );
  }

  // review
  const setField = (k, v) => setDraft(d => ({ ...d, [k]: v }));
  const setIng = (i, k, v) => setDraft(d => ({ ...d, ingredients: d.ingredients.map((x, j) => j === i ? { ...x, [k]: v } : x) }));
  const setStep_ = (i, k, v) => setDraft(d => ({ ...d, steps: d.steps.map((x, j) => j === i ? { ...x, [k]: v } : x) }));
  const submit = () => {
    const id = 'r_yt_' + Date.now();
    onCreated({
      id, name: draft.name, bg: draft.bg, emoji: draft.thumbnail,
      minutes: draft.minutes, servings: draft.servings,
      rating: 0, saves: 0, kcal: 0, tags: ['мң нҠңлёҢ'],
      method: draft.steps[0]?.method || 'prep',
      ingredients: draft.ingredients,
      steps: draft.steps.map((s, i) => ({ method: s.method, title: `Step ${i+1}`, body: s.text, minutes: 2, text: s.text, time: 'м•Ҫ 2л¶„' })),
    }, presetDate, presetSlot);
  };

  return (
    <div style={{ background: T.surfaceFill, minHeight: '100%', paddingBottom: 100 }}>
      <AppBar title="м¶”м¶ң кІ°кіј нҷ•мқё" left={<button onClick={() => setStep('input')} style={iconBtn}>{Icon.chevL()}</button>} />
      <div style={{ background: '#fff', padding: 16, display: 'flex', gap: 12, alignItems: 'center', borderBottom: `1px solid ${T.border}` }}>
        <div style={{ width: 60, height: 60, borderRadius: 10, background: draft.bg, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 32 }}>
          {draft.thumbnail}
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 11, color: T.text3 }}>{draft.channel}</div>
          <input value={draft.name} onChange={e => setField('name', e.target.value)}
            style={{ ...inp, padding: '4px 0', border: 'none', fontSize: 16, fontWeight: 700 }} />
        </div>
      </div>
      <div style={{ display: 'flex', gap: 0, background: '#fff', padding: '8px 16px', borderBottom: `1px solid ${T.border}` }}>
        <Field label="мЎ°лҰ¬ мӢңк°„(л¶„)" style={{ flex: 1, marginRight: 8 }}>
          <input type="number" value={draft.minutes} onChange={e => setField('minutes', +e.target.value || 0)} style={inp} />
        </Field>
        <Field label="кё°мӨҖ мқёл¶„" style={{ flex: 1 }}>
          <input type="number" value={draft.servings} onChange={e => setField('servings', +e.target.value || 1)} style={inp} />
        </Field>
      </div>

      <Section title={`мһ¬лЈҢ В· ${draft.ingredients.length}к°ң`}>
        {draft.ingredients.map((it, i) => (
          <div key={i} style={{ display: 'flex', gap: 8, marginBottom: 8 }}>
            <input value={it.name} onChange={e => setIng(i, 'name', e.target.value)} style={{ ...inp, flex: 1.4 }} />
            <input value={it.qty} onChange={e => setIng(i, 'qty', e.target.value)} style={{ ...inp, flex: 1 }} />
          </div>
        ))}
      </Section>

      <Section title={`мЎ°лҰ¬лІ• В· ${draft.steps.length}лӢЁкі„`}>
        {draft.steps.map((s, i) => (
          <div key={i} style={{
            background: T.surfaceFill, borderRadius: 10, padding: 12, marginBottom: 8,
            borderLeft: `4px solid ${METHOD_COLORS[s.method].border}`,
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
              <span style={{ fontSize: 11, fontWeight: 700, color: T.text3 }}>STEP {i+1}</span>
              <select value={s.method} onChange={e => setStep_(i, 'method', e.target.value)}
                style={{
                  fontSize: 11, fontWeight: 700, padding: '4px 8px', borderRadius: 6,
                  border: `1px solid ${METHOD_COLORS[s.method].border}`,
                  background: METHOD_COLORS[s.method].bg, color: METHOD_COLORS[s.method].text,
                }}>
                {Object.keys(METHOD_COLORS).map(m => <option key={m} value={m}>{METHOD_COLORS[m].label}</option>)}
              </select>
            </div>
            <textarea value={s.text} onChange={e => setStep_(i, 'text', e.target.value)} rows={2}
              style={{ ...inp, width: '100%', resize: 'none', minHeight: 56 }} />
          </div>
        ))}
      </Section>

      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, padding: 16,
        background: '#fff', borderTop: `1px solid ${T.border}`,
      }}>
        <Button full onClick={submit}>л“ұлЎқн•ҳкі  лӢӨмқҢ лӢЁкі„ вҶ’</Button>
      </div>
    </div>
  );
}

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// SHOPPING_DETAIL вҖ” read-only мһ¬м—ҙлһҢ + pantry-excluded section + reflect
// list: { id, name, items: [{ name, qty, section, fromMeals[], have, checked? }],
//         status: 'active' | 'completed', completedAt?, pantryReflect? }
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function ShoppingDetailScreen({ list, onBack, onToggleItem, onComplete, onReopen, showToast }) {
  if (!list) return <div style={{ padding: 40 }}>мһҘліҙкё° лӘ©лЎқмқ„ м°ҫмқ„ мҲҳ м—Ҷм–ҙмҡ”</div>;
  const completed = list.status === 'completed';

  // group: мӮ¬м•ј н•Ё / нҢ¬нҠёлҰ¬м—җ мқҙлҜё мһҲмқҢ
  const [localSkipRevived, setLocalSkipRevived] = useState_W(new Set());
  const [localBuyExcluded, setLocalBuyExcluded] = useState_W(new Set());
  const buy = list.items.filter(i => !i.have || localSkipRevived.has(i.name)).filter(i => !localBuyExcluded.has(i.name));
  const skip = list.items.filter(i => (i.have && !localSkipRevived.has(i.name)) || localBuyExcluded.has(i.name));
  const checkedCount = buy.filter(i => i.checked).length;
  const allDone = buy.length > 0 && checkedCount === buy.length;
  const sectionsMap = buy.reduce((acc, it) => {
    (acc[it.section] = acc[it.section] || []).push(it); return acc;
  }, {});
  const completeCurrentShopping = () => {
    const skipNames = new Set(skip.map(i => i.name));
    const currentItems = list.items.map(i => {
      const isHave = skipNames.has(i.name);
      return { ...i, have: isHave, checked: isHave ? false : i.checked };
    });
    onComplete({ ...list, items: currentItems });
  };

  const createdDate = list.createdAt || '2026-04-20';

  return (
    <div style={{ background: T.surfaceFill, minHeight: '100%', paddingBottom: 210 }}>
      <AppBar title={list.name} left={<button onClick={onBack} style={iconBtn}>{Icon.chevL()}</button>}
        right={<div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <button aria-label="кіөмң " onClick={() => showToast('кіөмң  л§ҒнҒ¬к°Җ ліөмӮ¬лҗҗм–ҙмҡ”')} style={{
            ...iconBtn, background: T.surfaceFill,
          }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={T.text2} strokeWidth="2" strokeLinecap="round">
              <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/>
            </svg>
          </button>
        </div>} />

      {/* м§„н–ү мғҒнғң + list name/date */}
      <div style={{ background: '#fff', padding: 20, borderBottom: `1px solid ${T.border}` }}>
        <div style={{ fontSize: 11, color: T.text3, marginBottom: 6 }}>
          {createdDate} мғқм„ұ
        </div>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
          <div>
            <div style={{ fontSize: 12, color: T.text3 }}>
              {completed ? `${list.completedAt || 'мҷ„лЈҢлҗЁ'}` : `мӮ¬м•ј н•  мһ¬лЈҢ ${buy.length - checkedCount}к°ң`}
            </div>
            <div style={{ fontSize: 18, fontWeight: 700, color: T.ink, fontFamily: T.fontBrand, marginTop: 2 }}>
              {completed ? 'мһҘліҙкё° мҷ„лЈҢ' : (allDone ? 'лӘЁл‘җ лӢҙм•ҳм–ҙмҡ”!' : 'мһҘліҙкё° м§„н–ү мӨ‘')}
            </div>
          </div>
          {!completed && (
            <div style={{ fontSize: 28, fontWeight: 800, color: T.mint, fontFamily: T.fontBrand }}>
              {Math.round((checkedCount / Math.max(1, buy.length)) * 100)}%
            </div>
          )}
        </div>
        {!completed && (
          <div style={{ height: 6, background: T.surfaceSubtle, borderRadius: 3, marginTop: 12, overflow: 'hidden' }}>
            <div style={{ width: `${(checkedCount / Math.max(1, buy.length)) * 100}%`, height: '100%', background: T.mint }} />
          </div>
        )}
      </div>

      {/* мӮ¬м•ј н•Ё */}
      <div style={{ padding: 16 }}>
        {Object.entries(sectionsMap).map(([sec, list2]) => (
          <div key={sec} style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 12, color: T.text3, fontWeight: 700, marginBottom: 8 }}>
              {sec} <span style={{ color: T.text4 }}>В· {list2.length}</span>
            </div>
            <div style={{ background: '#fff', borderRadius: 12, overflow: 'hidden', border: `1px solid ${T.border}` }}>
              {list2.map((it, i) => (
                <div key={it.name} style={{
                  display: 'flex', alignItems: 'center', gap: 12,
                  padding: '14px 16px',
                  borderBottom: i < list2.length - 1 ? `1px solid ${T.surfaceSubtle}` : 'none',
                }}>
                  <button disabled={completed} onClick={() => onToggleItem(it.name)} style={{
                    flex: 1, display: 'flex', alignItems: 'center', gap: 12,
                    border: 'none', background: 'none',
                    cursor: completed ? 'default' : 'pointer', textAlign: 'left',
                    opacity: completed ? 0.7 : 1, padding: 0,
                  }}>
                    <div style={{
                      width: 22, height: 22, borderRadius: 11,
                      background: it.checked ? T.mint : '#fff',
                      border: `1.5px solid ${it.checked ? T.mint : T.border}`,
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                    }}>{it.checked && Icon.check('#fff')}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{
                        fontSize: 15, fontWeight: 600, color: T.ink,
                        textDecoration: it.checked ? 'line-through' : 'none',
                      }}>{it.name}</div>
                      <div style={{ fontSize: 11, color: T.text3, marginTop: 2 }}>
                        {it.qty} В· {(it.fromMeals || []).length}лҒјм—җ мӮ¬мҡ©
                      </div>
                    </div>
                  </button>
                  {!completed && (
                    <button onClick={() => {
                      setLocalBuyExcluded(s => { const n = new Set(s); n.add(it.name); return n; });
                      setLocalSkipRevived(s => { const n = new Set(s); n.delete(it.name); return n; });
                      showToast(`${it.name} вҶ’ мқҙлҜё мһҲмқҢ мІҳлҰ¬`);
                      /* CONTRACT_CHECK: PATCH /shopping-lists/:id/items/:name {have:true} вҖ” vNextм—җм„ңлҠ” UI shapeл§Ң */
                    }} style={{
                      padding: '5px 10px', borderRadius: 8, border: `1px solid ${T.border}`,
                      background: '#fff', color: T.text2, fontSize: 11, fontWeight: 700,
                      cursor: 'pointer', whiteSpace: 'nowrap', flexShrink: 0,
                    }}>мқҙлҜёмһҲмқҢ</button>
                  )}
                </div>
              ))}
            </div>
          </div>
        ))}

        {/* нҢ¬нҠёлҰ¬ м ңмҷё м„№м…ҳ вҖ” full card rows */}
        {skip.length > 0 && (
          <div style={{ marginTop: 6 }}>
            <div style={{ fontSize: 12, color: T.text3, fontWeight: 700, marginBottom: 8 }}>
              нҢ¬нҠёлҰ¬м—җ мқҙлҜё мһҲм–ҙ м ңмҷё <span style={{ color: T.text4 }}>В· {skip.length}</span>
            </div>
            <div style={{ background: '#fff', borderRadius: 12, overflow: 'hidden', border: `1px solid ${T.border}` }}>
              {skip.map((it, i) => (
                <div key={it.name} style={{
                  display: 'flex', alignItems: 'center', gap: 12,
                  padding: '14px 16px',
                  borderBottom: i < skip.length - 1 ? `1px solid ${T.surfaceSubtle}` : 'none',
                }}>
                  <div style={{
                    width: 22, height: 22, borderRadius: 11,
                    background: T.mintSoft, border: `1.5px solid ${T.mint}`,
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                  }}>{Icon.check(T.mintDeep)}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 15, fontWeight: 600, color: T.text3 }}>{it.name}</div>
                    <div style={{ fontSize: 11, color: T.text4, marginTop: 2 }}>{it.qty}</div>
                  </div>
                  {!completed && (
                    <button onClick={() => {
                      if (it.have) setLocalSkipRevived(s => { const n = new Set(s); n.add(it.name); return n; });
                      setLocalBuyExcluded(s => { const n = new Set(s); n.delete(it.name); return n; });
                      showToast(`${it.name} вҶ’ мһҘліҙкё° лӘ©лЎқмңјлЎң ліөмӣҗ`);
                      /* CONTRACT_CHECK: PATCH /shopping-lists/:id/items/:name {have:false} вҖ” vNextм—җм„ңлҠ” UI shapeл§Ң */
                    }} style={{
                      padding: '5px 10px', borderRadius: 8, border: `1px solid ${T.mint}`,
                      background: T.mintSoft, color: T.mintDeep, fontSize: 11, fontWeight: 700,
                      cursor: 'pointer', whiteSpace: 'nowrap', flexShrink: 0,
                    }}>лҗҳмӮҙлҰ¬кё°</button>
                  )}
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* CTA */}
      <div style={{
        position: 'absolute', bottom: 80, left: 0, right: 0, padding: 16,
        background: '#fff', borderTop: `1px solid ${T.border}`, display: 'flex', gap: 8, zIndex: 45,
      }}>
        {completed ? (
          <>
            <Button full variant="neutral" disabled>мҷ„лЈҢлҗң мһҘліҙкё°</Button>
          </>
        ) : (
          <Button full disabled={buy.length === 0} onClick={completeCurrentShopping}>
            мһҘліҙкё° мҷ„лЈҢ
          </Button>
        )}
      </div>
    </div>
  );
}

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// PantryReflectPicker вҖ” null / [] / selected ids мқҳлҜё л¶„лҰ¬
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function PantryReflectPicker({ list, onClose, onConfirm }) {
  // mode: null = лҜём„ нғқ(м•„м§Ғ кІ°м • м•Ҳ н•Ё), [] = лӘ…мӢңм Ғ кұ°м Ҳ, [ids] = м„ нғқ
  const buy = list?.items?.filter(i => !i.have && i.checked) || [];
  const [picked, setPicked] = useState_W(new Set(buy.map(i => i.name)));
  const togglePick = (name) => {
    setPicked(p => {
      const n = new Set(p);
      n.has(name) ? n.delete(name) : n.add(name);
      return n;
    });
  };
  return (
    <div style={overlay} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{
        background: '#fff', borderRadius: '20px 20px 0 0',
        position: 'absolute', bottom: 0, left: 0, right: 0,
        maxHeight: '85%', display: 'flex', flexDirection: 'column',
      }}>
        <div style={{ padding: '18px 20px 12px', borderBottom: `1px solid ${T.border}` }}>
          <div style={{ fontSize: 18, fontWeight: 700, color: T.ink, fontFamily: T.fontBrand }}>
            нҢ¬нҠёлҰ¬м—җ л°ҳмҳҒн• к№Ңмҡ”?
          </div>
          <div style={{ fontSize: 12, color: T.text3, marginTop: 4, lineHeight: 1.5 }}>
            мһҘ ліё мһ¬лЈҢ мӨ‘ нҢ¬нҠёлҰ¬м—җ м¶”к°Җн•  н•ӯлӘ©мқ„ м„ нғқн•ҳм„ёмҡ”. м„ нғқн•ҳм§Җ м•Ҡмңјл©ҙ л°ҳмҳҒн•ҳм§Җ м•Ҡм•„мҡ”.
          </div>
        </div>
        <div style={{ flex: 1, overflowY: 'auto', padding: 16 }}>
          {buy.length === 0 ? (
            <div style={{ padding: 24, textAlign: 'center', color: T.text3, fontSize: 13 }}>
              лӢҙмқҖ мһ¬лЈҢк°Җ м—Ҷм–ҙмҡ”.
            </div>
          ) : buy.map(it => {
            const on = picked.has(it.name);
            return (
              <button key={it.name} onClick={() => togglePick(it.name)} style={{
                width: '100%', display: 'flex', alignItems: 'center', gap: 12,
                padding: '12px 4px', border: 'none', background: 'none', cursor: 'pointer',
                borderBottom: `1px solid ${T.surfaceSubtle}`, textAlign: 'left',
              }}>
                <div style={{
                  width: 22, height: 22, borderRadius: 6,
                  background: on ? T.mint : '#fff',
                  border: `1.5px solid ${on ? T.mint : T.border}`,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                }}>{on && Icon.check('#fff')}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 600, color: T.ink }}>{it.name}</div>
                  <div style={{ fontSize: 11, color: T.text3 }}>{it.qty}</div>
                </div>
              </button>
            );
          })}
        </div>
        <div style={{ padding: 16, borderTop: `1px solid ${T.border}`, display: 'flex', gap: 8 }}>
          <button onClick={() => onConfirm([])} style={{
            ...smallSecBtn, padding: '12px 14px', fontSize: 13,
          }}>л°ҳмҳҒ м•Ҳ н•Ё</button>
          <Button full disabled={picked.size === 0} onClick={() => onConfirm([...picked])}>
            {picked.size}к°ң л°ҳмҳҒн•ҳкё°
          </Button>
        </div>
      </div>
    </div>
  );
}

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// SETTINGS вҖ” cook-mode prefs + planner meal columns
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function SettingsScreen({ profile, onBack, onUpdateProfile, onLogout, onDeleteAccount, showToast }) {
  const defaultPrefs = { keepAwake: true, voice: false, autoNext: false };
  const defaultMealColumns = ['м•„м№Ё', 'м җмӢ¬', 'м Җл…Ғ'];
  const [savedPrefs, setSavedPrefs] = useState_W(defaultPrefs);
  const [draftPrefs, setDraftPrefs] = useState_W(defaultPrefs);
  const [savedMealColumns, setSavedMealColumns] = useState_W(defaultMealColumns);
  const [mealColumns, setMealColumns] = useState_W(defaultMealColumns);
  const [newMealName, setNewMealName] = useState_W('');
  const prefsDirty = JSON.stringify(savedPrefs) !== JSON.stringify(draftPrefs);
  const normalizedMealColumns = mealColumns.map(name => name.trim()).filter(Boolean);
  const mealColumnsDirty = JSON.stringify(savedMealColumns) !== JSON.stringify(normalizedMealColumns);
  const mealColumnsValid = normalizedMealColumns.length === mealColumns.length && normalizedMealColumns.length > 0;
  const settingsDirty = prefsDirty || mealColumnsDirty;
  const setDraftPref = (key, value) => setDraftPrefs(prev => ({ ...prev, [key]: value }));
  const savePrefs = () => {
    if (!mealColumnsValid) {
      showToast?.('лҒјлӢҲ мқҙлҰ„мқ„ лӘЁл‘җ мһ…л Ҙн•ҙмЈјм„ёмҡ”');
      return;
    }
    setSavedPrefs(draftPrefs);
    setSavedMealColumns(normalizedMealColumns);
    setMealColumns(normalizedMealColumns);
    showToast?.('нҷҳкІҪм„Өм •мқҙ м ҖмһҘлҗҗм–ҙмҡ”');
  };
  const cancelPrefs = () => {
    setDraftPrefs(savedPrefs);
    setMealColumns(savedMealColumns);
    setNewMealName('');
    showToast?.('нҷҳкІҪм„Өм • ліҖкІҪмқ„ м·ЁмҶҢн–Ҳм–ҙмҡ”');
  };

  const addMealColumn = () => {
    const name = newMealName.trim();
    if (!name) return;
    if (mealColumns.length >= 5) {
      showToast?.('лҒјлӢҲ м»¬лҹјмқҖ мөңлҢҖ 5к°ңк№Ңм§Җ к°ҖлҠҘн•ҙмҡ”');
      return;
    }
    if (mealColumns.includes(name)) {
      showToast?.('мқҙлҜё мһҲлҠ” лҒјлӢҲмҳҲмҡ”');
      return;
    }
    setMealColumns(cols => [...cols, name]);
    setNewMealName('');
    showToast?.('лҒјлӢҲ м»¬лҹјмқҙ м¶”к°Җлҗҗм–ҙмҡ”');
  };
  const updateMealColumn = (idx, value) => {
    setMealColumns(cols => cols.map((name, i) => i === idx ? value : name));
  };
  const removeMealColumn = (idx) => {
    setMealColumns(cols => cols.filter((_, i) => i !== idx));
    showToast?.('лҒјлӢҲ м»¬лҹјмқҙ мӮӯм ңлҗҗм–ҙмҡ”');
  };

  return (
    <div style={{ background: T.surfaceFill, minHeight: '100%', paddingBottom: 96 }}>
      <AppBar title="м„Өм •" left={<button onClick={onBack} style={iconBtn}>{Icon.chevL()}</button>} />

      <Section title="мҡ”лҰ¬ лӘЁл“ң">
        <ToggleRow label="нҷ”л©ҙ мјңл‘ " sub="мҡ”лҰ¬ мӨ‘ нҷ”л©ҙмқҙ кәјм§Җм§Җ м•Ҡм•„мҡ”" on={draftPrefs.keepAwake} onChange={(v) => setDraftPref('keepAwake', v)} />
        <ToggleRow label="мқҢм„ұ м•ҲлӮҙ" sub="лӢЁкі„ мқҢм„ұмқ„ мқҪм–ҙмӨҳмҡ” (лІ нғҖ)" on={draftPrefs.voice} onChange={(v) => setDraftPref('voice', v)} />
        <ToggleRow label="нғҖмқҙлЁё лҒқлӮҳл©ҙ лӢӨмқҢ лӢЁкі„ мһҗлҸҷ" sub="" on={draftPrefs.autoNext} onChange={(v) => setDraftPref('autoNext', v)} />
      </Section>

      <Section title="н”Ңлһҳл„Ҳ лҒјлӢҲ м»¬лҹј">
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {mealColumns.map((name, idx) => (
            <div key={`${name}-${idx}`} style={{
              display: 'grid', gridTemplateColumns: '1fr auto', gap: 8, alignItems: 'center',
            }}>
              <input value={name} onChange={e => updateMealColumn(idx, e.target.value)}
                style={{ ...inp, padding: '10px 12px', fontSize: 13 }} aria-label={`лҒјлӢҲ м»¬лҹј ${idx + 1}`} />
              <button onClick={() => removeMealColumn(idx)} disabled={mealColumns.length <= 1} style={{
                width: 38, height: 38, borderRadius: 10, border: `1px solid ${T.border}`,
                background: mealColumns.length <= 1 ? T.surfaceFill : '#fff',
                color: mealColumns.length <= 1 ? T.text4 : T.red, cursor: mealColumns.length <= 1 ? 'not-allowed' : 'pointer',
                fontSize: 16, fontWeight: 800,
              }}>Г—</button>
            </div>
          ))}
          {mealColumns.length < 5 && (
            <div style={{ display: 'grid', gridTemplateColumns: '1fr auto', gap: 8, marginTop: 4 }}>
              <input value={newMealName} onChange={e => setNewMealName(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter') addMealColumn(); }}
                placeholder="мғҲ лҒјлӢҲ мқҙлҰ„"
                style={{ ...inp, padding: '10px 12px', fontSize: 13 }} />
              <button onClick={addMealColumn} style={{
                padding: '0 12px', borderRadius: 10, border: 'none',
                background: T.mint, color: '#fff', fontSize: 12, fontWeight: 800,
                cursor: 'pointer', whiteSpace: 'nowrap',
              }}>+ лҒјлӢҲ м»¬лҹј м¶”к°Җ</button>
            </div>
          )}
          <div style={{ fontSize: 11, color: mealColumns.length >= 5 ? T.red : T.text3, marginTop: 2 }}>
            {mealColumns.length}/5к°ң
          </div>
        </div>
      </Section>

      <div style={{
        display: 'flex', gap: 8, padding: '12px 16px',
        background: '#fff', borderTop: `1px solid ${T.border}`,
      }}>
        <Button variant="neutral" disabled={!settingsDirty} onClick={cancelPrefs}>м·ЁмҶҢ</Button>
        <Button full disabled={!settingsDirty || !mealColumnsValid} onClick={savePrefs}>м ҖмһҘ</Button>
      </div>
    </div>
  );
}
function Row({ left, right, compact = false }) {
  return (
    <div style={{
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      padding: compact ? '6px 0 8px' : '12px 0', borderBottom: `1px solid ${T.surfaceSubtle}`,
      gap: 12,

      {right != null && <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexShrink: 0 }}>{right}</div>}
    </div>
  );
}
function ToggleRow({ label, sub, on, onChange }) {
  return (
    <Row left={<div>
      <div style={{ fontSize: 14, color: T.ink, fontWeight: 600 }}>{label}</div>
      {sub && <div style={{ fontSize: 11, color: T.text3, marginTop: 2 }}>{sub}</div>}

      <button onClick={() => onChange(!on)} style={{
        width: 44, height: 26, borderRadius: 13,

          transition: 'left 0.15s', boxShadow: '0 1px 3px rgba(0,0,0,0.16)',

}

function PantryAddSheet({ pantry, onClose, onAddItem, onOpenBundle }) {
  const [query, setQuery] = useState_W('');
  const [activeCat, setActiveCat] = useState_W('м „мІҙ');
  const [picked, setPicked] = useState_W(new Set());
  const ownedNames = new Set(Object.values(pantry || {}).filter(item => item.have).map(item => item.name));
  const categories = ['м „мІҙ', ...PANTRY_CATEGORIES];
  const filtered = PANTRY_ADD_ITEMS.filter(item => {
    if (activeCat !== 'м „мІҙ' && item.section !== activeCat) return false;
    if (query.trim() && !item.name.includes(query.trim())) return false;
    return true;
  });
  const togglePick = (name) => setPicked(prev => {
    if (ownedNames.has(name)) return prev;
    const next = new Set(prev);
    next.has(name) ? next.delete(name) : next.add(name);
    return next;
  });
  const pickedItems = PANTRY_ADD_ITEMS.filter(item => picked.has(item.name));
  return (
    <div style={overlay} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{
        background: '#fff', borderRadius: '20px 20px 0 0',

              мһ¬лЈҢ м¶”к°Җ
            </div>
            <button onClick={onClose} style={{ background: 'none', border: 'none', fontSize: 22, color: T.text3, cursor: 'pointer' }}>Г—</button>
          </div>
          <input value={query} onChange={e => setQuery(e.target.value)} autoFocus
            placeholder="мһ¬лЈҢ кІҖмғү" style={{ ...inp, background: T.surfaceFill }} />
          <div style={{ display: 'flex', gap: 6, overflowX: 'auto', marginTop: 10 }}>
            {categories.map(cat => (
              <button key={cat} onClick={() => setActiveCat(cat)} style={{
                flexShrink: 0, padding: '7px 13px', borderRadius: 9999,
                border: activeCat === cat ? `1.5px solid ${T.mint}` : `1px solid ${T.border}`,
                background: activeCat === cat ? T.mintSoft : '#fff',
                color: activeCat === cat ? T.mintDeep : T.text2,
                fontSize: 12, fontWeight: 800, cursor: 'pointer',
              }}>{cat}</button>
            ))}
          </div>
        </div>

        <div style={{ flex: 1, overflowY: 'auto', padding: 16 }}>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
            {filtered.map(item => {
              const on = picked.has(item.name);
              const owned = ownedNames.has(item.name);
              return (
                <button key={item.name} disabled={owned} onClick={() => togglePick(item.name)} style={{
                  display: 'flex', alignItems: 'center', gap: 9, minHeight: 54,
                  borderRadius: 12, border: on ? `1.5px solid ${T.mint}` : `1px solid ${T.border}`,
                  background: owned ? T.surfaceFill : on ? T.mintSoft : '#fff',
                  cursor: owned ? 'not-allowed' : 'pointer', opacity: owned ? 0.55 : 1,
                  padding: '9px 10px', textAlign: 'left',
                }}>
                  <span style={{ width: 30, height: 30, borderRadius: 10, background: T.surfaceFill,
                    display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18 }}>{item.image}</span>
                  <span style={{ flex: 1, fontSize: 13, color: T.ink, fontWeight: 800 }}>{item.name}</span>
                  {owned && <span style={{ fontSize: 10, color: T.text3, fontWeight: 800 }}>ліҙмң мӨ‘</span>}
                  {on && Icon.check(T.mintDeep, 16)}
                </button>
              );
            })}
          </div>
          {filtered.length === 0 && (
            <div style={{ padding: 30, textAlign: 'center', color: T.text3, fontSize: 13 }}>кІҖмғү кІ°кіјк°Җ м—Ҷм–ҙмҡ”</div>
          )}
          <button onClick={onOpenBundle} style={{
            width: '100%', marginTop: 14, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,

          </button>
        </div>

        <div style={{ display: 'flex', gap: 8, padding: 16, borderTop: `1px solid ${T.border}` }}>
          <Button variant="neutral" onClick={onClose}>м·ЁмҶҢ</Button>
          <Button full disabled={picked.size === 0} onClick={() => onAddItem(pickedItems)}>
            {picked.size > 0 ? `${picked.size}к°ң м¶”к°Җ` : 'мһ¬лЈҢ м„ нғқ'}
          </Button>
        </div>
      </div>
    </div>
  );

// Phone-shell only: floating button that calls requestFullscreen() on tap.
// Lets users hide Android Chrome's URL bar and nav bar without an HTTPS PWA install.
function FullscreenToggle() {
  const { useState, useEffect } = React;
  const [isFs, setIsFs] = useState(false);
  const [supported, setSupported] = useState(true);
  useEffect(() => {
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
    setSupported(typeof req === 'function');
    const onChange = () =>
      setIsFs(!!(document.fullscreenElement || document.webkitFullscreenElement));
    document.addEventListener('fullscreenchange', onChange);
    document.addEventListener('webkitfullscreenchange', onChange);
    return () => {
      document.removeEventListener('fullscreenchange', onChange);
      document.removeEventListener('webkitfullscreenchange', onChange);
    };
  }, []);
  if (isFs || !supported) return null;
  const enter = () => {
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
    try { req && req.call(el).catch(() => {}); } catch (e) {}
  };
  return (
    <button onClick={enter} aria-label="м „мІҙнҷ”л©ҙ"
      style={{
        position: 'fixed',
        bottom: 'calc(78px + env(safe-area-inset-bottom))',
        right: 12, zIndex: 9999,
        width: 44, height: 44, borderRadius: 22,
        background: 'rgba(33,37,41,0.72)', border: 'none', color: '#fff',
        fontSize: 18, cursor: 'pointer',
        boxShadow: '0 4px 12px rgba(0,0,0,0.25)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        WebkitBackdropFilter: 'blur(8px)', backdropFilter: 'blur(8px)',
      }}>вӣ¶</button>
  );
}

  const goPage = (page, args = {}) => setRoute(prev => {

    const returnToPage = returnToModal || args.returnToPage
      ? args.returnToPage || null

        ? { page: prev.page, pageArgs: prev.pageArgs || null }

    return {
      ...prev,
      detail: null,

      pageArgs: {

  const backFromPage = () => setRoute(prev => {

  const reflectToPantry = (list, names) => {

      names.forEach(name => {
        const key = Object.keys(next).find(k => next[k].name === name) || `new_${name}`;

        next[key] = { name, have: true, section: next[key]?.section || section };
      });

      addPlannerMeal(presetDate, presetSlot, { recipeId: recipe.id, status: 'registered', servings: recipe.servings || 2 });

  const addPickedPantryItems = (items) => {
    const list = Array.isArray(items) ? items : [items];
    const existingNames = new Set(Object.values(pantry || {}).filter(item => item.have).map(item => item.name));
    const unique = list.filter(item => item?.name && !existingNames.has(item.name));
    if (unique.length === 0) {
      setPantryAddSheet(false);
      showToast('мқҙлҜё нҢ¬нҠёлҰ¬м—җ мһҲлҠ” мһ¬лЈҢмҳҲмҡ”');
      return;
    }
    setPantry(p => {
      const next = { ...p };
      unique.forEach(item => {
        if (!item?.name) return;
        next[item.name] = { name: item.name, section: item.section, have: true };
      });
      return next;
    });
    setPantryAddSheet(false);
    showToast(`${unique.length}к°ң мһ¬лЈҢ м¶”к°ҖлҗЁ`);
  };
  const addPantryNames = (names, section = 'м–‘л…җ') => {
    const list = Array.isArray(names) ? names : [names];
    const existingNames = new Set(Object.values(pantry || {}).filter(item => item.have).map(item => item.name));
    const unique = list.filter(name => name && !existingNames.has(name));
    if (unique.length === 0) {
      setPantryBundlePicker(false);
      showToast('мқҙлҜё нҢ¬нҠёлҰ¬м—җ мһҲлҠ” мһ¬лЈҢмҳҲмҡ”');
      return;
    }
    setPantry(p => {
      const next = { ...p };
      unique.forEach(name => { next[name] = { name, section, have: true }; });
      return next;
    });
    setPantryBundlePicker(false);
    showToast(unique.length + 'к°ң мқјкҙ„ м¶”к°ҖлҗЁ');
  };
  const markCooked = (date, slot, consumed, mealIndex = 0) => {
    updatePlannerMeal(date, slot, mealIndex, m => ({ ...m, status: 'cooked' }));
    if (consumed && consumed.length) {
      setPantry(p => {
        const next = { ...p };
        consumed.forEach(name => {
          const key = Object.keys(next).find(k => next[k].name === name);
          if (key) next[key] = { ...next[key], have: false };
        });
        return next;
      });
      showToast(`рҹҺү мҡ”лҰ¬ мҷ„лЈҢ! ${consumed.length}к°ң мһ¬лЈҢ м°Ёк°җ`);
    } else {
      showToast('рҹҺү мҡ”лҰ¬ мҷ„лЈҢ!');
    }
    backFromPage();
  };
  const changeStatus = (date, slot, status, mealIndex = 0) => {
    updatePlannerMeal(date, slot, mealIndex, m => ({ ...m, status }));
  };
  const confirmPlanningServings = (servings, selectedDate, selectedSlot) => {
    const current = planningServings;
    if (!current) return;
    const { recipeId, presetDate, presetSlot, source, sourceDate, sourceSlot, sourceMealIndex } = current;
    const targetDate = selectedDate || presetDate;
    const targetSlot = selectedSlot || presetSlot;
    if (targetDate && targetSlot) {
      if (source === 'leftover') {
        reuseLeftover(sourceDate, sourceSlot, sourceMealIndex || 0, servings, targetDate, targetSlot);
      } else {
        addPlannerMeal(targetDate, targetSlot, { recipeId, status: 'registered', servings });
        showToast(targetDate + ' ' + targetSlot + 'м—җ ' + servings + 'мқёл¶„ м¶”к°Җлҗҗм–ҙмҡ”');
      }
      setRoute({ tab: 'planner', page: null });
    }
    setPlanningServings(null);

  let content;

  if (route.page === 'login') {
    content = <LoginScreen returnTo={pa.returnTo} onBack={backFromPage} onLogin={completeLogin} />;

    content = <MenuAddScreen presetDate={pa.date} presetSlot={pa.slot} initialMode={pa.mode} planner={planner} pantry={pantry}

        // slot м •ліҙк°Җ м—Ҷмңјл©ҙ лӢЁмҲң л ҲмӢңн”ј м—ҙкё°лЎң нҸҙл°ұ.
        if (pa.date && pa.slot) {
          setPlanningServings({ recipeId: id, presetDate: pa.date, presetSlot: pa.slot });
        } else {
          openRecipe(id); backFromPage();
        }
      }}
      onGoManual={(d, s) => goPage('manual-create', { date: d, slot: s })}
      onGoYtImport={(d, s) => goPage('yt-import', { date: d, slot: s })}
      showToast={showToast} />;
  } else if (route.page === 'manual-create') {
    content = <ManualRecipeCreateScreen presetDate={pa.date} presetSlot={pa.slot}
      onBack={backFromPage} onCreated={onRecipeCreated} showToast={showToast} />;
  } else if (route.page === 'yt-import') {
    content = <YtImportScreen presetDate={pa.date} presetSlot={pa.slot}
      onBack={backFromPage} onCreated={onRecipeCreated} showToast={showToast} />;
  } else if (route.page === 'leftovers') {
    content = <LeftoversScreen planner={planner} onBack={backFromPage}
      onReuse={(sourceDate, sourceSlot, mealIndex) => openLeftoverServings(sourceDate, sourceSlot, mealIndex, pa.date, pa.slot)} onGoAteList={() => goPage('ate-list')}
      onMarkAte={markAte} onMarkPartial={markPartial} showToast={showToast} />;
  } else if (route.page === 'ate-list') {
    content = <AteListScreen planner={planner} onBack={backFromPage}
      onGoLeftovers={() => goPage('leftovers')}
      onUndoAte={undoAte} onRecreate={(rid) => { backFromPage(); openRecipe(rid); }} />;

          <button onClick={() => goPage('ate-list')}
            style={quickBtn}>рҹҚҪпёҸ лӢӨлЁ№мқҖ мҡ”лҰ¬ (ATE_LIST)</button>
          <button onClick={() => goPage('manual-create')}
            style={quickBtn}>вңҸпёҸ м§Ғм ‘ л“ұлЎқ (MANUAL_CREATE)</button>
          <button onClick={() => goPage('yt-import')}
            style={quickBtn}>рҹ“ә мң нҠңлёҢ к°Җм ёмҳӨкё° (YT_IMPORT)</button>
          <button onClick={() => goPage('mypage-recipebook')}
            style={quickBtn}>рҹ“ҡ л ҲмӢңн”јл¶Ғ лӘ©лЎқ (MYPAGE_RECIPEBOOK)</button>
          <button onClick={() => goPage('mypage-shopping')}
            style={quickBtn}>рҹ§ҫ мһҘліҙкё° кё°лЎқ лӘ©лЎқ (MYPAGE_SHOPPING)</button>
        </div>

        <div style={{ fontSize: 11, color: '#868E96', fontWeight: 700, marginTop: 16, marginBottom: 8 }}>Wave 1.8 лҚ°мҠӨнҒ¬нҶұ (P2)</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
          <button onClick={() => setPantryAddSheet(true)}
            style={quickBtn}>вһ• мһ¬лЈҢ м¶”к°Җ dialog (PantryAdd)</button>
          <button onClick={() => setPantryBundlePicker(true)}
            style={quickBtn}>рҹ“Ұ мһ¬лЈҢ л¬¶мқҢ dialog (PantryBundle)</button>
          <button onClick={() => setReflectPicker(shoppingLists[1] || shoppingLists[0])}
            style={quickBtn}>рҹ”„ нҢ¬нҠёлҰ¬ л°ҳмҳҒ dialog (PantryReflect)</button>
          <button onClick={() => setBookSelectorOpen(true)}
            style={quickBtn}>рҹ“• л ҲмӢңн”јл¶Ғ м„ нғқ dialog (BookSelector)</button>
          <button onClick={() => setPantryMatchPickerOpen(true)}
            style={quickBtn}>рҹ§Ҡ нҢ¬нҠёлҰ¬ л§Өм№ӯ dialog (PantryMatch)</button>
          <button onClick={() => setConsumedDialog({ recipe: RECIPES[0] })}
            style={quickBtn}>вң“ м°Ёк°җ мһ¬лЈҢ dialog (Consumed)</button>
        </div>
      </div>

      {tweaksOn && <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} />}
    </div>
  );
}

// ============ Tweaks panel (extracted) ============
function TweaksPanel({ tweaks, setTweaks }) {
  return (
    <div className="tweaks-panel">
      <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 10, color: '#212529' }}>Tweaks</div>
      <div style={{ marginBottom: 12 }}>
        <div style={{ fontSize: 12, color: '#495057', fontWeight: 600, marginBottom: 6 }}>нҸ¬мқёнҠё м»¬лҹ¬</div>
        <div style={{ display: 'flex', gap: 6 }}>
          {[
            ['#2AC1BC', 'лҜјнҠё'],
            ['#12B886', 'нӢё'],
            ['#FF6B6B', 'нҶ л§ҲнҶ '],
            ['#FFB347', 'мҳӨл Ңм§Җ'],
            ['#343A40', 'лЁ№мғү'],
          ].map(([c, n]) => (
            <button key={c} onClick={() => {
              setTweaks(t => ({ ...t, accentColor: c }));
              window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accentColor: c } }, '*');
            }} style={{
              width: 32, height: 32, borderRadius: 16, background: c,
              border: tweaks.accentColor === c ? '2px solid #212529' : '2px solid transparent',
              cursor: 'pointer',
            }} title={n} />
          ))}
        </div>
      </div>
      <div style={{ marginBottom: 12 }}>
        <label style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 12, color: '#495057', fontWeight: 600 }}>
          <input type="checkbox" checked={tweaks.showBrandFont}
            onChange={e => {
              setTweaks(t => ({ ...t, showBrandFont: e.target.checked }));
              window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { showBrandFont: e.target.checked } }, '*');
            }} />
          лёҢлһңл“ң нҸ°нҠё (Jua)
        </label>
      </div>
      <div>
        <div style={{ fontSize: 12, color: '#495057', fontWeight: 600, marginBottom: 6 }}>л°ҖлҸ„</div>
        <div style={{ display: 'flex', gap: 4 }}>
          {['compact', 'comfortable'].map(d => (
            <button key={d} onClick={() => {
              setTweaks(t => ({ ...t, density: d }));
              window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { density: d } }, '*');
            }} style={{
              flex: 1, padding: '6px 10px', fontSize: 11, borderRadius: 6,
              background: tweaks.density === d ? '#212529' : '#F8F9FA',
              color: tweaks.density === d ? '#fff' : '#495057',
              border: 'none', cursor: 'pointer', fontWeight: 600,
            }}>{d}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

const quickBtn = {
  textAlign: 'left', padding: '8px 10px', fontSize: 12,
  background: '#fff', border: '1px solid #DEE2E6', borderRadius: 6,
  cursor: 'pointer', color: '#495057'
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
