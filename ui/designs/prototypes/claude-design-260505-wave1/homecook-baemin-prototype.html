function makeInitialPlanner() {
  const plan = {};
  for (let i = 0; i < 7; i++) {
    const d = new Date(WEEK_START);
    d.setDate(d.getDate() + i);
    const key = `${d.getMonth() + 1}/${d.getDate()}`;
    plan[key] = { м•„м№Ё: null, м җмӢ¬: null, м Җл…Ғ: null };
  }
  // Seed some meals
  const keys = Object.keys(plan);
  plan[keys[0]].м Җл…Ғ = { recipeId: 'r2', status: 'cooked', servings: 2 };
  plan[keys[1]].м җмӢ¬ = { recipeId: 'r1', status: 'cooked', servings: 1 };
  plan[keys[1]].м Җл…Ғ = { recipeId: 'r4', status: 'shopped', servings: 2 };
  plan[keys[2]].м Җл…Ғ = { recipeId: 'r6', status: 'registered', servings: 2 };
  plan[keys[3]].м•„м№Ё = [
    { recipeId: 'r1', status: 'registered', servings: 1 },
    { recipeId: 'r2', status: 'shopped', servings: 2 },
    { recipeId: 'r3', status: 'registered', servings: 1 }
  ];
  plan[keys[3]].м җмӢ¬ = { recipeId: 'r3', status: 'registered', servings: 1 };
  plan[keys[3]].м Җл…Ғ = { recipeId: 'r2', status: 'registered', servings: 2 };
  plan[keys[5]].м Җл…Ғ = { recipeId: 'r5', status: 'registered', servings: 2 };
  return plan;
}

function mealItems(slotValue) {
  if (!slotValue) return [];
  return Array.isArray(slotValue) ? slotValue.filter(Boolean) : [slotValue];
}

function slotPrimaryMeal(slotValue) {
  return mealItems(slotValue)[0] || null;
}

function appendMealToSlot(slotValue, meal) {
  const items = mealItems(slotValue);
  return items.length ? [...items, meal] : meal;
}

function updateMealInSlot(slotValue, index, updater) {
  const items = mealItems(slotValue);
  if (!items.length) return slotValue;
  const targetIndex = Math.max(0, Math.min(index || 0, items.length - 1));
  const next = items.map((item, i) => i === targetIndex ? updater(item) : item);
  return Array.isArray(slotValue) ? next : next[0];
}

function removeMealFromSlot(slotValue, index) {
  const items = mealItems(slotValue);
  if (!items.length) return null;
  const targetIndex = Math.max(0, Math.min(index || 0, items.length - 1));
  const next = items.filter((_, i) => i !== targetIndex);
  if (next.length === 0) return null;
  return next.length === 1 ? next[0] : next;
}

function slotStatusSummary(slotValue) {
  const items = mealItems(slotValue);
  if (!items.length) return { status: null, label: 'л№„м–ҙ мһҲмқҢ' };
  if (items.every(m => m.status === 'cooked')) return { status: 'cooked', label: 'мҡ”лҰ¬ мҷ„лЈҢ' };
  if (items.some(m => m.status === 'cooked')) return { status: 'mixed', label: 'мқјл¶Җ мҷ„лЈҢ' };
  if (items.some(m => m.status === 'shopped')) return { status: 'shopped', label: 'мқјл¶Җ мӨҖл№„лҗЁ' };
  return { status: 'registered', label: 'мһҘліҙкё° м „' };
}

function formatMetricCount(value) {
  if (typeof value !== 'number') return value;
  if (value >= 10000) return `${Math.round(value / 1000) / 10}л§Ң`;
  return value.toLocaleString();
}

function recipeViewCount(recipe) {
  return Math.max(0, Math.round((recipe?.saves || 0) * 3.7 + (recipe?.minutes || 0) * 19));
}

function recipeSummaryTags(recipe) {
  const methodLabel = METHOD_COLORS[recipe?.method]?.label;
  return [recipe?.theme, methodLabel, (recipe?.ingredients || [])[0]?.name]
    .filter(Boolean)
    .slice(0, 3);
}

// vNext S1 вҖ” SortDropdown: мқёлқјмқё м •л ¬ мҳөм…ҳ (SortSheet мӢңнҠё лҢҖмІҙ)
// options: [['key', 'лқјлІЁ'], ...] нҳ•нғң prop. HOME S2м—җм„ң мӮ¬мҡ© мҳҲм •.
function SortDropdown({ value, onChange, options }) {
  const [open, setOpen] = React.useState(false);
  const current = options.find(([k]) => k === value);
  return (
    <div style={{ position: 'relative', display: 'inline-block' }}>
      <button onClick={() => setOpen(!open)} style={{
        display: 'flex', alignItems: 'center', gap: 4,
        background: 'none', border: 'none', cursor: 'pointer',
        fontSize: 13, fontWeight: 600, color: T.text2, padding: '4px 0'
      }}>
        {current?.[1] || 'м •л ¬'} {Icon.chevD(T.text3)}
      </button>
      {open && (
        <div style={{
          position: 'absolute', top: '100%', right: 0, zIndex: 50,
          background: '#fff', borderRadius: 10, border: `1px solid ${T.border}`,
          boxShadow: T.shadowSharp, minWidth: 140, marginTop: 4, overflow: 'hidden'
        }}>
          {options.map(([k, l]) => (
            <div key={k} onClick={() => { onChange(k); setOpen(false); }} style={{
              display: 'flex', alignItems: 'center', padding: '12px 14px', cursor: 'pointer',
              background: value === k ? T.surfaceSubtle : '#fff'
            }}>
              <div style={{ flex: 1, fontSize: 14, fontWeight: value === k ? 700 : 500, color: T.ink }}>{l}</div>
              {value === k && <div style={{ color: T.mint }}>{Icon.check(T.mint)}</div>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function MetricRow({ likes, saves, cooks, views, style }) {
  {/* CONTRACT_CHECK: л©”нҠёлҰӯ 4мў…(мўӢм•„мҡ”мҲҳ/м ҖмһҘмҲҳ/мҡ”лҰ¬мҷ„лЈҢмҲҳ/мЎ°нҡҢмҲҳ) лҚ°мқҙн„° мҶҢмҠӨВ·м§‘кі„ лӢЁмң„ нҷ•м • н•„мҡ” вҖ” vNextм—җм„ңлҠ” UI shapeл§Ң */}

function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark ?
      '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)' :
      '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)'
      }} />
      {/* shine */}
      <div style={{

        'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)'
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>);

}

// Keyboard вҖ” iOS 26 liquid glass
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  // special-key icons
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph} /></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round" /><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round" /></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" /></svg>
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) =>
  <div key={k} style={{
    height: 42, borderRadius: 8.5,
    flex: flex ? 1 : undefined, width: w, minWidth: 0,
    background: ret ? '#08f' : keyBg,
    boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
    display: 'flex', alignItems: 'center', justifyContent: 'center',
    fontFamily: '-apple-system, "SF Compact", system-ui',
    fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph
  }}>{content}</div>;


  const row = (keys, pad = 0) =>
  <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map((l) => key(l, { flex: true, k: l }))}
    </div>;


  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark ?
      '0 -2px 20px rgba(0,0,0,0.09)' :
      '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)'
    }}>
      {/* liquid glass bg вҖ” same recipe as nav pills */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)'
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark ?
        'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)' :
        'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none'
      }} />

      {/* autocorrect bar */}
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative'
      }}>
        {['"The"', 'the', 'to'].map((w, i) =>
        <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
            flex: 1, textAlign: 'center',
            fontFamily: '-apple-system, system-ui', fontSize: 17,
            color: sugg, letterSpacing: -0.43, lineHeight: '22px'
          }}>{w}</div>
          </React.Fragment>
        )}
      </div>

      {/* key layout */}
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative'
      }}>
        {row(['q', 'w', 'e', 'r', 't', 'y', 'u', 'i', 'o', 'p'])}
        {row(['a', 's', 'd', 'f', 'g', 'h', 'j', 'k', 'l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z', 'x', 'c', 'v', 'b', 'n', 'm'].map((l) => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>

      {/* bottom spacer (emoji+mic area, icons omitted) */}
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>);

}

    { id: 'b_saved', kind: 'saved', name: 'м ҖмһҘн•ң л ҲмӢңн”ј', emoji: 'рҹ”–', recipeIds: [] },

  ];
  const baseBooks = (providedBooks && providedBooks.length)
    ? providedBooks
    : (window.RECIPEBOOK_SAMPLES && window.RECIPEBOOK_SAMPLES.length)

function scaleQty(qty, scale) {
  if (scale === 1) return qty;
  // naive numeric scaling for display
  const m = qty.match(/^([\d./]+)(.*)$/);
  if (!m) return qty;
  const val = eval(m[1]) * scale;
  const suf = m[2];
  const rounded = Math.round(val * 10) / 10;
  return `${rounded}${suf}`;
}

function MealAddModal({ date, slot, planner, pantry, onClose, onMenuAdd, onGoManual, onGoYtImport, onGoLeftovers, onPickRecipe, showToast }) {
  const [query, setQuery] = useState_P('');
  const [mode, setMode] = useState_P('hub');

  ];
  const selectedBook = books.find(b => b.id === bookId);

  }).sort((a, b) => b.score - a.score);
  const leftoverMeals = [];

    ['м•„м№Ё', 'м җмӢ¬', 'м Җл…Ғ'].forEach(mealSlot => {

        <div style={{ fontSize: 14, fontWeight: 800, color: T.ink }}>{recipe.name}</div>

  if (mode === 'books') {

  }

  if (mode === 'pantry') {

        </div>
        {pantryMatches.slice(0, 7).map(({ recipe, hit, total, score }) =>
          recipeRow(recipe, null, (
            <MatchProgressBar score={score} sub={`${hit}/${total}к°ң ліҙмң  В· ${recipe.minutes}л¶„`} style={{ marginTop: 7 }} />
          ))
        )}
      </Sheet>
    );
  }

  if (mode === 'leftover') {
    return (
      <Sheet title="лӮЁмқҖ мҡ”лҰ¬м—җм„ң м¶”к°Җ" onClose={close}>
        {backButton}
        {leftoverMeals.length === 0 ? (
          <div style={{ padding: 28, textAlign: 'center', color: T.text3, fontSize: 13 }}>
            м¶”к°Җн•  лӮЁмқҖ мҡ”лҰ¬к°Җ м—Ҷм–ҙмҡ”.
          </div>
        ) : leftoverMeals.map(item =>
          recipeRow(item.recipe, `${item.day} ${item.mealSlot} В· лӮЁмқҖ мҡ”лҰ¬ ${item.meal.servings || 1}мқёл¶„`)
        )}
      </Sheet>
    );
  }

  if (mode === 'youtube') {
    const canImport = ytUrl.trim().length > 0;
    return (
      <Sheet title="мң нҠңлёҢм—җм„ң к°Җм ёмҳӨкё°" onClose={close} footer={
        <div style={{ display: 'flex', gap: 8 }}>
          <Button variant="neutral" style={{ flex: '0 0 88px', whiteSpace: 'nowrap' }} onClick={close}>м·ЁмҶҢ</Button>
          <Button full disabled={!canImport} onClick={() => {
            showToast?.('мҳҒмғҒм—җм„ң л ҲмӢңн”јлҘј к°Җм ёмҷ”м–ҙмҡ”');
            pickRecipe('r5');
          }}>к°Җм ёмҳӨкё°</Button>
        </div>
      }>
        {backButton}
        <input value={ytUrl} onChange={e => setYtUrl(e.target.value)}
          placeholder="мң нҠңлёҢ URL л¶ҷм—¬л„Јкё°" autoFocus
          style={{
            width: '100%', boxSizing: 'border-box', padding: '12px 14px',
            border: `1px solid ${T.border}`, borderRadius: 10, outline: 'none',
            fontSize: 14, fontFamily: T.fontUI, color: T.ink, background: '#fff',
          }} />
        <div style={{ marginTop: 12, fontSize: 12, color: T.text3, lineHeight: 1.5 }}>
          н”„лЎңнҶ нғҖмһ…м—җм„ңлҠ” URL мһ…л Ҙ нӣ„ мғҳн”Ң л ҲмӢңн”јлҘј мӢқмӮ¬ м¶”к°Җ нқҗлҰ„м—җ м—°кІ°н•©лӢҲлӢӨ.
        </div>
      </Sheet>
    );
  }

  return (
    <Sheet title={`${date} ${slot} В· мӢқмӮ¬ м¶”к°Җ`} onClose={close}>
      {/* кІҖмғү input вҖ” нҸ¬м»ӨмҠӨ мӢң кё°мЎҙ menu-add кІҖмғүмңјлЎң мқҙлҸҷ */}
      <div style={{
        display: 'flex', alignItems: 'center', gap: 8,
        background: T.surfaceFill, borderRadius: 10, padding: '0 12px', height: 40,
        marginBottom: 16,
      }}>
        {Icon.search()}
        <input
          value={query}
          onChange={e => setQuery(e.target.value)}
          onFocus={() => { close(); onMenuAdd(date, slot, 'search'); }}
          placeholder="л ҲмӢңн”ј кІҖмғү"
          style={{
            flex: 1, border: 'none', background: 'transparent', outline: 'none',
            fontSize: 14, color: T.ink, fontFamily: T.fontUI,
          }}
        />
      </div>
      {/* мҳөм…ҳ лІ„нҠј 2м—ҙ к·ёлҰ¬л“ң */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
        {options.map(o => (
          <button key={o.id} onClick={() => {
            if (o.id === 'manual') {
              close();
              if (onGoManual) onGoManual(date, slot);
              else onMenuAdd(date, slot);
            } else if (o.id === 'recipebook') {
              setMode('books');
            } else if (o.id === 'pantry') {
              setMode('pantry');
            } else if (o.id === 'leftover') {
              setMode('leftover');
            } else if (o.id === 'youtube') {
              setMode('youtube');
            } else {
              close();
              onMenuAdd(date, slot, 'search');
            }
          }} style={{
            display: 'flex', alignItems: 'center', gap: 10,
            padding: '14px 12px', borderRadius: 10,
            background: '#fff', border: `1px solid ${T.border}`,
            cursor: 'pointer', fontSize: 13, fontWeight: 600, color: T.ink,
            textAlign: 'left',
          }}>
            <span style={{ fontSize: 20 }}>{o.icon}</span>
            <span>{o.label}</span>
          </button>
        ))}
      </div>
    </Sheet>
  );
}

  const keys = Object.keys(planner);

  const [mealAddModal, setMealAddModal] = useState_P(null); // { date, slot }

    const base = new Date(WEEK_START);
    base.setDate(base.getDate() + weekOffset * 7);

    return `${base.getMonth()+1}мӣ” ${base.getDate()}мқј вҖ” ${end.getMonth()+1}мӣ” ${end.getDate()}мқј`;
  }, [weekOffset]);

  const scrollToDay = (key) => {
    dayRefs.current[key]?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };
  const dateCardMeta = (index, offset = weekOffset) => {
    const d = new Date(WEEK_START);
    d.setDate(d.getDate() + index + offset * 7);
    return {
      dow: weekDays[index],
      day: d.getDate(),
      label: `${d.getMonth() + 1}/${d.getDate()}`
    };

  const centerWeekRail = () => {
    const el = weekRailRef.current;
    if (!el) return;
    weekRailResetting.current = true;
    el.scrollLeft = el.clientWidth;
    window.setTimeout(() => { weekRailResetting.current = false; }, 80);
  };

  React.useEffect(() => {
    centerWeekRail();
  }, [weekOffset]);

  React.useEffect(() => () => window.clearTimeout(weekRailSnapTimer.current), []);

  const handleWeekRailScroll = () => {
    if (weekRailResetting.current) return;
    window.clearTimeout(weekRailSnapTimer.current);
    weekRailSnapTimer.current = window.setTimeout(() => {
      const el = weekRailRef.current;
      if (!el) return;
      const page = el.clientWidth || 1;
      const index = Math.round(el.scrollLeft / page);
      if (index <= 0) {
        setWeekOffset(w => w - 1);

const { useState: useState_PT } = React;

function PantryScreen({ pantry, setPantry, onOpenAdd, onOpenBundle }) {
  const [query, setQuery] = useState_PT('');

  const [selected, setSelected] = useState_PT(new Set());
  const categories = ['м „мІҙ', ...PANTRY_CATEGORIES];
  const ownedEntries = Object.entries(pantry).filter(([, v]) => v.have);
  const sections = {};
  ownedEntries.forEach(([k, v]) => {
    if (query && !v.name.includes(query)) return;
    if (activeCat !== 'м „мІҙ' && v.section !== activeCat) return;
    if (!sections[v.section]) sections[v.section] = [];
    sections[v.section].push({ key: k, ...v });
  });

  const haveCount = ownedEntries.length;
  const total = PANTRY_ADD_ITEMS.length;
  const toggleSelected = (key) => {
    setSelected(prev => {
      const next = new Set(prev);
      next.has(key) ? next.delete(key) : next.add(key);
      return next;
    });
  };
  const deleteSelected = () => {
    if (selected.size === 0) return;
    setPantry(prev => {
      const next = { ...prev };
      selected.forEach(key => {
        if (next[key]) next[key] = { ...next[key], have: false };
      });
      return next;

    setDeleteMode(false);

const { useMemo: dUseMemo, useState: dUseState } = React;

// vNext S2 вҖ” DesktopHome: м•ұ к°ңм„ мӮ¬н•ӯмқ„ мӣ№ л Ҳмқҙм•„мӣғм—җ мһҗм—°мҠӨлҹҪкІҢ ліҖнҷҳ
function DesktopHome({ onOpenRecipe, onOpenSave, savedIds = [], ingFilter, setIngFilter, sortBy, setSortBy, onOpenIngredientFilter, ingredientNames = [], onGoPlanner }) {
  const [query, setQuery] = dUseState('');
  const [activeTheme, setActiveTheme] = dUseState(null);

  const filtered = dUseMemo(() => {
    let r = [...RECIPES];
    if (query) r = r.filter(x => x.name.includes(query));
    if (activeTheme) r = r.filter(x => x.theme === activeTheme);
    if (ingFilter.length > 0) {
      r = r.filter(x => {
        const names = x.ingredients.map(i => i.name).join(' ');
        return ingFilter.some(f => {
          if (f === 'rice') return /л°Ҙ|көӯмҲҳ|л©ҙ|л°Җк°ҖлЈЁ/.test(names);
          if (f === 'meat') return /лҸјм§Җ|мҶҢкі кё°|лӢӯ|м•һлӢӨлҰ¬/.test(names);
          if (f === 'fish') return /м—°м–ҙ|л©ём№ҳ|н•ҙмӮ°л¬ј/.test(names);
          if (f === 'veg') return /м–‘нҢҢ|к°җмһҗ|лӢ№к·ј|нҳёл°•|лЎңл©”мқё/.test(names);
          if (f === 'egg') return /кі„лһҖ|л‘җл¶Җ/.test(names);
          if (f === 'kimchi') return /к№Җм№ҳ|л¬өмқҖм§Җ/.test(names);
          return true;
        });
      });
    }
    if (ingredientNames.length) {
      r = r.filter(recipe => {
        const names = recipe.ingredients.map(i => i.name).join(' ');
        return ingredientNames.every(name => names.includes(name));
      });
    }
    if (sortBy === 'saves')  r.sort((a, b) => b.saves - a.saves);
    if (sortBy === 'fast')   r.sort((a, b) => a.minutes - b.minutes);
    return r;
  }, [query, activeTheme, ingFilter, ingredientNames, sortBy]);

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 32 }}>
      {/* Hero / today вҖ” vNext: н”Ңлһҳл„Ҳ м№ҙл“ң нҒҙлҰӯвҶ’н”Ңлһҳл„Ҳ нғӯ */}

        <div style={{

          borderRadius: 16, padding: 32, color: '#fff',
          display: 'flex', flexDirection: 'column', justifyContent: 'space-between',
          minHeight: 220,
        }}>
          <div>
            <div style={{ fontSize: 12, fontWeight: 700, opacity: 0.85, letterSpacing: 1 }}>мҳӨлҠҳмқҳ м¶”мІң</div>
            <div style={{ fontSize: 28, fontWeight: 700, marginTop: 8, fontFamily: T.fontBrand, letterSpacing: 0.4 }}>

            </div>
            <div style={{ fontSize: 14, opacity: 0.9, marginTop: 6 }}>
              к№Җм№ҳм°Ңк°ң В· л¶ҖлҢҖм°Ңк°ң В· л–Ўлі¶мқҙ В· м№јкөӯмҲҳ
            </div>

          <button style={{
            alignSelf: 'flex-start', background: '#fff', color: T.mintDeep,
            border: 'none', padding: '10px 18px', borderRadius: 8,

        {/* vNext: мқҙлІҲ мЈј н”Ңлһҳл„Ҳ м№ҙл“ң вҖ” нҒҙлҰӯмңјлЎң н”Ңлһҳл„Ҳ нғӯ мқҙлҸҷ */}
        <div onClick={onGoPlanner} style={{

          <div style={{ display: 'flex', gap: 8 }}>
            {['мӣ”','нҷ”','мҲҳ','лӘ©','кёҲ','нҶ ','мқј'].map((d, i) => (
              <div key={d} style={{
                flex: 1, aspectRatio: '1/1.3',
                background: i === 1 ? T.mintSoft : T.surfaceFill,
                border: i === 1 ? `1.5px solid ${T.mint}` : '1.5px solid transparent',
                borderRadius: 8, padding: 6,
                display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
                gap: 2,
              }}>
                <span style={{ fontSize: 11, color: i === 1 ? T.mintDeep : T.text3, fontWeight: 700 }}>{d}</span>

                {i === 1 && <span style={{ fontSize: 9, color: T.mintDeep }}>3кұҙ</span>}
              </div>
            ))}
          </div>
          <div style={{ fontSize: 12, color: T.text3 }}>
            нҷ”мҡ”мқјм—җ л“ұлЎқлҗң мӢқлӢЁ 3кұҙ В· <span style={{ color: T.mint, fontWeight: 700 }}>м „мІҙ ліҙкё°</span>
          </div>
        </div>
      </section>

      {/* Search */}
      <section>
        <div style={{
          display: 'flex', alignItems: 'center', gap: 8,
          background: T.surfaceFill, borderRadius: 12, padding: '0 16px', height: 44,
        }}>
          {Icon.search()}
          <input value={query} onChange={e => setQuery(e.target.value)}
            placeholder="к№Җм№ҳлі¶мқҢл°Ҙ, лҗңмһҘм°Ңк°ңвҖҰ"

              fontSize: 14, color: T.ink, fontFamily: T.fontUI }} />

      </section>

      {/* Theme row вҖ” лҚ°мҠӨнҒ¬нҶұмқҖ н…Ңл§Ҳ лЁјм Җ н‘ңмӢң, мһ¬лЈҢ м№©мқҖ м•„лһҳ (лӘЁл°”мқјкіј лҸҷмқј мҲңм„ң) */}
      <section>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 12 }}>
          <div style={{ fontSize: 18, fontWeight: 700, color: T.ink }}>н…Ңл§Ҳлі„ л ҲмӢңн”ј</div>
          <div style={{ fontSize: 12, color: T.text3 }}>м „мІҙліҙкё° вҖә</div>
        </div>
        <div style={{ display: 'flex', gap: 12, overflowX: 'auto', paddingBottom: 4, scrollbarWidth: 'none' }}>
          {THEMES.map(t => {
            const active = activeTheme === t.name;
            return (
              <div key={t.id} onClick={() => setActiveTheme(active ? null : t.name)} style={{
                flexShrink: 0, width: 150, height: 96, borderRadius: 14,
                background: t.bg, padding: 14, cursor: 'pointer',
                display: 'flex', flexDirection: 'column', justifyContent: 'space-between',
                border: active ? `2px solid ${T.mint}` : '2px solid transparent',
                boxShadow: T.shadowNatural,
              }}>
                <div style={{ fontSize: 28 }}>{t.emoji}</div>
                <div style={{ fontSize: 13, fontWeight: 700, color: T.ink, fontFamily: T.fontBrand }}>{t.name}</div>
              </div>
            );
          })}
        </div>
      </section>

      {/* All recipes with sort вҖ” vNext: SortDropdown мқёлқјмқё (мӢңнҠё м ңкұ°) */}
      <section>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
          <div style={{ fontSize: 18, fontWeight: 700, color: T.ink }}>
            лӘЁл“  л ҲмӢңн”ј <span style={{ color: T.text3, fontSize: 14, fontWeight: 500 }}>({filtered.length})</span>
          </div>
          <SortDropdown value={sortBy} onChange={setSortBy} options={SORT_OPTIONS} />
        </div>

        {/* vNext follow-up: л ҲмӢңн”ј кІҖмғү н•„н„° м№© вҖ” лӘЁл“  л ҲмӢңн”ј м•„лһҳ */}
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'center', marginBottom: 16 }}>
          {onOpenIngredientFilter && (
            <button onClick={onOpenIngredientFilter} style={{
              padding: '8px 14px', borderRadius: 9999,
              background: ingredientNames.length > 0 ? T.mint : '#fff',
              border: `1.5px solid ${ingredientNames.length > 0 ? T.mintDeep : T.mint}`,
              color: ingredientNames.length > 0 ? '#fff' : T.mintDeep,
              fontSize: 13, fontWeight: 700, cursor: 'pointer',
              display: 'flex', alignItems: 'center', gap: 6,
            }}>{Icon.search(ingredientNames.length > 0 ? '#fff' : T.mintDeep)} {ingredientNames.length > 0 ? `мһ¬лЈҢ ${ingredientNames.length}к°ң м Ғмҡ©` : 'мһ¬лЈҢлЎң кІҖмғү'}</button>
          )}
          {INGREDIENT_FILTERS.map(f => {
            const active = ingFilter.includes(f.id);
            return (
              <button key={f.id} onClick={() => {
                setIngFilter(active ? ingFilter.filter(x => x !== f.id) : [...ingFilter, f.id]);

                flexShrink: 0, display: 'flex', alignItems: 'center', gap: 6,
                padding: '8px 14px', borderRadius: 9999,
                background: active ? T.mintSoft : T.surfaceFill,
                border: active ? `1px solid ${T.mint}` : '1px solid transparent',
                color: active ? T.mintDeep : T.text2,
                fontSize: 13, fontWeight: active ? 700 : 500, cursor: 'pointer',
              }}>
                <span style={{ fontSize: 14 }}>{f.emoji}</span>{f.name}
              </button>
            );
          })}
        </div>

        {/* 3-col grid */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 20 }}>
          {filtered.map(r => (
            <div key={r.id} onClick={() => onOpenRecipe(r.id)} style={{
              background: '#fff', borderRadius: 12, overflow: 'hidden',
              boxShadow: T.shadowDeep, cursor: 'pointer',
              transition: 'transform 0.15s, box-shadow 0.15s',
            }}
            onMouseEnter={e => { e.currentTarget.style.transform = 'translateY(-3px)'; e.currentTarget.style.boxShadow = T.shadowSharp; }}
            onMouseLeave={e => { e.currentTarget.style.transform = ''; e.currentTarget.style.boxShadow = T.shadowDeep; }}
            >
              <div style={{
                width: '100%', aspectRatio: '4/3', background: r.bg,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 80, position: 'relative',
              }}>
                {r.emoji}
                <button aria-label={`${r.name} м ҖмһҘ`} onClick={(e) => { e.stopPropagation(); onOpenSave?.(r.id); }} style={{
                  position: 'absolute', top: 12, right: 12,
                  width: 36, height: 36, borderRadius: 18, border: 'none',
                  background: 'rgba(255,255,255,0.92)', cursor: 'pointer',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                }}>{Icon.bookmark(savedIds.includes(r.id))}</button>
                {r.saves > 2000 && (
                  <div style={{
                    position: 'absolute', top: 12, left: 12,
                    background: T.red, color: '#fff', fontSize: 11, fontWeight: 700,
                    padding: '4px 8px', borderRadius: 4,
                  }}>рҹ”Ҙ мқёкё°</div>
                )}
              </div>
              <div style={{ padding: 14 }}>
                <div style={{ fontSize: 15, fontWeight: 700, color: T.ink, marginBottom: 4 }}>{r.name}</div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 6, color: T.text3, fontSize: 12 }}>
                  {Icon.clock()} {r.minutes}л¶„
                  <span>В·</span>
                  {Icon.users()} {r.servings}мқё
                  <span>В·</span>
                  {Icon.bookmark(false, T.text3)} {r.saves.toLocaleString()}
                </div>
              </div>
            </div>
          ))}
        </div>
        {filtered.length === 0 && (
          <div style={{ padding: '48px 16px', textAlign: 'center', color: T.text3 }}>
            <div style={{ fontSize: 48, marginBottom: 8 }}>рҹҚҪпёҸ</div>
            <div style={{ fontSize: 14 }}>мЎ°кұҙм—җ л§һлҠ” л ҲмӢңн”јк°Җ м—Ҷм–ҙмҡ”</div>
          </div>
        )}
      </section>
    </div>
  );
}

// vNext S4 вҖ” DesktopPlanner: week nav, мқҙлӘЁм§Җ м ңкұ°, мғҒнғң л°°м§Җ м ңкұ°, мҡ”лҰ¬н•ҳкё° м ңкұ°, мӢқмӮ¬м¶”к°Җ лӢӨмқҙм–јлЎңк·ё
function DesktopPlanner({ planner, pantry, onOpenRecipe, onOpenPlannerAdd, onMenuAdd, onCreateShopping, onCookList, onOpenMeal, onGoManual, onGoYtImport, onGoLeftovers, onPickRecipeFromMealAdd, showToast, initialMealAdd }) {
  const days = Object.keys(planner);
  const slots = ['м•„м№Ё', 'м җмӢ¬', 'м Җл…Ғ'];
  // vNext S4 вҖ” week navigation labelмқҖ мң м§Җн•ҳкі , мқҙлҸҷ UIлҠ” мқјмЈјмқј лӮ м§ң м№ҙл“ңлЎң кі м •
  const [weekOffset, setWeekOffset] = dUseState(0);
  // vNext S4 вҖ” мӢқмӮ¬ м¶”к°Җ лӢӨмқҙм–јлЎңк·ё мғҒнғң
  const [mealAddDialog, setMealAddDialog] = dUseState(null); // { date, slot }
  const [mealAddMode, setMealAddMode] = dUseState('hub');
  const [mealAddBookId, setMealAddBookId] = dUseState(null);
  const [mealAddYtUrl, setMealAddYtUrl] = dUseState('');

  const stats = dUseMemo(() => {
    let total = 0, cooked = 0, shopped = 0;
    days.forEach(k => {
      ['м•„м№Ё', 'м җмӢ¬', 'м Җл…Ғ'].forEach(slot => {
        mealItems(planner[k]?.[slot]).forEach(m => {
          total++;
          if (m.status === 'cooked') cooked++;
          if (m.status === 'shopped') shopped++;
        });
      });
    });
    return { total, cooked, shopped };
  }, [planner, days]);

  const dateRange = dUseMemo(() => {
    if (!days.length) return '';
    const base = new Date(WEEK_START);
    base.setDate(base.getDate() + weekOffset * 7);
    const end = new Date(base);
    end.setDate(end.getDate() + 6);
    return `${base.getFullYear()}л…„ ${base.getMonth()+1}мӣ” ${base.getDate()}мқј ~ ${end.getMonth()+1}мӣ” ${end.getDate()}мқј`;
  }, [days, weekOffset]);

  const weekLabel = weekOffset === 0 ? 'мқҙлІҲ мЈј мӢқлӢЁ' : weekOffset === 1 ? 'лӢӨмқҢ мЈј мӢқлӢЁ' : weekOffset === -1 ? 'м§ҖлӮң мЈј мӢқлӢЁ' : 'мӢқлӢЁ';
  const dateCardMeta = (index) => {
    const d = new Date(WEEK_START);
    d.setDate(d.getDate() + index + weekOffset * 7);
    return { dow: weekDays[index], day: d.getDate(), label: `${d.getMonth() + 1}/${d.getDate()}` };
  };

  // мӢқмӮ¬ м¶”к°Җ лӢӨмқҙм–јлЎңк·ё мҳөм…ҳ
  const mealAddOptions = [
    { id: 'recipebook', label: 'л ҲмӢңн”јл¶Ғм—җм„ң м¶”к°Җ', icon: 'рҹ“–' },
    { id: 'pantry',     label: 'нҢ¬нҠёлҰ¬ кё°л°ҳ м¶”мІң',  icon: 'рҹ§Ҡ' },
    { id: 'leftover',   label: 'лӮЁмқҖмҡ”лҰ¬м—җм„ң м¶”к°Җ',  icon: 'рҹҚұ' },
    { id: 'youtube',    label: 'мң нҠңлёҢм—җм„ң к°Җм ёмҳӨкё°', icon: 'рҹҺ¬' },
    { id: 'manual',     label: 'м§Ғм ‘ л“ұлЎқ',          icon: 'вңҸпёҸ' },
  ];

  React.useEffect(() => {
    if (initialMealAdd?.date && initialMealAdd?.slot) {
      setMealAddDialog({ date: initialMealAdd.date, slot: initialMealAdd.slot });
      setMealAddMode('hub');
      setMealAddBookId(null);
    }
  }, [initialMealAdd?.nonce]);

  const closeMealAddDialog = () => {
    setMealAddDialog(null);
    setMealAddMode('hub');
    setMealAddBookId(null);
    setMealAddYtUrl('');
  };
  const pickMealAddRecipe = (recipeId) => {
    const target = mealAddDialog;
    closeMealAddDialog();
    if (target?.date && target?.slot && onPickRecipeFromMealAdd) {
      onPickRecipeFromMealAdd(target.date, target.slot, recipeId);
    } else {
      onOpenRecipe?.(recipeId);
    }
  };
  const mealAddBooks = window.RECIPEBOOK_SAMPLES || [];
  const mealAddBook = mealAddBooks.find(b => b.id === mealAddBookId);
  const mealAddHaveSet = new Set(Object.values(pantry || {}).filter(v => v.have).map(v => v.name));
  const mealAddPantryMatches = RECIPES.map(r => {
    const need = r.ingredients.length || 1;
    const matched = r.ingredients.filter(i => mealAddHaveSet.has(i.name)).length;
    return { r, score: Math.round((matched / need) * 100), matched, need };
  }).sort((a, b) => b.score - a.score);
  const mealAddLeftovers = [];
  Object.keys(planner || {}).forEach(day => {
    ['м•„м№Ё', 'м җмӢ¬', 'м Җл…Ғ'].forEach(mealSlot => {
      mealItems(planner[day]?.[mealSlot]).forEach((meal, mealIndex) => {
        if (meal.status === 'cooked' && !meal.ateAt) {
          const recipe = RECIPES.find(r => r.id === meal.recipeId);
          if (recipe) mealAddLeftovers.push({ day, mealSlot, mealIndex, meal, recipe });
        }
      });
    });
  });
  const mealAddBackBtn = (
    <button onClick={() => { setMealAddMode('hub'); setMealAddBookId(null); }} style={{
      border: `1px solid ${T.border}`, background: '#fff', color: T.text2,
      borderRadius: 9999, padding: '7px 12px', fontSize: 12, fontWeight: 800,
      cursor: 'pointer', marginBottom: 14,
    }}>вҶҗ мӢқмӮ¬ м¶”к°Җ</button>
  );
  const mealAddRecipeRow = (recipe, meta, extra) => (
    <button key={recipe.id + (meta || '')} onClick={() => pickMealAddRecipe(recipe.id)} style={{
      display: 'flex', alignItems: 'center', gap: 12,
      background: '#fff', border: `1px solid ${T.border}`, borderRadius: 12,
      padding: 12, cursor: 'pointer', textAlign: 'left',
    }}>
      <div style={{
        width: 56, height: 56, borderRadius: 10, background: recipe.bg,
        display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 30,
      }}>{recipe.emoji}</div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 14, fontWeight: 800, color: T.ink }}>{recipe.name}</div>
        {extra || <div style={{ fontSize: 11, color: T.text3, marginTop: 2 }}>{meta || `${recipe.minutes}л¶„ В· ${recipe.servings}мқёл¶„`}</div>}
      </div>
      <span style={{ fontSize: 12, fontWeight: 800, color: T.mintDeep, background: T.mintSoft, padding: '6px 10px', borderRadius: 8 }}>м¶”к°Җ</span>
    </button>
  );
  const renderMealAddDialogBody = () => {
    if (!mealAddDialog) return null;
    if (mealAddMode === 'books') {
      return (
        <>
          {mealAddBackBtn}
          {!mealAddBook ? (
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
              {mealAddBooks.map(book => (
                <button key={book.id} onClick={() => setMealAddBookId(book.id)} style={{
                  display: 'flex', alignItems: 'center', gap: 12,
                  background: '#fff', border: `1px solid ${T.border}`, borderRadius: 12,
                  padding: '12px 14px', cursor: 'pointer', textAlign: 'left',
                }}>
                  <span style={{ fontSize: 24 }}>{book.emoji}</span>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 800, color: T.ink }}>{book.name}</div>
                    <div style={{ fontSize: 10, color: T.text3, marginTop: 2 }}>{(book.recipeIds || []).length}к°ң л ҲмӢңн”ј В· {book.kind === 'saved' ? 'м ҖмһҘ' : 'лӮҙ мұ…'}</div>
                  </div>
                  {Icon.chevR(T.text4)}
                </button>
              ))}
            </div>
          ) : (
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
              {(mealAddBook.recipeIds || []).map(id => RECIPES.find(r => r.id === id)).filter(Boolean).map(recipe => mealAddRecipeRow(recipe))}
            </div>
          )}
        </>
      );
    }
    if (mealAddMode === 'pantry') {
      return (
        <>
          {mealAddBackBtn}
          <div style={{ fontSize: 12, color: T.mintDeep, fontWeight: 800, marginBottom: 12 }}>ліҙмң  мһ¬лЈҢк°Җ л§Һмқҙ л§һлҠ” л ҲмӢңн”јл¶Җн„° ліҙм—¬л“ңл Өмҡ”.</div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
            {mealAddPantryMatches.slice(0, 8).map(({ r, score, matched, need }) => mealAddRecipeRow(r, null, (
              <MatchProgressBar score={score} sub={`${matched}/${need}к°ң ліҙмң `} compact style={{ marginTop: 7 }} />
            )))}
          </div>
        </>
      );
    }
    if (mealAddMode === 'leftover') {
      return (
        <>
          {mealAddBackBtn}
          {mealAddLeftovers.length === 0 ? (
            <div style={{ padding: 30, textAlign: 'center', color: T.text3, fontSize: 13 }}>м¶”к°Җн•  лӮЁмқҖ мҡ”лҰ¬к°Җ м—Ҷм–ҙмҡ”.</div>
          ) : (
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
              {mealAddLeftovers.map(item => mealAddRecipeRow(item.recipe, `${item.day} ${item.mealSlot} В· лӮЁмқҖ мҡ”лҰ¬ ${item.meal.servings || 1}мқёл¶„`))}
            </div>
          )}
        </>
      );
    }
    if (mealAddMode === 'youtube') {
      const canImport = mealAddYtUrl.trim().length > 0;
      return (
        <>
          {mealAddBackBtn}
          <input value={mealAddYtUrl} onChange={e => setMealAddYtUrl(e.target.value)} autoFocus
            placeholder="мң нҠңлёҢ URL л¶ҷм—¬л„Јкё°" style={{ ...dskInputStyle, background: '#fff', marginBottom: 12 }} />
          <button disabled={!canImport} onClick={() => {
            showToast?.('мҳҒмғҒм—җм„ң л ҲмӢңн”јлҘј к°Җм ёмҷ”м–ҙмҡ”');
            pickMealAddRecipe('r5');
          }} style={{
            ...dskPrimaryBtn, width: '100%', opacity: canImport ? 1 : 0.5,
            cursor: canImport ? 'pointer' : 'default',
          }}>к°Җм ёмҳӨкё°</button>
        </>
      );
    }
    return (
      <>
        <div style={{
          display: 'flex', alignItems: 'center', gap: 8,
          background: T.surfaceFill, borderRadius: 10, padding: '0 12px', height: 40,
          marginBottom: 16, border: `1px solid ${T.border}`,
        }}>
          {Icon.search()}
          <input
            placeholder="л ҲмӢңн”ј кІҖмғү"
            onFocus={() => { const d = mealAddDialog; closeMealAddDialog(); onMenuAdd(d.date, d.slot, 'search'); }}
            style={{
              flex: 1, border: 'none', background: 'transparent', outline: 'none',
              fontSize: 14, color: T.ink, fontFamily: T.fontUI,
            }}
          />
        </div>

function DesktopPantry({ pantry, setPantry, onOpenAdd, onOpenBundle }) {
  const [query, setQuery] = dUseState('');
  const [activeCat, setActiveCat] = dUseState('м „мІҙ');
  const [deleteMode, setDeleteMode] = dUseState(false);
  const [selected, setSelected] = dUseState(new Set());
  const categories = ['м „мІҙ', ...PANTRY_CATEGORIES];
  const sections = {};
  Object.entries(pantry).forEach(([key, item]) => {
    if (!item.have) return;
    if (query && !item.name.includes(query)) return;
    if (activeCat !== 'м „мІҙ' && item.section !== activeCat) return;
    if (!sections[item.section]) sections[item.section] = [];
    sections[item.section].push({ key, ...item });
  });
  const totalHave = Object.values(pantry).filter(x => x.have).length;
  const total = PANTRY_ADD_ITEMS.length;
  const sectionEntries = Object.entries(sections);
  const toggleSelected = (key) => setSelected(prev => {
    const next = new Set(prev);
    next.has(key) ? next.delete(key) : next.add(key);
    return next;
  });
  const deleteSelected = () => {
    if (selected.size === 0) return;
    setPantry(p => {

// Desktop: SHOPPING_FLOW (= ShoppingCreate, P1.1)
function DesktopShoppingCreateScreen({ planner, pantry, presetDate, presetSlot, presetMealIndex, onBack, onComplete, showToast }) {
  const singleMealMode = presetDate && presetSlot && presetMealIndex != null;
  // Aggregate ingredients from registered meals
  const items = dUseMemo(() => {
    const acc = {};
    Object.entries(planner).forEach(([date, day]) => {
      ['м•„м№Ё','м җмӢ¬','м Җл…Ғ'].forEach(slot => {
        if (singleMealMode && (date !== presetDate || slot !== presetSlot)) return;
        mealItems(day[slot]).forEach((m, mealIndex) => {
          if (singleMealMode && mealIndex !== presetMealIndex) return;
          if (m.status === 'cooked') return;
          const r = RECIPES.find(x => x.id === m.recipeId);
          if (!r) return;
          r.ingredients.forEach(ing => {
            const key = ing.name;
            const have = Object.values(pantry || {}).some(p => p.name === ing.name && p.have);
            if (!acc[key]) acc[key] = { name: ing.name, qty: ing.qty || 'м•Ҫк°„', section: ing.section || 'кё°нғҖ', meals: [], have };
            acc[key].meals.push(`${date} ${slot} В· ${r.name}`);
          });
        });
      });
    });
    return Object.values(acc);
  }, [planner, pantry, presetDate, presetSlot, presetMealIndex]);
  const [localSkipRevived, setLocalSkipRevived] = dUseState(new Set());
  const [localBuyExcluded, setLocalBuyExcluded] = dUseState(new Set());

  const sections = ['мұ„мҶҢ','мңЎлҘҳ','н•ҙмӮ°л¬ј','мң м ңн’Ҳ','кіЎлҘҳ','м–‘л…җ','кё°нғҖ'];
  const buy = items.filter(i => (!i.have || localSkipRevived.has(i.name)) && !localBuyExcluded.has(i.name));
  const skip = items.filter(i => (i.have && !localSkipRevived.has(i.name)) || localBuyExcluded.has(i.name));
  const grouped = sections.map(sec => ({ sec, list: buy.filter(i => i.section === sec) })).filter(g => g.list.length > 0);
  const shoppingListTitle = singleMealMode ? `${presetDate} ${presetSlot} мқҢмӢқ мһҘліҙкё°` : '2026.05.10 В· мһҘліҙкё° лӘ©лЎқ';
  const completeCurrentShopping = () => {
    const skipNames = new Set(skip.map(i => i.name));
    const currentItems = items.map(i => {
      const isHave = skipNames.has(i.name);
      return {
        ...i,
        fromMeals: i.meals,
        have: isHave,
        checked: !isHave,
      };
    });
    onComplete?.({
      id: 'sl_' + Date.now(),
      name: shoppingListTitle,
      createdAt: '2026-05-10',
      status: 'active',
      items: currentItems,
    });
    /* CONTRACT_CHECK: POST /shopping-lists вҖ” vNextм—җм„ңлҠ” UI shapeл§Ң */
  };
  const moveToSkip = (name) => {
    setLocalBuyExcluded(s => new Set(s).add(name));
    setLocalSkipRevived(s => {
      const n = new Set(s);
      n.delete(name);
      return n;
    });
  };
  const reviveToBuy = (name) => {
    setLocalBuyExcluded(s => {
      const n = new Set(s);
      n.delete(name);
      return n;
    });
    setLocalSkipRevived(s => new Set(s).add(name));
  };
  const desktopMoveBtn = {
    border: `1px solid ${T.border}`, background: '#fff', color: T.text2,
    borderRadius: 9999, padding: '6px 10px', fontSize: 11, fontWeight: 800,
    whiteSpace: 'nowrap', cursor: 'pointer', flexShrink: 0,
  };

  return (
    <div>
      <button onClick={onBack} style={{
        background: 'none', border: 'none', cursor: 'pointer',
        color: T.text2, fontSize: 13, fontWeight: 600, marginBottom: 14,
        display: 'inline-flex', alignItems: 'center', gap: 6,
      }}>{Icon.chevL(T.text2)} лҸҢм•„к°Җкё°</button>

      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20 }}>
        <div>
          <div style={{ fontSize: 22, fontWeight: 800, color: T.ink, fontFamily: T.fontBrand }}>{shoppingListTitle}</div>
          <div style={{ fontSize: 13, color: T.text3, marginTop: 2 }}>
            {singleMealMode ? 'н•ҙлӢ№ мқҢмӢқ кё°мӨҖ' : 'мқҙлІҲ мЈј л“ұлЎқлҗң мӢқлӢЁ кё°мӨҖ'} В· кө¬л§Ө мҳҲм • {buy.length}к°ң В· нҢ¬нҠёлҰ¬ м ңмҷё {skip.length}к°ң
          </div>
        </div>
        <div style={{ display: 'flex', gap: 10 }}>
          <button disabled={buy.length === 0} onClick={completeCurrentShopping} style={{
            padding: '10px 18px', borderRadius: 8, border: 'none',
            background: buy.length === 0 ? T.border : T.mint, color: buy.length === 0 ? T.text4 : '#fff',
            fontSize: 13, fontWeight: 800, cursor: buy.length === 0 ? 'default' : 'pointer',
          }}>мһҘліҙкё° мҷ„лЈҢ</button>
          <button onClick={() => showToast?.('кіөмң  л§ҒнҒ¬к°Җ ліөмӮ¬лҗҗм–ҙмҡ”')} style={{
            padding: '10px 16px', borderRadius: 8, border: 'none',
            background: T.surfaceFill, color: T.ink, fontSize: 13, fontWeight: 800, cursor: 'pointer',
          }}>кіөмң </button>
        </div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 320px', gap: 24, alignItems: 'start' }}>
        <div style={{ background: '#fff', borderRadius: 14, padding: 8, boxShadow: T.shadowDeep }}>
          <div style={{ padding: '12px 16px 4px', fontSize: 14, fontWeight: 800, color: T.ink }}>мһҘліј мһ¬лЈҢ лӘ©лЎқ</div>
          {grouped.map(g => (
            <div key={g.sec} style={{ padding: '12px 16px' }}>
              <div style={{ fontSize: 12, fontWeight: 800, color: T.text2, marginBottom: 8 }}>{g.sec} ({g.list.length})</div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 8 }}>
                {g.list.map(it => (
                  <div key={it.name} style={{
                    display: 'flex', alignItems: 'center', gap: 10,
                    padding: '10px 12px', borderRadius: 10,
                    background: T.surfaceFill,
                  }}>
                    <span style={{ fontSize: 14 }}>рҹӣ’</span>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 13, fontWeight: 700, color: T.ink }}>{it.name}</div>
                      <div style={{ fontSize: 10, color: T.text3, marginTop: 2 }}>{it.meals.slice(0, 2).join(' В· ')}{it.meals.length > 2 ? ` мҷё ${it.meals.length - 2}` : ''}</div>
                    </div>
                    <span style={{ fontSize: 11, color: T.text3, fontWeight: 600 }}>{it.qty}</span>
                    <button onClick={() => moveToSkip(it.name)} style={desktopMoveBtn}>мқҙлҜёмһҲмқҢ</button>
                  </div>
                ))}
              </div>
            </div>
          ))}
          {grouped.length === 0 && (
            <div style={{ padding: 40, textAlign: 'center', color: T.text3, fontSize: 13 }}>
              мһҘліј мһ¬лЈҢк°Җ м—Ҷм–ҙмҡ”. м•„лһҳ мһ¬лЈҢлҘј лҗҳмӮҙлҰ¬л©ҙ лӘ©лЎқм—җ лӢӨмӢң л“Өм–ҙк°Җмҡ”.
            </div>
          )}
          <div style={{ padding: '18px 16px 14px', borderTop: `1px solid ${T.surfaceSubtle}` }}>
            <div style={{ fontSize: 14, fontWeight: 800, color: T.ink, marginBottom: 10 }}>
              нҢ¬нҠёлҰ¬м—җ мһҲм–ҙм„ң м ңмҷёлҗң мһ¬лЈҢ <span style={{ color: T.text4 }}>В· {skip.length}</span>
            </div>
            {skip.length === 0 ? (
              <div style={{ padding: 18, borderRadius: 10, background: T.surfaceFill, color: T.text3, fontSize: 13, textAlign: 'center' }}>
                м ңмҷёлҗң мһ¬лЈҢк°Җ м—Ҷм–ҙмҡ”.
              </div>
            ) : (
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 8 }}>
                {skip.map(it => (
                  <div key={it.name} style={{
                    display: 'flex', alignItems: 'center', gap: 10,
                    padding: '10px 12px', borderRadius: 10, background: T.surfaceSubtle,
                  }}>
                    <span style={{ fontSize: 14, color: T.text4 }}>вң“</span>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 13, fontWeight: 700, color: T.text4 }}>{it.name}</div>
                      <div style={{ fontSize: 10, color: T.text3, marginTop: 2 }}>{it.qty} В· {it.meals.length}лҒјм—җ мӮ¬мҡ©</div>
                    </div>
                    <button onClick={() => reviveToBuy(it.name)} style={{ ...desktopMoveBtn, color: T.mintDeep }}>лҗҳмӮҙлҰ¬кё°</button>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>

        <aside style={{ background: '#fff', borderRadius: 14, padding: 20, boxShadow: T.shadowDeep, position: 'sticky', top: 24 }}>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            <Stat label="мқҙлІҲ мЈј мқҢмӢқ" value={Object.values(planner).reduce((a, d) => a + ['м•„м№Ё','м җмӢ¬','м Җл…Ғ'].reduce((sum, s) => sum + mealItems(d[s]).length, 0), 0) + 'к°ң'} />
            <Stat label="н•„мҡ”н•ң мһ¬лЈҢ" value={items.length + 'к°ң'} />

// Desktop: COOK_MODE (= CookRun, P1.1)
function DesktopCookRunScreen({ date, slot, mealIndex = 0, recipeId, planner, onBack, onComplete, showToast }) {
  const meal = date && slot ? mealItems(planner[date]?.[slot])[mealIndex] : null;
  const recipe = RECIPES.find(r => r.id === (recipeId || meal?.recipeId));
  const independentCook = !!recipeId && !meal;
  const [consumed, setConsumed] = dUseState(new Set());
  const [confirmCancel, setConfirmCancel] = dUseState(false);
  if (!recipe) {
    return (
      <div>
        <button onClick={onBack} style={{ background: 'none', border: 'none', cursor: 'pointer', color: T.text2, fontSize: 13, fontWeight: 600, marginBottom: 14 }}>{Icon.chevL(T.text2)} лҸҢм•„к°Җкё°</button>

  const steps = recipe.steps || [{ text: 'л ҲмӢңн”ј лӢЁкі„ м •ліҙк°Җ м—Ҷм–ҙмҡ”' }];

  return (
    <div>
      <button onClick={() => setConfirmCancel(true)} style={{
        background: 'none', border: 'none', cursor: 'pointer',
        color: T.text2, fontSize: 13, fontWeight: 600, marginBottom: 14,

          <div style={{ fontSize: 11, color: T.text3, fontWeight: 700, letterSpacing: 1 }}>

        </div>
        <div style={{ fontSize: 13, color: T.text3 }}>{steps.length}лӢЁкі„</div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1.4fr 1fr', gap: 24, alignItems: 'start' }}>
        {/* All steps вҖ” scrollable main area */}
        <main style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          {steps.map((cur, i) => {

            return (

                <div style={{ padding: 22 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
                    <span style={{
                      fontSize: 11, fontWeight: 800, color: '#fff', background: m.border,
                      padding: '3px 10px', borderRadius: 9999,
                    }}>STEP {i + 1}</span>
                    <span style={{
                      fontSize: 11, fontWeight: 700, color: m.text, background: m.bg,
                      padding: '3px 8px', borderRadius: 9999,
                    }}>{m.label}</span>
                  </div>
                  <div style={{ fontSize: 18, fontWeight: 700, color: T.ink, lineHeight: 1.55, marginBottom: 8, fontFamily: T.fontBrand }}>
                    {cur.title || `лӢЁкі„ ${i + 1}`}
                  </div>
                  <div style={{ fontSize: 14, color: T.text1, lineHeight: 1.6 }}>
                    {cur.body || cur.text || ''}
                  </div>
                </div>
              </div>
            );
          })}

	        </main>

	        <aside style={{ display: 'flex', flexDirection: 'column', gap: 16, position: 'sticky', top: 24 }}>
	          <div style={{ background: '#fff', borderRadius: 12, padding: 16, boxShadow: T.shadowDeep }}>
	            <div style={{ display: 'flex', gap: 10 }}>
	              <button onClick={() => setConfirmCancel(true)} style={{
	                padding: '12px 16px', borderRadius: 10, border: `1px solid ${T.border}`,
	                background: '#fff', color: T.text2, fontSize: 13, fontWeight: 800, cursor: 'pointer',
	                whiteSpace: 'nowrap',
	              }}>м·ЁмҶҢ</button>
	              <button onClick={() => {
                  if (independentCook) {
                    showToast?.('рҹҺү мҡ”лҰ¬ мҷ„лЈҢ!');
                    onBack?.();
                  } else {
                    onComplete?.(date, slot, [...consumed], mealIndex);
                  }
                }} style={{
	                flex: 1, padding: '12px 18px', borderRadius: 10, border: 'none',
	                background: T.mint, color: '#fff', fontSize: 14, fontWeight: 900, cursor: 'pointer',
	                fontFamily: T.fontBrand, whiteSpace: 'nowrap',

            <div style={{ fontSize: 11, color: T.text3, marginBottom: 10 }}>мҷ„лЈҢ мӢң нҢ¬нҠёлҰ¬м—җм„ң м°Ёк°җлҸјмҡ”. м•Ҳ м“ҙ мһ¬лЈҢлҠ” мІҙнҒ¬ н•ҙм ң.</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
              {recipe.ingredients.slice(0, 8).map(ing => {
                const on = consumed.has(ing.name);
                return (
                  <button key={ing.name} onClick={() => setConsumed(s => {
                    const n = new Set(s); if (n.has(ing.name)) n.delete(ing.name); else n.add(ing.name); return n;
                  })} style={{
                    display: 'flex', alignItems: 'center', gap: 8, padding: '6px 8px', borderRadius: 6,
                    background: on ? T.mintSoft : 'transparent', border: 'none', cursor: 'pointer', textAlign: 'left',
                  }}>
                    <span style={{
                      width: 16, height: 16, borderRadius: 4,
                      background: on ? T.mint : 'transparent',
                      border: on ? 'none' : `1.5px solid ${T.border}`,
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      color: '#fff', fontSize: 11, fontWeight: 800,
                    }}>{on ? 'вң“' : ''}</span>
                    <span style={{ fontSize: 12, color: T.ink, flex: 1 }}>{ing.name}</span>
                  </button>
                );
              })}
            </div>
          </div>
        </aside>
      </div>

      {confirmCancel && (
        <div style={{ position: 'fixed', inset: 0, zIndex: 9500 }}>
          <ConfirmDialog title="мҡ”лҰ¬лҘј м·ЁмҶҢн• к№Ңмҡ”?"
            body="м§„н–ү мӨ‘мқё мҡ”лҰ¬ кё°лЎқмқҙ мӮ¬лқјм ёмҡ”."
            destructive confirmLabel="м·ЁмҶҢн•ҳкё°" cancelLabel="кі„мҶҚн•ҳкё°"
            onClose={() => setConfirmCancel(false)}
            onConfirm={() => { setConfirmCancel(false); onBack(); }} />
        </div>
      )}
    </div>
  );
}

// Desktop: SETTINGS (P1.2)
function DesktopSettingsScreen({ profile, onBack, onUpdateProfile, onLogout, onDeleteAccount, showToast }) {
  const defaultPrefs = { keepAwake: true, voice: false, autoNext: false };
  const defaultMealColumns = ['м•„м№Ё', 'м җмӢ¬', 'м Җл…Ғ'];
  const [savedPrefs, setSavedPrefs] = dUseState(defaultPrefs);
  const [draftPrefs, setDraftPrefs] = dUseState(defaultPrefs);
  const [savedMealColumns, setSavedMealColumns] = dUseState(defaultMealColumns);
  const [mealColumns, setMealColumns] = dUseState(defaultMealColumns);
  const [newMealName, setNewMealName] = dUseState('');
  const [section, setSection] = dUseState('planner');
  const prefsDirty = JSON.stringify(savedPrefs) !== JSON.stringify(draftPrefs);
  const normalizedMealColumns = mealColumns.map(name => name.trim()).filter(Boolean);
  const mealColumnsDirty = JSON.stringify(savedMealColumns) !== JSON.stringify(normalizedMealColumns);
  const mealColumnsValid = normalizedMealColumns.length === mealColumns.length && normalizedMealColumns.length > 0;
  const settingsDirty = prefsDirty || mealColumnsDirty;
  const setDraftPref = (key, value) => setDraftPrefs(prev => ({ ...prev, [key]: value }));
  const saveSettings = () => {
    if (!mealColumnsValid) {
      showToast?.('лҒјлӢҲ мқҙлҰ„мқ„ лӘЁл‘җ мһ…л Ҙн•ҙмЈјм„ёмҡ”');
      return;
    }
    setSavedPrefs(draftPrefs);
    setSavedMealColumns(normalizedMealColumns);
    setMealColumns(normalizedMealColumns);
    showToast?.('нҷҳкІҪм„Өм •мқҙ м ҖмһҘлҗҗм–ҙмҡ”');
  };
  const cancelSettings = () => {
    setDraftPrefs(savedPrefs);
    setMealColumns(savedMealColumns);
    setNewMealName('');
    showToast?.('нҷҳкІҪм„Өм • ліҖкІҪмқ„ м·ЁмҶҢн–Ҳм–ҙмҡ”');
  };

  const addMealColumn = () => {
    const name = newMealName.trim();
    if (!name) return;
    if (mealColumns.length >= 5) {
      showToast?.('лҒјлӢҲ м»¬лҹјмқҖ мөңлҢҖ 5к°ңк№Ңм§Җ к°ҖлҠҘн•ҙмҡ”');
      return;
    }
    if (mealColumns.includes(name)) {
      showToast?.('мқҙлҜё мһҲлҠ” лҒјлӢҲмҳҲмҡ”');
      return;
    }
    setMealColumns(cols => [...cols, name]);
    setNewMealName('');
    showToast?.('лҒјлӢҲ м»¬лҹјмқҙ м¶”к°Җлҗҗм–ҙмҡ”');
  };
  const updateMealColumn = (idx, value) => {
    setMealColumns(cols => cols.map((name, i) => i === idx ? value : name));
  };
  const removeMealColumn = (idx) => {
    setMealColumns(cols => cols.filter((_, i) => i !== idx));
    showToast?.('лҒјлӢҲ м»¬лҹјмқҙ мӮӯм ңлҗҗм–ҙмҡ”');
  };

  const sections = [
    { k: 'planner', label: 'н”Ңлһҳл„Ҳ лҒјлӢҲ', emoji: 'рҹ—“пёҸ' },
    { k: 'cook',    label: 'мҡ”лҰ¬ лӘЁл“ң', emoji: 'рҹҚі' },
    { k: 'notif',   label: 'м•ҢлҰј', emoji: 'рҹ””' },
    { k: 'data',    label: 'лҚ°мқҙн„° В· л°ұм—…', emoji: 'рҹ’ҫ' },
  ];

  return (
    <div>
      <button onClick={onBack} style={{
        background: 'none', border: 'none', cursor: 'pointer',
        color: T.text2, fontSize: 13, fontWeight: 600, marginBottom: 16,
        display: 'inline-flex', alignItems: 'center', gap: 6,
      }}>{Icon.chevL(T.text2)} л§ҲмқҙнҺҳмқҙм§Җ</button>

      <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 20 }}>
        <div style={{ fontSize: 22, fontWeight: 800, color: T.ink, fontFamily: T.fontBrand }}>м„Өм •</div>
        <div style={{ fontSize: 12, color: T.text3 }}>н•„мҡ”н•ң м„Өм •мқҖ м ҖмһҘ нӣ„ л°ҳмҳҒлҸјмҡ”</div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '220px 1fr', gap: 24, alignItems: 'start' }}>
        <aside style={{ display: 'flex', flexDirection: 'column', gap: 4, position: 'sticky', top: 24 }}>
          {sections.map(s => (
            <button key={s.k} onClick={() => setSection(s.k)} style={{
              textAlign: 'left', padding: '11px 14px', borderRadius: 10,
              background: section === s.k ? T.mintSoft : 'transparent',
              border: section === s.k ? `1px solid ${T.mint}` : '1px solid transparent',
              color: section === s.k ? T.mintDeep : T.text1,
              fontSize: 13, fontWeight: 700, cursor: 'pointer',
              display: 'flex', alignItems: 'center', gap: 10,
            }}>
              <span style={{ fontSize: 16 }}>{s.emoji}</span>{s.label}
            </button>
          ))}
        </aside>

        <main style={{ background: '#fff', borderRadius: 16, padding: 28, boxShadow: T.shadowDeep, minHeight: 400 }}>
          {section === 'planner' && (
            <div>
              <div style={{ fontSize: 16, fontWeight: 800, color: T.ink, marginBottom: 18 }}>н”Ңлһҳл„Ҳ лҒјлӢҲ м»¬лҹј</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                {mealColumns.map((name, idx) => (
                  <div key={`${name}-${idx}`} style={{

                    padding: 12, borderRadius: 12, border: `1px solid ${T.border}`, background: T.surfaceFill,
                  }}>
                    <input value={name} onChange={e => updateMealColumn(idx, e.target.value)}
                      style={{ ...inp, background: '#fff', padding: '11px 12px', fontSize: 13 }}
                      aria-label={`лҒјлӢҲ м»¬лҹј ${idx + 1}`} />
                    <button onClick={() => removeMealColumn(idx)} disabled={mealColumns.length <= 1} style={{
                      width: 40, height: 40, borderRadius: 10, border: `1px solid ${T.border}`,
                      background: mealColumns.length <= 1 ? T.surfaceFill : '#fff',
                      color: mealColumns.length <= 1 ? T.text4 : T.red,
                      cursor: mealColumns.length <= 1 ? 'not-allowed' : 'pointer',
                      fontSize: 17, fontWeight: 800,
                    }}>Г—</button>
                  </div>
                ))}
                {mealColumns.length < 5 && (
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr auto', gap: 10, marginTop: 4 }}>
                    <input value={newMealName} onChange={e => setNewMealName(e.target.value)}
                      onKeyDown={e => { if (e.key === 'Enter') addMealColumn(); }}
                      placeholder="мғҲ лҒјлӢҲ мқҙлҰ„"
                      style={{ ...inp, padding: '12px 14px', fontSize: 13 }} />
                    <button onClick={addMealColumn} style={{
                      padding: '0 16px', borderRadius: 10, border: 'none',
                      background: T.mint, color: '#fff', fontSize: 13, fontWeight: 800,
                      cursor: 'pointer', whiteSpace: 'nowrap',
                    }}>+ лҒјлӢҲ м»¬лҹј м¶”к°Җ</button>
                  </div>
                )}
                <div style={{ fontSize: 11, color: mealColumns.length >= 5 ? T.red : T.text3, marginTop: 2 }}>{mealColumns.length}/5к°ң</div>
              </div>
            </div>
          )}
          {section === 'cook' && (
            <div>
              <div style={{ fontSize: 16, fontWeight: 800, color: T.ink, marginBottom: 18 }}>мҡ”лҰ¬ лӘЁл“ң</div>
              <DesktopToggleRow label="нҷ”л©ҙ мјңл‘ " sub="мҡ”лҰ¬ мӨ‘ нҷ”л©ҙмқҙ кәјм§Җм§Җ м•Ҡм•„мҡ”" on={draftPrefs.keepAwake} onChange={(v) => setDraftPref('keepAwake', v)} />
              <DesktopToggleRow label="мқҢм„ұ м•ҲлӮҙ" sub="лӢЁкі„ мқҢм„ұмқ„ мқҪм–ҙмӨҳмҡ” (лІ нғҖ)" on={draftPrefs.voice} onChange={(v) => setDraftPref('voice', v)} />
              <DesktopToggleRow label="нғҖмқҙлЁё лҒқлӮҳл©ҙ лӢӨмқҢ лӢЁкі„ мһҗлҸҷ" sub="нғҖмқҙлЁё мў…лЈҢ мӢң мһҗлҸҷмңјлЎң лӢӨмқҢ лӢЁкі„лЎң л„ҳм–ҙк°‘лӢҲлӢӨ" on={draftPrefs.autoNext} onChange={(v) => setDraftPref('autoNext', v)} />
            </div>
          )}
          {section === 'notif' && (
            <div>
              <div style={{ fontSize: 16, fontWeight: 800, color: T.ink, marginBottom: 18 }}>м•ҢлҰј</div>
              <div style={{ background: T.surfaceFill, borderRadius: 10, padding: 24, fontSize: 13, color: T.text2, textAlign: 'center' }}>
                м•ҢлҰј м„Өм •мқҖ лӢӨмқҢ Waveм—җм„ң м ңкіөлҸјмҡ”. нҳ„мһ¬лҠ” лӘЁл‘җ кё°ліё м„Өм •мңјлЎң лҸҷмһ‘н•©лӢҲлӢӨ.
              </div>
            </div>
          )}
          {section === 'data' && (
            <div>
              <div style={{ fontSize: 16, fontWeight: 800, color: T.ink, marginBottom: 18 }}>лҚ°мқҙн„° В· л°ұм—…</div>
              <DesktopSettingRow label="лҚ°мқҙн„° лӮҙліҙлӮҙкё°" sub="мӢқлӢЁВ·л ҲмӢңн”јВ·нҢ¬нҠёлҰ¬лҘј JSONмңјлЎң л°ӣм•„мҡ”"
                right={<button onClick={() => showToast?.('лӮҙліҙлӮҙкё°лҠ” лӢӨмқҢ Wave (лІ нғҖ)')} style={editLinkBtnDsk}>лӮҙліҙлӮҙкё°</button>} />
              <DesktopSettingRow label="кё°кё° лҚ°мқҙн„° мҙҲкё°нҷ”" sub="мқҙ кё°кё°мқҳ мһ„мӢң мәҗмӢңл§Ң л№„мӣҒлӢҲлӢӨ"
                right={<button onClick={() => showToast?.('мәҗмӢңк°Җ л№„мӣҢмЎҢм–ҙмҡ”')} style={editLinkBtnDsk}>мҙҲкё°нҷ”</button>} />
            </div>
          )}
          <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 8, marginTop: 22 }}>
            <button disabled={!settingsDirty} onClick={cancelSettings} style={{
              padding: '10px 16px', borderRadius: 10, border: `1px solid ${T.border}`,

              cursor: settingsDirty && mealColumnsValid ? 'pointer' : 'not-allowed',
            }}>м ҖмһҘ</button>
          </div>
        </main>
      </div>
    </div>
  );
}

// Desktop: MEAL_SCREEN (P1.2)
function DesktopMealDetailScreen({ date, slot, planner, onBack, onOpenRecipe, onStartCook, onCreateShopping, onChangeStatus, onRemove, onChangeServings }) {
  const meals = mealItems(planner[date]?.[slot]);
  const [askDelete, setAskDelete] = dUseState(null);
  if (meals.length === 0) {
    return (
      <div>
        <button onClick={onBack} style={{ background: 'none', border: 'none', cursor: 'pointer', color: T.text2, fontSize: 13, fontWeight: 600, marginBottom: 14 }}>{Icon.chevL(T.text2)} лҸҢм•„к°Җкё°</button>
        <div style={{ padding: 60, textAlign: 'center', color: T.text3 }}>лҒјлӢҲлҘј м°ҫмқ„ мҲҳ м—Ҷм–ҙмҡ”</div>
      </div>
    );
  }

  /* в”Җв”Җв”Җ Unified desktop card renderer в”Җв”Җв”Җ */
  const DskMealCard = ({ meal, mealIndex }) => {
    const recipe = RECIPES.find(r => r.id === meal.recipeId);
    if (!recipe) return null;
    return (
      <div style={{
        background: '#fff', borderRadius: 16, boxShadow: T.shadowDeep, overflow: 'hidden',
        border: `1px solid ${T.border}`, position: 'relative',
      }}>
        {/* Trash icon вҖ” top-right */}
        <button aria-label="мӮӯм ң" onClick={() => setAskDelete({ index: mealIndex, recipe })} style={{
          position: 'absolute', top: 14, right: 14, zIndex: 1,
          width: 34, height: 34, borderRadius: 17, border: 'none',
          background: T.surfaceFill, cursor: 'pointer',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>{Icon.trash(T.text3, 16)}</button>

        <div style={{ display: 'grid', gridTemplateColumns: '112px 1fr', gap: 14, padding: 16 }}>
          <div style={{
            width: 112, height: 112, borderRadius: 14, background: recipe.bg,
            display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 62,
          }}>{recipe.emoji}</div>
          <div style={{ minWidth: 0, paddingRight: 30 }}>
            <button onClick={() => onOpenRecipe?.(recipe.id)} style={{
              background: 'none', border: 'none', padding: 0, cursor: 'pointer', textAlign: 'left',
            }}>
              <div style={{ fontSize: 18, fontWeight: 800, color: T.ink, fontFamily: T.fontBrand, marginBottom: 4 }}>
                {recipe.name}
              </div>
            </button>
            <div style={{ fontSize: 12, color: T.text3 }}>
              {recipe.minutes}л¶„ В· {meal.servings}мқёл¶„
            </div>
          </div>
        </div>

        <div style={{ padding: '0 16px 16px' }}>
          {/* Servings stepper */}
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', background: T.surfaceFill, borderRadius: 12, padding: 12, marginBottom: 12 }}>
            <span style={{ fontSize: 12, color: T.text2, fontWeight: 800 }}>кі„нҡҚ мқёл¶„</span>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <button onClick={() => onChangeServings?.(date, slot, Math.max(1, meal.servings - 1), mealIndex)} style={dskRoundBtn}>вҲ’</button>
              <span style={{ minWidth: 48, textAlign: 'center', fontSize: 16, fontWeight: 800, color: T.ink }}>{meal.servings}мқёл¶„</span>
              <button onClick={() => onChangeServings?.(date, slot, Math.min(12, meal.servings + 1), mealIndex)} style={{ ...dskRoundBtn, background: T.mint, color: '#fff' }}>+</button>
            </div>
          </div>

          {/* Ingredient chips */}
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginBottom: 14 }}>
            {recipe.ingredients.slice(0, 6).map(ing => (
              <span key={ing.name} style={{ fontSize: 11, color: T.text2, background: T.surfaceFill, padding: '6px 9px', borderRadius: 9999 }}>
                {ing.name}
              </span>
            ))}
          </div>

          {/* Actions: мһҘліҙкё° + мҡ”лҰ¬н•ҳкё° */}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
            <button onClick={() => onCreateShopping?.(date, slot, mealIndex)} style={dskMealActionBtn}>мһҘліҙкё°</button>
            <button onClick={() => onStartCook?.(date, slot, mealIndex)} style={{ ...dskMealActionBtn, background: T.mint, borderColor: T.mint, color: '#fff' }}>мҡ”лҰ¬н•ҳкё°</button>
          </div>
        </div>
      </div>
    );
  };

  const totalServings = meals.reduce((sum, meal) => sum + (meal.servings || 1), 0);

  return (
    <div>
      <button onClick={onBack} style={{
        background: 'none', border: 'none', cursor: 'pointer',
        color: T.text2, fontSize: 13, fontWeight: 600, marginBottom: 14,
        display: 'inline-flex', alignItems: 'center', gap: 6,
      }}>{Icon.chevL(T.text2)} н”Ңлһҳл„Ҳ</button>

      <div style={{
        background: '#fff', borderRadius: 18, boxShadow: T.shadowDeep, padding: 28, marginBottom: 22,
        display: 'grid', gridTemplateColumns: '1fr 280px', gap: 24, alignItems: 'center',
      }}>
        <div>
          <div style={{ fontSize: 12, color: T.mintDeep, fontWeight: 800, letterSpacing: 1, marginBottom: 6 }}>
            {date} В· {slot}
          </div>
          <div style={{ fontSize: 28, fontWeight: 800, color: T.ink, fontFamily: T.fontBrand }}>
            {meals.length > 1 ? `${slot}м—җ лЁ№мқ„ мқҢмӢқ ${meals.length}к°ң` : (RECIPES.find(r => r.id === meals[0]?.recipeId)?.name || slot)}
          </div>
          <div style={{ fontSize: 13, color: T.text3, marginTop: 6 }}>
            {meals.length > 1 ? 'н•ң лҒјлӢҲ м•Ҳм—җм„ң м—¬лҹ¬ л ҲмӢңн”јмқҳ мқёл¶„кіј мҡ”лҰ¬лҘј кҙҖлҰ¬н•ҙмҡ”.' : 'мқҙ лҒјлӢҲмқҳ мқёл¶„кіј мһ¬лЈҢлҘј нҷ•мқён•ҳм„ёмҡ”.'}
          </div>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
          <Stat label="мқҢмӢқ мҲҳ" value={meals.length + 'к°ң'} />
          <Stat label="мҙқ мқёл¶„" value={totalServings + 'мқёл¶„'} color={T.mintDeep} />
        </div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(320px, 1fr))', gap: 16 }}>
        {meals.map((meal, mealIndex) => (
          <DskMealCard key={`${meal.recipeId}-${mealIndex}`} meal={meal} mealIndex={mealIndex} />
        ))}
      </div>

      {askDelete && (
        <div style={{ position: 'fixed', inset: 0, zIndex: 9500 }}>
          <ConfirmDialog title="мқҙ мқҢмӢқмқ„ мӮӯм ңн• к№Ңмҡ”?"
            body={askDelete.recipe.name + ' (' + date + ' ' + slot + ') к°Җ мӢқлӢЁм—җм„ң м ңкұ°лҸјмҡ”.'}
            destructive confirmLabel="мӮӯм ң"
            onClose={() => setAskDelete(null)}
            onConfirm={() => { const idx = askDelete.index; setAskDelete(null); onRemove?.(date, slot, idx); }} />
        </div>
      )}
    </div>
  );
}

// Desktop: COOK_READY_LIST (P1.2)
function DesktopCookListScreen({ planner, onBack, onStartCook, onOpenMeal }) {
  const days = Object.keys(planner);
  const todayK = days[todayIdx];
  const tomorrowK = days[todayIdx + 1];
  const groups = [
    { k: 'today',   label: 'мҳӨлҠҳ',                dayKeys: [todayK],                emoji: 'рҹҢҹ' },
    { k: 'tomorrow', label: 'лӮҙмқј',               dayKeys: [tomorrowK],             emoji: 'вҸӯпёҸ' },
    { k: 'rest',    label: 'мқҙлІҲ мЈј лӮЁмқҖ лҒјлӢҲ',     dayKeys: days.slice(todayIdx + 2), emoji: 'рҹ“…' },
  ];
  const buildMeals = (dayKeys) => {
    const list = [];
    dayKeys.forEach(d => {
      ['м•„м№Ё','м җмӢ¬','м Җл…Ғ'].forEach(s => {
        mealItems(planner[d]?.[s]).forEach((m, mealIndex) => {
          if (m.status !== 'cooked') list.push({ date: d, slot: s, meal: m, mealIndex });
        });
      });
    });
    return list;
  };
  const totalReady = groups.reduce((acc, g) => acc + buildMeals(g.dayKeys).length, 0);

  return (
    <div>
      <button onClick={onBack} style={{

}

// Desktop: MANUAL_RECIPE_CREATE (P1.3)
function DesktopManualRecipeCreateScreen({ presetDate, presetSlot, onBack, onCreated, showToast }) {
  const [name, setName]         = dUseState('');
  const [emoji, setEmoji]       = dUseState('рҹҚҪпёҸ');
  const [minutes, setMinutes]   = dUseState(20);
  const [servings, setServings] = dUseState(2);
  const [ingredients, setIngredients] = dUseState([]);
  const [steps, setSteps]       = dUseState(['']);
  const [ingModal, setIngModal] = dUseState(false);
  const ingredientsComplete = ingredients.length > 0 && ingredients.every(i => i.name && String(i.amount || '').trim());
  const stepsComplete = steps.length > 0 && steps.every(s => s.trim());
  const valid = name.trim().length > 0 && ingredientsComplete && stepsComplete;
  const slotLabel = presetDate && presetSlot ? `${presetDate} ${presetSlot}` : 'н”Ңлһҳл„Ҳ лҜём„ нғқ';
  const warnNumericOnly = () => showToast?.('мһ¬лЈҢ мҲҳлҹүмқҖ мҲ«мһҗл§Ң мһ…л Ҙн•  мҲҳ мһҲм–ҙмҡ”');
  const blockNonNumericInput = (e) => {
    const text = e.data ?? e.clipboardData?.getData('text') ?? '';
    if (text && /[^0-9]/.test(text)) {
      e.preventDefault();
      warnNumericOnly();
    }
  };
  const setIngredientAmount = (idx, value) => {
    if (/[^0-9]/.test(value)) warnNumericOnly();
    const amount = value.replace(/[^0-9]/g, '');
    setIngredients(ingredients.map((x, j) => j === idx ? { ...x, amount } : x));
  };
  const submit = () => {
    if (!valid) {
      showToast?.('мһ¬лЈҢ мҲҳлҹүкіј мЎ°лҰ¬лІ• л№Ҳм№ёмқ„ мұ„мӣҢмЈјм„ёмҡ”');
      return;
    }
    const recipe = {
      id: 'r_user_' + Date.now(), name: name.trim(), emoji, minutes, servings,
      bg: T.mintSoft, rating: 5, saves: 0, kcal: 0,
      ingredients: ingredients.map(i => ({ name: i.name, qty: (i.amount || '') + (i.unit || 'g'), section: i.category || 'м§Ғм ‘ мһ…л Ҙ' })),
      steps: steps.filter(s => s.trim()).map(s => ({ text: s.trim(), kind: 'etc' })),
      tags: ['м§Ғм ‘ л“ұлЎқ'], theme: 'м§‘л°Ҙ', method: 'prep',
    };
    onCreated?.(recipe, presetDate, presetSlot);
    showToast?.('л ҲмӢңн”јк°Җ л“ұлЎқлҗҗм–ҙмҡ”');
  };
  return (
    <div>
      <DskBackLink onClick={onBack} label="мӢқмӮ¬ м¶”к°Җ" />
      <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 20 }}>
        <div>
          <div style={{ fontSize: 22, fontWeight: 800, color: T.ink, fontFamily: T.fontBrand }}>м§Ғм ‘ л ҲмӢңн”ј л“ұлЎқ</div>
          <div style={{ fontSize: 13, color: T.text3, marginTop: 2 }}>лҢҖмғҒ: {slotLabel}</div>
        </div>
        <button onClick={submit} disabled={!valid} style={{
          padding: '11px 20px', borderRadius: 10, border: 'none',
          background: valid ? T.mint : T.surfaceFill,
          color: valid ? '#fff' : T.text4,
          fontSize: 13, fontWeight: 800, cursor: valid ? 'pointer' : 'default',
        }}>мҷ„лЈҢ</button>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1.4fr 1fr', gap: 24, alignItems: 'start' }}>
        <main style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          {/* Basic info */}
          <div style={{ background: '#fff', borderRadius: 14, padding: 22, boxShadow: T.shadowDeep }}>
            <div style={{ fontSize: 13, fontWeight: 800, color: T.text2, marginBottom: 14 }}>кё°ліё м •ліҙ</div>
            <DesktopFormRow label="мқҙлӘЁм§Җ">
              <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                {['рҹҚҪпёҸ','рҹҚі','рҹҘҳ','рҹҚІ','рҹҚқ','рҹҚ”','рҹҘ—','рҹҚЈ','рҹҚ•','рҹҢ®','рҹҚң','рҹҘҹ'].map(e => (
                  <button key={e} onClick={() => setEmoji(e)} style={{
                    width: 40, height: 40, fontSize: 22, borderRadius: 10,
                    background: emoji === e ? T.mintSoft : T.surfaceFill,
                    border: emoji === e ? `1px solid ${T.mint}` : '1px solid transparent',
                    cursor: 'pointer',
                  }}>{e}</button>
                ))}
              </div>
            </DesktopFormRow>
            <DesktopFormRow label="л ҲмӢңн”ј мқҙлҰ„ *">
              <input value={name} onChange={e => setName(e.target.value)} placeholder="мҳҲ: м—„л§Ҳн‘ң к№Җм№ҳм°Ңк°ң"
                style={dskInputStyle} />
            </DesktopFormRow>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
              <DesktopFormRow label="мЎ°лҰ¬мӢңк°„ (л¶„)">
                <input type="number" min={1} max={300} value={minutes} onChange={e => setMinutes(parseInt(e.target.value)||0)} style={dskInputStyle} />
              </DesktopFormRow>
              <DesktopFormRow label="кё°мӨҖ мқёл¶„">
                <input type="number" min={1} max={12} value={servings} onChange={e => setServings(parseInt(e.target.value)||1)} style={dskInputStyle} />
              </DesktopFormRow>
            </div>
          </div>

          {/* Ingredients */}
          <div style={{ background: '#fff', borderRadius: 14, padding: 22, boxShadow: T.shadowDeep }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
              <div style={{ fontSize: 13, fontWeight: 800, color: T.text2 }}>мһ¬лЈҢ ({ingredients.length})</div>

            {ingredients.length === 0 ? (
              <button onClick={() => setIngModal(true)} style={{
                width: '100%', padding: 18, borderRadius: 12,

            ) : ingredients.map((it, i) => (
              <div key={it.name} style={{ display: 'grid', gridTemplateColumns: '2fr 90px 104px 32px', gap: 8, marginBottom: 8, alignItems: 'center' }}>
                <div style={{ fontSize: 13, fontWeight: 800, color: T.ink }}>{it.name}</div>
                <input type="text" inputMode="numeric" pattern="[0-9]*" value={it.amount || ''}

function DskDialogFooter({ children }) {

    <div style={{
      display: 'flex', gap: 8, justifyContent: 'flex-end',
