// Desktop: MANUAL_RECIPE_CREATE (P1.3)
function DesktopManualRecipeCreateScreen({ presetDate, presetSlot, onBack, onCreated, showToast }) {
  const [name, setName]         = dUseState('');
  const [emoji, setEmoji]       = dUseState('🍽️');
  const [minutes, setMinutes]   = dUseState(20);
  const [servings, setServings] = dUseState(2);
  const [ingredients, setIngredients] = dUseState([]);
  const [steps, setSteps]       = dUseState(['']);
  const [ingModal, setIngModal] = dUseState(false);
  const valid = name.trim().length > 0 && ingredients.length > 0;
  const slotLabel = presetDate && presetSlot ? `${presetDate} ${presetSlot}` : '플래너 미선택';
  const submit = () => {
    const recipe = {
      id: 'r_user_' + Date.now(), name: name.trim(), emoji, minutes, servings,
      bg: T.mintSoft, rating: 5, saves: 0, kcal: 0,
      ingredients: ingredients.map(i => ({ name: i.name, qty: (i.amount || '') + (i.unit || 'g'), section: i.category || '직접 입력' })),
      steps: steps.filter(s => s.trim()).map(s => ({ text: s.trim(), kind: 'etc' })),
      tags: ['직접 등록'], theme: '집밥', method: 'prep',
    };
    onCreated?.(recipe, presetDate, presetSlot);
    showToast?.('레시피가 등록됐어요');
  };
  return (
    <div>
      <DskBackLink onClick={onBack} label="식사 추가" />
      <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 20 }}>
        <div>
          <div style={{ fontSize: 22, fontWeight: 800, color: T.ink, fontFamily: T.fontBrand }}>직접 레시피 등록</div>
          <div style={{ fontSize: 13, color: T.text3, marginTop: 2 }}>대상: {slotLabel}</div>
        </div>
        <button onClick={submit} disabled={!valid} style={{
          padding: '11px 20px', borderRadius: 10, border: 'none',
          background: valid ? T.mint : T.surfaceFill,
          color: valid ? '#fff' : T.text4,
          fontSize: 13, fontWeight: 800, cursor: valid ? 'pointer' : 'default',
        }}>등록 + 플래너 추가</button>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1.4fr 1fr', gap: 24, alignItems: 'start' }}>
        <main style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          {/* Basic info */}
          <div style={{ background: '#fff', borderRadius: 14, padding: 22, boxShadow: T.shadowDeep }}>
            <div style={{ fontSize: 13, fontWeight: 800, color: T.text2, marginBottom: 14 }}>기본 정보</div>
            <DesktopFormRow label="이모지">
              <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                {['🍽️','🍳','🥘','🍲','🍝','🍔','🥗','🍣','🍕','🌮','🍜','🥟'].map(e => (
                  <button key={e} onClick={() => setEmoji(e)} style={{
                    width: 40, height: 40, fontSize: 22, borderRadius: 10,
                    background: emoji === e ? T.mintSoft : T.surfaceFill,
                    border: emoji === e ? `1px solid ${T.mint}` : '1px solid transparent',
                    cursor: 'pointer',
                  }}>{e}</button>
                ))}
              </div>
            </DesktopFormRow>
            <DesktopFormRow label="레시피 이름 *">
              <input value={name} onChange={e => setName(e.target.value)} placeholder="예: 엄마표 김치찌개"
                style={dskInputStyle} />
            </DesktopFormRow>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
              <DesktopFormRow label="조리시간 (분)">
                <input type="number" min={1} max={300} value={minutes} onChange={e => setMinutes(parseInt(e.target.value)||0)} style={dskInputStyle} />
              </DesktopFormRow>
              <DesktopFormRow label="기준 인분">
                <input type="number" min={1} max={12} value={servings} onChange={e => setServings(parseInt(e.target.value)||1)} style={dskInputStyle} />
              </DesktopFormRow>
            </div>
          </div>

          {/* Ingredients */}
          <div style={{ background: '#fff', borderRadius: 14, padding: 22, boxShadow: T.shadowDeep }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
              <div style={{ fontSize: 13, fontWeight: 800, color: T.text2 }}>재료 ({ingredients.length})</div>
              <button onClick={() => setIngModal(true)} style={dskAddBtn}>+ 재료 선택</button>
            </div>
            {ingredients.length === 0 ? (
              <button onClick={() => setIngModal(true)} style={{
                width: '100%', padding: 18, borderRadius: 12,
                border: `1.5px dashed ${T.mint}`, background: T.mintSoft,
                color: T.mintDeep, fontSize: 13, fontWeight: 800, cursor: 'pointer',

        title: '백종원 김치찌개 (자동 추출)',

      minutes: 25, servings: 4, bg: '#FFE4B5',

      ingredients: parsed.ingredients,
      steps: parsed.steps.map(s => ({ text: s, kind: 'etc' })),

              padding: '10px 18px', borderRadius: 8, border: 'none',

            }}>{loading ? '추출 중…' : '가져오기'}</button>

            <div style={{ padding: 40, textAlign: 'center', color: T.text3, fontSize: 12 }}>

const { useState: useState_X, useMemo: useMemo_X } = React;

// Utility — collect aggregated ingredients across selected planner slots
function aggregateIngredients(planner, selection, pantry) {
  const map = new Map();
  selection.forEach(({ date, slot, mealIndex }) => {
    const slotMeals = mealItems(planner[date]?.[slot]);
    const targets = mealIndex == null ? slotMeals : [slotMeals[mealIndex]].filter(Boolean);
    targets.forEach((meal) => {
      const recipe = RECIPES.find(r => r.id === meal.recipeId);
      if (!recipe) return;
      recipe.ingredients.forEach(ing => {
        const key = ing.name;
        const have = Object.values(pantry || {}).some(p => p.name === ing.name && p.have);
        if (!map.has(key)) {
          map.set(key, { name: ing.name, qty: ing.qty, section: ing.section, have, fromMeals: [] });
        }
        map.get(key).fromMeals.push(`${date} ${slot} · ${recipe.name}`);
      });
    });
  });
  return [...map.values()];
}

  days.forEach(d => {
    ['아침','점심','저녁'].forEach(s => {
      mealItems(planner[d]?.[s]).forEach((m, mealIndex) => {
        if (m.status !== 'cooked') initialSel.push({ date: d, slot: s, mealIndex });
      });
    });
  });
  const [selection, setSelection] = useState_X(initialSel);
  const [checked, setChecked] = useState_X(new Set());

  const items = useMemo_X(() => aggregateIngredients(planner, selection, pantry), [selection, planner, pantry]);
  const sectionsMap = items.reduce((acc, it) => {
    (acc[it.section] = acc[it.section] || []).push(it); return acc;
  }, {});
  const needed = items.filter(it => !it.have);
  const progress = needed.length ? Math.round([...checked].filter(k => needed.find(n => n.name === k)).length / needed.length * 100) : 0;

  const toggleSel = (date, slot, mealIndex) => {
    setSelection(s => {
      const exists = s.find(x => x.date === date && x.slot === slot && x.mealIndex === mealIndex);
      return exists ? s.filter(x => x !== exists) : [...s, { date, slot, mealIndex }];
    });
  };
  const toggleCheck = (name) => {
    setChecked(c => {
      const n = new Set(c);
      n.has(name) ? n.delete(name) : n.add(name);

                      }}>{recipe.emoji}</div>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 14, fontWeight: 600, color: T.ink }}>{recipe.name}</div>
                        <div style={{ fontSize: 11, color: T.text3 }}>
                          {s} #{mealIndex + 1} · {m.servings}인분 {cooked && '· 요리 완료'}
                        </div>
                      </div>
                    </button>
                    );
                  });
                })}
              </div>
            );
          })}
        </div>

        <div style={{
          position: 'absolute', bottom: 0, left: 0, right: 0, padding: 16,
          background: '#fff', borderTop: `1px solid ${T.border}`,
        }}>
          <Button full disabled={selection.length === 0} onClick={() => setStep('review')}>
            {selection.length}개 음식 재료 모으기
          </Button>
        </div>
      </div>
    );
  }

  // step === 'review'
  return (
    <div style={{ background: T.surfaceFill, minHeight: '100%', paddingBottom: 140 }}>
      <AppBar title="장보기 목록" left={<button onClick={() => setStep('select')} style={iconBtn}>{Icon.chevL()}</button>} />

      <div style={{ background: '#fff', padding: 20, borderBottom: `1px solid ${T.border}` }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
          <div>
            <div style={{ fontSize: 12, color: T.mintDeep, fontWeight: 700, marginBottom: 4 }}>STEP 2 / 2</div>
            <div style={{ fontSize: 20, fontWeight: 700, color: T.ink, fontFamily: T.fontBrand }}>
              {needed.length}개 재료를 사야 해요
            </div>
          </div>
          <div style={{ fontSize: 32, fontWeight: 700, color: T.mint, fontFamily: T.fontBrand }}>{progress}%</div>
        </div>
        <div style={{ height: 6, background: T.surfaceSubtle, borderRadius: 3, marginTop: 12, overflow: 'hidden' }}>
          <div style={{ width: `${progress}%`, height: '100%', background: T.mint, transition: 'width 0.2s' }} />
        </div>
      </div>

      <div style={{ padding: 16 }}>
        {Object.entries(sectionsMap).map(([sec, list]) => (
          <div key={sec} style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 12, color: T.text3, fontWeight: 700, marginBottom: 8, padding: '0 4px' }}>
              {sec} <span style={{ color: T.text4 }}>· {list.length}</span>
            </div>
            <div style={{ background: '#fff', borderRadius: 12, overflow: 'hidden', border: `1px solid ${T.border}` }}>
              {list.map((it, i) => {
                const isChecked = checked.has(it.name);
                return (
                  <button key={it.name} disabled={it.have} onClick={() => toggleCheck(it.name)} style={{
                    width: '100%', display: 'flex', alignItems: 'center', gap: 12,
                    padding: '14px 16px', border: 'none', background: 'none', cursor: it.have ? 'default' : 'pointer',
                    borderBottom: i < list.length - 1 ? `1px solid ${T.surfaceSubtle}` : 'none',
                    textAlign: 'left',
                  }}>
                    <div style={{
                      width: 22, height: 22, borderRadius: 11,
                      background: it.have ? T.mintSoft : (isChecked ? T.mint : '#fff'),
                      border: `1.5px solid ${it.have ? T.mint : (isChecked ? T.mint : T.border)}`,
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                    }}>{(isChecked || it.have) && Icon.check(it.have ? T.mintDeep : '#fff')}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{
                        fontSize: 15, fontWeight: 600, color: it.have ? T.text4 : T.ink,
                        textDecoration: isChecked ? 'line-through' : 'none',
                      }}>{it.name}</div>
                      <div style={{ fontSize: 11, color: T.text3, marginTop: 2 }}>
                        {it.qty} · {it.fromMeals.length}끼에 사용
                      </div>
                    </div>
                    {it.have ? (
                      <span style={{ fontSize: 11, fontWeight: 700, color: T.mintDeep, background: T.mintSoft, padding: '3px 8px', borderRadius: 4 }}>보유</span>
                    ) : (
                      <span style={{ fontSize: 11, color: T.text3 }}>{isChecked ? '담음' : ''}</span>
                    )}
                  </button>
                );
              })}
            </div>
          </div>
        ))}
      </div>

      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, padding: 16,
        background: '#fff', borderTop: `1px solid ${T.border}`,
        display: 'flex', gap: 8,
      }}>
        <Button variant="neutral" onClick={() => { showToast('공유 링크가 복사됐어요'); }}>공유</Button>
        <Button full disabled={checked.size === 0} onClick={() => onAddToPantry([...checked])}>
          담은 재료 팬트리에 추가 ({checked.size})
        </Button>
      </div>
    </div>
  );
}

function CookListScreen({ planner, onBack, onStartCook, onOpenMeal }) {
  const days = Object.keys(planner);

  return (
    <div style={{ background: T.surfaceFill, minHeight: '100%', paddingBottom: 100 }}>

// ─────────────────────────────────────────────────────
// 요리하기 진행 페이지
// ─────────────────────────────────────────────────────
function CookRunScreen({ date, slot, mealIndex = 0, planner, onBack, onComplete, showToast }) {
  const meal = mealItems(planner[date]?.[slot])[mealIndex];
  if (!meal) return <div style={{ padding: 40 }}>끼니를 찾을 수 없어요</div>;
  const recipe = RECIPES.find(r => r.id === meal.recipeId);
  const [stepIdx, setStepIdx] = useState_X(0);
  const [seconds, setSeconds] = useState_X(0);
  const [running, setRunning] = useState_X(true);

  React.useEffect(() => {
    if (!running) return;
    const t = setInterval(() => setSeconds(s => s + 1), 1000);
    return () => clearInterval(t);
  }, [running]);

  const step = recipe.steps[stepIdx];
  const m = METHOD_COLORS[step.method] || METHOD_COLORS.prep;
  const fmt = (s) => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

  const next = () => {
    if (stepIdx < recipe.steps.length - 1) setStepIdx(stepIdx + 1);
    else setShowConsumed(true);
  };
  const [showConsumed, setShowConsumed] = useState_X(false);

  return (
    <div style={{ background: '#0E1014', minHeight: '100%', color: '#fff', display: 'flex', flexDirection: 'column' }}>
      {/* Top bar */}
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '52px 16px 14px',
      }}>
        <button onClick={onBack} style={{ ...iconBtn, background: 'rgba(255,255,255,0.1)' }}>{Icon.chevL('#fff')}</button>
        <div style={{ textAlign: 'center' }}>
          <div style={{ fontSize: 11, opacity: 0.6, fontWeight: 600 }}>{recipe.name}</div>
          <div style={{ fontSize: 13, fontWeight: 700, fontFamily: T.fontBrand }}>
            {stepIdx + 1} / {recipe.steps.length} 스텝
          </div>
        </div>
        <button onClick={() => showToast('레시피 노트 — 추후 구현')}
          style={{ ...iconBtn, background: 'rgba(255,255,255,0.1)' }}>📝</button>
      </div>

      {/* Progress dots */}
      <div style={{ display: 'flex', gap: 4, padding: '0 16px 12px' }}>
        {recipe.steps.map((s, i) => (
          <div key={i} style={{
            flex: 1, height: 3, borderRadius: 2,
            background: i <= stepIdx ? T.mint : 'rgba(255,255,255,0.15)',
          }} />
        ))}
      </div>

      {/* Big timer */}
      <div style={{ padding: '8px 16px 0', textAlign: 'center' }}>
        <div style={{ fontSize: 11, opacity: 0.5, fontWeight: 600, letterSpacing: 1 }}>경과 시간</div>
        <div style={{ fontSize: 56, fontWeight: 800, fontFamily: '"SF Mono", monospace', letterSpacing: 2, marginTop: 4 }}>
          {fmt(seconds)}
        </div>
        <div style={{ fontSize: 12, opacity: 0.6 }}>예상 {recipe.minutes}분 · 이번 스텝 약 {step.minutes}분</div>
      </div>

      {/* Step card */}
      <div style={{ flex: 1, padding: 16, display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
        <div style={{
          background: m.bg, borderRadius: 20, padding: 24,
          color: '#1a1a2e', borderLeft: `6px solid ${m.border}`,
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12 }}>
            <span style={{
              fontSize: 12, fontWeight: 700, color: m.text, background: '#fff',
              padding: '4px 10px', borderRadius: 9999,
            }}>{m.label}</span>
            <span style={{ fontSize: 12, color: m.text, fontWeight: 600 }}>약 {step.minutes}분</span>
          </div>
          <div style={{ fontSize: 22, fontWeight: 800, color: '#1a1a2e', marginBottom: 10, fontFamily: T.fontBrand }}>
            {step.title}
          </div>
          <div style={{ fontSize: 16, color: '#1a1a2e', lineHeight: 1.55 }}>{step.body}</div>
        </div>

        {/* Mini ingredients hint */}
        <div style={{
          marginTop: 14, background: 'rgba(255,255,255,0.06)', padding: 12, borderRadius: 10,
          fontSize: 12, color: 'rgba(255,255,255,0.7)', lineHeight: 1.5,
        }}>
          <span style={{ color: T.mint, fontWeight: 700 }}>이 단계 재료</span> · {recipe.ingredients.slice(0, 3).map(i => `${i.name} ${i.qty}`).join(', ')}…
        </div>
      </div>

      {/* Bottom controls */}
      <div style={{
        padding: '12px 16px 28px', display: 'flex', gap: 8, alignItems: 'center',
        background: 'linear-gradient(180deg, transparent, rgba(0,0,0,0.5))',
      }}>
        <button onClick={() => setStepIdx(Math.max(0, stepIdx - 1))} disabled={stepIdx === 0}
          style={{
            background: 'rgba(255,255,255,0.12)', color: '#fff', border: 'none',
            height: 56, padding: '0 18px', borderRadius: 12, fontSize: 14, fontWeight: 700,
            cursor: stepIdx === 0 ? 'default' : 'pointer', opacity: stepIdx === 0 ? 0.4 : 1,
          }}>이전</button>
        <button onClick={() => setRunning(r => !r)} style={{
          background: 'rgba(255,255,255,0.12)', color: '#fff', border: 'none',
          width: 56, height: 56, borderRadius: 28, fontSize: 18, cursor: 'pointer',
        }}>{running ? '⏸' : '▶'}</button>
        <button onClick={next} style={{
          flex: 1, background: T.mint, color: '#fff', border: 'none',
          height: 56, borderRadius: 12, fontSize: 16, fontWeight: 800, cursor: 'pointer',
          fontFamily: T.fontBrand, letterSpacing: 0.5,
        }}>{stepIdx === recipe.steps.length - 1 ? '✓ 요리 완료' : '다음 스텝 →'}</button>
      </div>
      {showConsumed && (
        <ConsumedIngredientSheet recipe={recipe}
          onClose={() => setShowConsumed(false)}
          onConfirm={(picked) => { setShowConsumed(false); onComplete(date, slot, picked, mealIndex); }} />
      )}
    </div>
  );
}

        <ConfirmDialog title="이 음식을 삭제할까요?"

      r.name.includes(ql) ||
      (r.ingredients || []).some(i => i.name.includes(ql))

            style={{ border: 'none', background: 'transparent', flex: 1, fontSize: 14, outline: 'none' }} />

      </div>
      <div style={{ padding: 16 }}>

// ─────────────────────────────────────────────────────────────
// PantryMatchPicker — 팬트리 기반 추천
// ─────────────────────────────────────────────────────────────
function PantryMatchPicker({ pantry, slotLabel, onBack, onPick }) {
  const have = new Set(Object.values(pantry || {}).filter(p => p.have).map(p => p.name));
  const ranked = useMemo_W(() => {
    return RECIPES.map(r => {
      const ings = r.ingredients || [];
      const hit = ings.filter(i => have.has(i.name)).length;
      const ratio = ings.length ? hit / ings.length : 0;
      return { r, hit, total: ings.length, ratio, missing: ings.filter(i => !have.has(i.name)).map(i => i.name) };
    }).sort((a, b) => b.ratio - a.ratio);
  }, [pantry]);

  return (
    <div style={{ background: T.surfaceFill, minHeight: '100%' }}>
      <AppBar title="팬트리 기반 추천" left={<button onClick={onBack} style={iconBtn}>{Icon.chevL()}</button>} />
      <div style={{ padding: '14px 16px', background: T.mintSoft, borderBottom: `1px solid ${T.border}` }}>
        <div style={{ fontSize: 12, color: T.mintDeep, fontWeight: 700, lineHeight: 1.5 }}>
          팬트리에 있는 재료로 만들 수 있는 요리부터 보여드려요. 부족한 재료는 장보기 목록으로 모아보세요.
        </div>
      </div>
      <div style={{ padding: 12 }}>
        {ranked.map(({ r, hit, total, missing }) => (
          <button key={r.id} onClick={() => onPick(r.id)} style={{
            width: '100%', display: 'flex', gap: 12, padding: 12,
            background: '#fff', border: `1px solid ${T.border}`, borderRadius: 12,
            marginBottom: 8, cursor: 'pointer', textAlign: 'left',
          }}>
            <div style={{
              width: 64, height: 64, borderRadius: 10, background: r.bg,
              display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 32,
            }}>{r.emoji}</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 14, fontWeight: 700, color: T.ink }}>{r.name}</div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginTop: 4 }}>
                <span style={{
                  fontSize: 11, fontWeight: 700, color: T.mintDeep,
                  background: T.mintSoft, padding: '3px 8px', borderRadius: 4,
                }}>재료 {hit}/{total}</span>
                <div style={{
                  flex: 1, height: 4, background: T.surfaceSubtle,
                  borderRadius: 2, overflow: 'hidden',
                }}>
                  <div style={{ width: `${(hit/Math.max(1,total))*100}%`, height: '100%', background: T.mint }} />
                </div>
              </div>
              {missing.length > 0 && (
                <div style={{ fontSize: 11, color: T.text3, marginTop: 6, lineHeight: 1.4 }}>
                  부족 · {missing.slice(0, 3).join(', ')}{missing.length > 3 ? ` 외 ${missing.length-3}` : ''}
                </div>
              )}
            </div>
          </button>
        ))}
      </div>
    </div>
  );
}

function ManualRecipeCreateScreen({ presetDate, presetSlot, onBack, onCreated, showToast }) {
  const [name, setName] = useState_W('');
  const [minutes, setMinutes] = useState_W(20);
  const [servings, setServings] = useState_W(2);
  const [ings, setIngs] = useState_W([]);
  const [steps, setSteps] = useState_W([{ method: 'prep', text: '' }]);
  const [ingModal, setIngModal] = useState_W(false);
  const valid = name.trim() && ings.length > 0 && steps.some(s => s.text.trim());
  const methods = Object.keys(METHOD_COLORS);

  const submit = () => {
    if (!valid) return;
    const id = 'r_manual_' + Date.now();
    onCreated({
      id, name: name.trim(), minutes, servings,
      bg: T.mintSoft, emoji: '🍳', rating: 0, saves: 0, kcal: 0,
      tags: ['직접 등록'], method: 'prep',
      ingredients: ings.map(i => ({ name: i.name, qty: (i.amount || '') + (i.unit || 'g'), section: i.category || '직접 입력' })),
      steps: steps.filter(s => s.text.trim()).map((s, i) => ({ method: s.method, title: `Step ${i+1}`, body: s.text, minutes: 2, text: s.text, time: '약 2분' })),
    }, presetDate, presetSlot);
  };

  return (
    <div style={{ background: T.surfaceFill, minHeight: '100%', paddingBottom: 100 }}>
      <AppBar title="직접 등록" left={<button onClick={onBack} style={iconBtn}>{Icon.chevL()}</button>} />

      <Section title="기본 정보">
        <Field label="요리 이름">
          <input value={name} onChange={e => setName(e.target.value)} placeholder="예: 김치찌개" style={inp} />
        </Field>
        <div style={{ display: 'flex', gap: 8 }}>
          <Field label="조리 시간(분)" style={{ flex: 1 }}>
            <input type="number" value={minutes} onChange={e => setMinutes(+e.target.value || 0)} style={inp} />
          </Field>
          <Field label="기준 인분" style={{ flex: 1 }}>
            <input type="number" value={servings} onChange={e => setServings(+e.target.value || 1)} style={inp} />
          </Field>
        </div>
      </Section>

      {/* 재료 */}
      <Section title="재료" right={
        <span style={{ fontSize: 12, color: T.text3 }}>{ings.length}개 선택됨</span>
      }>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 10 }}>
            {ings.map((it, i) => (
              <div key={it.name} style={{
                display: 'grid', gridTemplateColumns: '1fr 72px 88px 28px',
                gap: 8, alignItems: 'center',
                background: '#fff', border: `1px solid ${T.border}`,
                borderRadius: 10, padding: 10,
              }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: T.ink }}>{it.name}</div>
                <input type="number" inputMode="numeric" value={it.amount || ''}
                  onChange={e => setIngs(ings.map((x, j) => j === i ? { ...x, amount: e.target.value.replace(/[^0-9]/g, '') } : x))}
                  placeholder="양" style={{ ...inp, padding: '7px 8px', textAlign: 'center' }} />
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 4 }}>
                  {['g', 'ml'].map(unit => (
                    <button key={unit} onClick={() => setIngs(ings.map((x, j) => j === i ? { ...x, unit } : x))} style={{
                      border: `1px solid ${it.unit === unit ? T.mint : T.border}`,
                      background: it.unit === unit ? T.mintSoft : '#fff',
                      color: it.unit === unit ? T.mintDeep : T.text2,
                      borderRadius: 7, padding: '7px 0', fontSize: 12, fontWeight: 800, cursor: 'pointer',
                    }}>{unit}</button>
                  ))}
                </div>
                <button onClick={() => setIngs(ings.filter((_, j) => j !== i))} style={{
                  background: T.surfaceFill, border: 'none', color: T.text3,
                  borderRadius: 7, fontSize: 16, cursor: 'pointer', height: 28,
                }}>×</button>
              </div>
            ))}
          </div>
        )}
        <button onClick={() => setIngModal(true)} style={{
          width: '100%', padding: '12px 16px', borderRadius: 10,
          border: `1.5px dashed ${T.mint}`, background: T.mintSoft,
          color: T.mintDeep, fontSize: 13, fontWeight: 700, cursor: 'pointer',
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
        }}>+ 재료 추가하기</button>
        {/* CONTRACT_CHECK: POST /ingredients/search — vNext에서는 UI shape만 */}
      </Section>

      {/* 조리법 */}
      <Section title="조리법" right={
        <button onClick={() => setSteps([...steps, { method: 'prep', text: '' }])} style={addLinkBtn}>+ 단계</button>
      }>
        {steps.map((s, i) => (
          <div key={i} style={{
            background: T.surfaceFill, borderRadius: 10, padding: 12, marginBottom: 8,
            borderLeft: `4px solid ${METHOD_COLORS[s.method].border}`,
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
              <span style={{ fontSize: 12, fontWeight: 700, color: T.text3 }}>STEP {i+1}</span>
              <select value={s.method} onChange={e => setSteps(steps.map((x, j) => j === i ? { ...x, method: e.target.value } : x))}
                style={{
                  fontSize: 11, fontWeight: 700, padding: '4px 8px', borderRadius: 6,
                  border: `1px solid ${METHOD_COLORS[s.method].border}`,
                  background: METHOD_COLORS[s.method].bg, color: METHOD_COLORS[s.method].text,
                }}>
                {methods.map(m => <option key={m} value={m}>{METHOD_COLORS[m].label}</option>)}
              </select>
              {steps.length > 1 && (
                <button onClick={() => setSteps(steps.filter((_, j) => j !== i))}
                  style={{ marginLeft: 'auto', ...removeBtn }}>−</button>
              )}
            </div>
            <textarea value={s.text} onChange={e => setSteps(steps.map((x, j) => j === i ? { ...x, text: e.target.value } : x))}
              rows={2} placeholder="이 단계에서 무엇을 하나요?"
              style={{ ...inp, width: '100%', resize: 'none', minHeight: 56 }} />
          </div>
        ))}
      </Section>

      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, padding: 16,
        background: '#fff', borderTop: `1px solid ${T.border}`,
      }}>
        <Button full disabled={!valid} onClick={submit}>등록하고 다음 단계 →</Button>
      </div>

      {ingModal && <IngredientPickerModal
        selected={ings}
        onConfirm={(picked) => { setIngs(picked); setIngModal(false); }}
        onClose={() => setIngModal(false)} />}
    </div>
  );
}

  const [picks, setPicks] = useState_W(selected.map(s => ({ ...s })));

  const isSelected = (name) => picks.some(p => p.name === name);
  const toggle = (ingName) => {
    if (isSelected(ingName)) {
      setPicks(picks.filter(p => p.name !== ingName));
    } else {
      setPicks([...picks, { name: ingName, amount: '', unit: 'g', category: activeCat }]);
    }
  };

  const updateAmount = (ingName, amount) => {
    setPicks(picks.map(p => p.name === ingName ? { ...p, amount } : p));
  };
  const setUnit = (ingName, unit) => {
    setPicks(picks.map(p => p.name === ingName ? { ...p, unit } : p));
  };

  const filtered = search.trim()
    ? Object.values(DEMO_INGS).flat().filter(n => n.includes(search.trim()))
    : (DEMO_INGS[activeCat] || []);

  return (
    <div style={{
      position: 'fixed', inset: 0, zIndex: 9000,
      background: 'rgba(0,0,0,0.35)', display: 'flex', alignItems: 'flex-end',
    }} onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div style={{
        width: '100%', maxHeight: '85vh', background: '#fff',
        borderRadius: '20px 20px 0 0', display: 'flex', flexDirection: 'column',
        overflow: 'hidden',
      }}>
        {/* Header */}
        <div style={{ padding: '16px 20px 12px', borderBottom: `1px solid ${T.border}` }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
            <span style={{ fontSize: 17, fontWeight: 800, color: T.ink }}>재료 선택</span>
            <button onClick={onClose} style={{ background: 'none', border: 'none', fontSize: 22, color: T.text3, cursor: 'pointer' }}>×</button>
          </div>
          <input autoFocus value={search} onChange={e => setSearch(e.target.value)}
            placeholder="재료 검색..."
            style={{ ...inp, background: T.surfaceFill }} />
        </div>

        {/* Category chips */}
        {!search.trim() && (
          <div style={{ padding: '10px 20px 6px', display: 'flex', gap: 6, overflowX: 'auto' }}>
            {categories.map(cat => (
              <button key={cat} onClick={() => setActiveCat(cat)} style={{
                padding: '7px 14px', borderRadius: 9999, whiteSpace: 'nowrap',
                border: activeCat === cat ? `1.5px solid ${T.mint}` : `1px solid ${T.border}`,
                background: activeCat === cat ? T.mintSoft : '#fff',
                color: activeCat === cat ? T.mintDeep : T.text2,
                fontSize: 12, fontWeight: 700, cursor: 'pointer', flexShrink: 0,
              }}>{cat}</button>
            ))}
          </div>
        )}

        {/* Ingredient grid */}
        <div style={{ flex: 1, overflowY: 'auto', padding: '10px 20px' }}>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
            {filtered.map(ingName => {
              const sel = isSelected(ingName);
              return (
                <button key={ingName} onClick={() => toggle(ingName)} style={{
                  padding: '8px 14px', borderRadius: 9999,
                  border: sel ? `1.5px solid ${T.mint}` : `1px solid ${T.border}`,
                  background: sel ? T.mintSoft : '#fff',
                  color: sel ? T.mintDeep : T.ink,
                  fontSize: 13, fontWeight: sel ? 700 : 500, cursor: 'pointer',
                }}>{sel && '✓ '}{ingName}</button>
              );
            })}
          </div>
        </div>

        {/* Selected items with quantity inputs */}
        {picks.length > 0 && (
          <div style={{ padding: '10px 20px', borderTop: `1px solid ${T.border}`, maxHeight: 180, overflowY: 'auto' }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: T.text3, marginBottom: 8 }}>
              선택된 재료 ({picks.length}개) — 양 입력
            </div>
            {picks.map(p => (
              <div key={p.name} style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
                <span style={{ fontSize: 13, color: T.ink, fontWeight: 600, flex: 1 }}>{p.name}</span>
                <input type="number" value={p.amount} onChange={e => updateAmount(p.name, e.target.value)}
                  placeholder="양" style={{ ...inp, width: 70, textAlign: 'center', padding: '6px 8px', fontSize: 13 }} />
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 4 }}>
                  {['g', 'ml'].map(unit => (
                    <button key={unit} onClick={() => setUnit(p.name, unit)} style={{
                      padding: '6px 9px', borderRadius: 8, fontSize: 12, fontWeight: 800, cursor: 'pointer',
                      border: `1px solid ${p.unit === unit ? T.mint : T.border}`,
                      background: p.unit === unit ? T.mintSoft : '#fff',
                      color: p.unit === unit ? T.mintDeep : T.text2,
                    }}>{unit}</button>
                  ))}
                </div>
              </div>
            ))}
          </div>
        )}

        {/* Footer */}
        <div style={{ padding: '12px 20px 16px', borderTop: `1px solid ${T.border}` }}>
          <Button full onClick={() => onConfirm(picks)}>
            {picks.length > 0 ? `${picks.length}개 재료 확인` : '재료를 선택하세요'}
          </Button>
        </div>
      </div>
    </div>
  );
}
const inp = {
  width: '100%', padding: '10px 12px', fontSize: 14,
  border: `1px solid ${T.border}`, borderRadius: 8, background: '#fff',
  color: T.ink, outline: 'none',

const addLinkBtn = {

};
const removeBtn = {
  width: 36, background: '#fff', border: `1px solid ${T.border}`, color: T.text3,

function Section({ title, right, children }) {

// ─────────────────────────────────────────────────────────────
// YT_IMPORT — URL 입력 → loading → review/edit → 등록 완료
// ─────────────────────────────────────────────────────────────
function YtImportScreen({ presetDate, presetSlot, onBack, onCreated, onAddPlanner, showToast }) {
  // step: 'input' | 'loading' | 'error' | 'review'
  const [step, setStep] = useState_W('input');
  const [url, setUrl] = useState_W('');
  const [draft, setDraft] = useState_W(null);
  const validUrl = /youtu(\.be|be\.com)/i.test(url) || /^https?:\/\//.test(url);

  const startExtract = () => {
    if (!validUrl) return;
    setStep('loading');
    setTimeout(() => {
      // simulate: error 10% chance
      if (url.includes('fail')) { setStep('error'); return; }
      setDraft({
        name: '백종원 김치찌개',
        thumbnail: '🥘',
        bg: '#FFE9E0',
        minutes: 25,
        servings: 2,
        channel: '백종원의 요리비책',
        ingredients: [
          { name: '김치', qty: '300g', section: '냉장' },
          { name: '돼지고기', qty: '200g', section: '냉장' },
          { name: '두부', qty: '1/2모', section: '냉장' },
          { name: '대파', qty: '1대', section: '냉장' },
        ],
        steps: [
          { method: 'prep', text: '김치는 한입 크기로 자르고, 돼지고기는 깍둑썰기 한다.' },
          { method: 'stirfry', text: '냄비에 돼지고기와 김치를 넣고 5분간 볶는다.' },
          { method: 'boil', text: '물 500ml를 붓고 끓인 뒤 두부와 대파를 넣는다.' },
        ],
      });
      setStep('review');
    }, 1400);
  };

  if (step === 'input' || step === 'error') {
    return (
      <div style={{ background: T.surfaceFill, minHeight: '100%' }}>
        <AppBar title="유튜브에서 가져오기" left={<button onClick={onBack} style={iconBtn}>{Icon.chevL()}</button>} />
        <div style={{ padding: 24 }}>
          <div style={{ fontSize: 18, fontWeight: 700, color: T.ink, fontFamily: T.fontBrand, marginBottom: 6 }}>
            유튜브 영상 URL을 붙여넣어 주세요
          </div>
          <div style={{ fontSize: 12, color: T.text3, lineHeight: 1.55, marginBottom: 16 }}>
            영상 설명에서 재료와 조리법을 자동으로 추출해요. 추출 후 직접 다듬을 수 있어요.
          </div>
          <input value={url} onChange={e => setUrl(e.target.value)}
            placeholder="https://youtu.be/..." style={inp} />
          {step === 'error' && (
            <div style={{
              marginTop: 12, padding: 12, background: '#FFF5F5',
              border: `1px solid ${T.red}`, borderRadius: 10, fontSize: 12, color: T.red,
            }}>
              ⚠ 영상에서 레시피를 추출하지 못했어요. URL을 다시 확인하거나 직접 등록해 주세요.
            </div>
          )}
          <div style={{ marginTop: 16, padding: 14, background: '#fff', borderRadius: 10, border: `1px solid ${T.border}` }}>
            <div style={{ fontSize: 12, color: T.text3, fontWeight: 700, marginBottom: 6 }}>이런 영상을 가져올 수 있어요</div>
            <ul style={{ margin: 0, paddingLeft: 18, fontSize: 12, color: T.text2, lineHeight: 1.7 }}>
              <li>설명에 재료 목록이 있는 영상</li>
              <li>10분 이내의 짧은 요리 영상</li>
              <li>한국어 채널 (베타)</li>
            </ul>
          </div>
          <div style={{ marginTop: 24 }}>
            <Button full disabled={!validUrl} onClick={startExtract}>가져오기</Button>
          </div>
        </div>
      </div>
    );
  }

  if (step === 'loading') {
    return (
      <div style={{ background: T.surfaceFill, minHeight: '100%' }}>
        <AppBar title="가져오는 중" left={<button onClick={() => setStep('input')} style={iconBtn}>{Icon.chevL()}</button>} />
        <div style={{ padding: 60, textAlign: 'center' }}>
          <div style={{ fontSize: 56, marginBottom: 14, animation: 'pulse 1.2s infinite' }}>📺</div>
          <div style={{ fontSize: 16, fontWeight: 700, color: T.ink, fontFamily: T.fontBrand }}>레시피를 가져오고 있어요…</div>
          <div style={{ fontSize: 12, color: T.text3, marginTop: 8 }}>최대 30초 정도 걸려요</div>
          <style>{`@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }`}</style>
        </div>
      </div>
    );
  }

  // review
  const setField = (k, v) => setDraft(d => ({ ...d, [k]: v }));
  const setIng = (i, k, v) => setDraft(d => ({ ...d, ingredients: d.ingredients.map((x, j) => j === i ? { ...x, [k]: v } : x) }));
  const setStep_ = (i, k, v) => setDraft(d => ({ ...d, steps: d.steps.map((x, j) => j === i ? { ...x, [k]: v } : x) }));
  const submit = () => {
    const id = 'r_yt_' + Date.now();
    onCreated({
      id, name: draft.name, bg: draft.bg, emoji: draft.thumbnail,
      minutes: draft.minutes, servings: draft.servings,
      rating: 0, saves: 0, kcal: 0, tags: ['유튜브'],
      method: draft.steps[0]?.method || 'prep',
      ingredients: draft.ingredients,
      steps: draft.steps.map((s, i) => ({ method: s.method, title: `Step ${i+1}`, body: s.text, minutes: 2, text: s.text, time: '약 2분' })),
    }, presetDate, presetSlot);
  };

  return (
    <div style={{ background: T.surfaceFill, minHeight: '100%', paddingBottom: 100 }}>
      <AppBar title="추출 결과 확인" left={<button onClick={() => setStep('input')} style={iconBtn}>{Icon.chevL()}</button>} />
      <div style={{ background: '#fff', padding: 16, display: 'flex', gap: 12, alignItems: 'center', borderBottom: `1px solid ${T.border}` }}>
        <div style={{ width: 60, height: 60, borderRadius: 10, background: draft.bg, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 32 }}>
          {draft.thumbnail}
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 11, color: T.text3 }}>{draft.channel}</div>
          <input value={draft.name} onChange={e => setField('name', e.target.value)}
            style={{ ...inp, padding: '4px 0', border: 'none', fontSize: 16, fontWeight: 700 }} />
        </div>
      </div>
      <div style={{ display: 'flex', gap: 0, background: '#fff', padding: '8px 16px', borderBottom: `1px solid ${T.border}` }}>
        <Field label="조리 시간(분)" style={{ flex: 1, marginRight: 8 }}>
          <input type="number" value={draft.minutes} onChange={e => setField('minutes', +e.target.value || 0)} style={inp} />
        </Field>
        <Field label="기준 인분" style={{ flex: 1 }}>
          <input type="number" value={draft.servings} onChange={e => setField('servings', +e.target.value || 1)} style={inp} />
        </Field>
      </div>

      <Section title={`재료 · ${draft.ingredients.length}개`}>
        {draft.ingredients.map((it, i) => (
          <div key={i} style={{ display: 'flex', gap: 8, marginBottom: 8 }}>
            <input value={it.name} onChange={e => setIng(i, 'name', e.target.value)} style={{ ...inp, flex: 1.4 }} />
            <input value={it.qty} onChange={e => setIng(i, 'qty', e.target.value)} style={{ ...inp, flex: 1 }} />
          </div>
        ))}
      </Section>

      <Section title={`조리법 · ${draft.steps.length}단계`}>
        {draft.steps.map((s, i) => (
          <div key={i} style={{
            background: T.surfaceFill, borderRadius: 10, padding: 12, marginBottom: 8,
            borderLeft: `4px solid ${METHOD_COLORS[s.method].border}`,
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
              <span style={{ fontSize: 11, fontWeight: 700, color: T.text3 }}>STEP {i+1}</span>
              <select value={s.method} onChange={e => setStep_(i, 'method', e.target.value)}
                style={{
                  fontSize: 11, fontWeight: 700, padding: '4px 8px', borderRadius: 6,
                  border: `1px solid ${METHOD_COLORS[s.method].border}`,
                  background: METHOD_COLORS[s.method].bg, color: METHOD_COLORS[s.method].text,
                }}>
                {Object.keys(METHOD_COLORS).map(m => <option key={m} value={m}>{METHOD_COLORS[m].label}</option>)}
              </select>
            </div>
            <textarea value={s.text} onChange={e => setStep_(i, 'text', e.target.value)} rows={2}
              style={{ ...inp, width: '100%', resize: 'none', minHeight: 56 }} />
          </div>
        ))}
      </Section>

      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, padding: 16,
        background: '#fff', borderTop: `1px solid ${T.border}`,
      }}>
        <Button full onClick={submit}>등록하고 다음 단계 →</Button>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// SHOPPING_DETAIL — read-only 재열람 + pantry-excluded section + reflect
// list: { id, name, items: [{ name, qty, section, fromMeals[], have, checked? }],
//         status: 'active' | 'completed', completedAt?, pantryReflect? }
// ─────────────────────────────────────────────────────────────
function ShoppingDetailScreen({ list, onBack, onToggleItem, onComplete, onReopen, onReflect, showToast }) {
  if (!list) return <div style={{ padding: 40 }}>장보기 목록을 찾을 수 없어요</div>;
  const completed = list.status === 'completed';

  // group: 사야 함 / 팬트리에 이미 있음
  const buy = list.items.filter(i => !i.have);
  const skip = list.items.filter(i => i.have);
  const checkedCount = buy.filter(i => i.checked).length;
  const allDone = buy.length > 0 && checkedCount === buy.length;
  const sectionsMap = buy.reduce((acc, it) => {
    (acc[it.section] = acc[it.section] || []).push(it); return acc;
  }, {});

  return (
    <div style={{ background: T.surfaceFill, minHeight: '100%', paddingBottom: 130 }}>
      <AppBar title={list.name} left={<button onClick={onBack} style={iconBtn}>{Icon.chevL()}</button>}
        right={completed ? (
          <span style={{
            fontSize: 11, fontWeight: 700, color: T.mintDeep, background: T.mintSoft,
            padding: '4px 10px', borderRadius: 9999,
          }}>완료</span>
        ) : null} />

      {/* 진행 상태 */}
      <div style={{ background: '#fff', padding: 20, borderBottom: `1px solid ${T.border}` }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
          <div>
            <div style={{ fontSize: 12, color: T.text3 }}>
              {completed ? `${list.completedAt || '완료됨'}` : `사야 할 재료 ${buy.length - checkedCount}개`}
            </div>
            <div style={{ fontSize: 18, fontWeight: 700, color: T.ink, fontFamily: T.fontBrand, marginTop: 2 }}>
              {completed ? '장보기 완료' : (allDone ? '모두 담았어요!' : '장보기 진행 중')}
            </div>
          </div>
          {!completed && (
            <div style={{ fontSize: 28, fontWeight: 800, color: T.mint, fontFamily: T.fontBrand }}>
              {Math.round((checkedCount / Math.max(1, buy.length)) * 100)}%
            </div>
          )}
        </div>
        {!completed && (
          <div style={{ height: 6, background: T.surfaceSubtle, borderRadius: 3, marginTop: 12, overflow: 'hidden' }}>
            <div style={{ width: `${(checkedCount / Math.max(1, buy.length)) * 100}%`, height: '100%', background: T.mint }} />
          </div>
        )}
      </div>

      {/* 사야 함 */}
      <div style={{ padding: 16 }}>
        {Object.entries(sectionsMap).map(([sec, list2]) => (
          <div key={sec} style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 12, color: T.text3, fontWeight: 700, marginBottom: 8 }}>
              {sec} <span style={{ color: T.text4 }}>· {list2.length}</span>
            </div>
            <div style={{ background: '#fff', borderRadius: 12, overflow: 'hidden', border: `1px solid ${T.border}` }}>
              {list2.map((it, i) => (
                <button key={it.name} disabled={completed} onClick={() => onToggleItem(it.name)} style={{
                  width: '100%', display: 'flex', alignItems: 'center', gap: 12,
                  padding: '14px 16px', border: 'none', background: 'none',
                  borderBottom: i < list2.length - 1 ? `1px solid ${T.surfaceSubtle}` : 'none',
                  cursor: completed ? 'default' : 'pointer', textAlign: 'left',
                  opacity: completed ? 0.7 : 1,
                }}>
                  <div style={{
                    width: 22, height: 22, borderRadius: 11,
                    background: it.checked ? T.mint : '#fff',
                    border: `1.5px solid ${it.checked ? T.mint : T.border}`,
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                  }}>{it.checked && Icon.check('#fff')}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{
                      fontSize: 15, fontWeight: 600, color: T.ink,
                      textDecoration: it.checked ? 'line-through' : 'none',
                    }}>{it.name}</div>
                    <div style={{ fontSize: 11, color: T.text3, marginTop: 2 }}>
                      {it.qty} · {(it.fromMeals || []).length}끼에 사용
                    </div>
                  </div>
                </button>
              ))}
            </div>
          </div>
        ))}

        {/* 팬트리 제외 섹션 */}
        {skip.length > 0 && (
          <div style={{ marginTop: 6 }}>
            <div style={{ fontSize: 12, color: T.text3, fontWeight: 700, marginBottom: 8 }}>
              팬트리에 이미 있어 제외 <span style={{ color: T.text4 }}>· {skip.length}</span>
            </div>
            <div style={{
              background: T.mintSoft, borderRadius: 12, padding: '10px 12px',
              display: 'flex', flexWrap: 'wrap', gap: 6,
            }}>
              {skip.map(it => (
                <span key={it.name} style={{
                  fontSize: 12, fontWeight: 600, color: T.mintDeep, background: '#fff',
                  padding: '6px 10px', borderRadius: 9999, display: 'inline-flex', alignItems: 'center', gap: 4,
                }}>{Icon.check(T.mintDeep)} {it.name}</span>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* CTA */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, padding: 16,
        background: '#fff', borderTop: `1px solid ${T.border}`, display: 'flex', gap: 8,
      }}>
        {completed ? (
          <>
            <Button variant="neutral" onClick={() => onReflect(list)}>팬트리에 반영</Button>
            <Button full variant="neutral" onClick={() => onReopen(list.id)}>다시 열기</Button>
          </>
        ) : (
          <Button full disabled={buy.length === 0} onClick={() => onComplete(list.id)}>
            {allDone ? '✓ 장보기 완료' : `완료 (${checkedCount}/${buy.length})`}
          </Button>
        )}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// PantryReflectPicker — null / [] / selected ids 의미 분리
// ─────────────────────────────────────────────────────────────
function PantryReflectPicker({ list, onClose, onConfirm }) {
  // mode: null = 미선택(아직 결정 안 함), [] = 명시적 거절, [ids] = 선택
  const buy = list?.items?.filter(i => !i.have && i.checked) || [];
  const [picked, setPicked] = useState_W(new Set(buy.map(i => i.name)));
  const togglePick = (name) => {
    setPicked(p => {
      const n = new Set(p);
      n.has(name) ? n.delete(name) : n.add(name);
      return n;
    });
  };
  return (
    <div style={overlay} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{
        background: '#fff', borderRadius: '20px 20px 0 0',
        position: 'absolute', bottom: 0, left: 0, right: 0,
        maxHeight: '85%', display: 'flex', flexDirection: 'column',
      }}>
        <div style={{ padding: '18px 20px 12px', borderBottom: `1px solid ${T.border}` }}>
          <div style={{ fontSize: 18, fontWeight: 700, color: T.ink, fontFamily: T.fontBrand }}>

// Phone-shell only: floating button that calls requestFullscreen() on tap.
// Lets users hide Android Chrome's URL bar and nav bar without an HTTPS PWA install.
function FullscreenToggle() {
  const { useState, useEffect } = React;
  const [isFs, setIsFs] = useState(false);
  const [supported, setSupported] = useState(true);
  useEffect(() => {
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
    setSupported(typeof req === 'function');
    const onChange = () =>
      setIsFs(!!(document.fullscreenElement || document.webkitFullscreenElement));
    document.addEventListener('fullscreenchange', onChange);
    document.addEventListener('webkitfullscreenchange', onChange);
    return () => {
      document.removeEventListener('fullscreenchange', onChange);
      document.removeEventListener('webkitfullscreenchange', onChange);
    };
  }, []);
  if (isFs || !supported) return null;
  const enter = () => {
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
    try { req && req.call(el).catch(() => {}); } catch (e) {}
  };
  return (
    <button onClick={enter} aria-label="전체화면"
      style={{
        position: 'fixed',
        bottom: 'calc(78px + env(safe-area-inset-bottom))',
        right: 12, zIndex: 9999,
        width: 44, height: 44, borderRadius: 22,
        background: 'rgba(33,37,41,0.72)', border: 'none', color: '#fff',
        fontSize: 18, cursor: 'pointer',
        boxShadow: '0 4px 12px rgba(0,0,0,0.25)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        WebkitBackdropFilter: 'blur(8px)', backdropFilter: 'blur(8px)',
      }}>⛶</button>
  );
}

        <div style={{ fontSize: 11, color: '#868E96', fontWeight: 700, marginBottom: 8 }}>빠른 플로우</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
          <button onClick={() => { setRoute({ tab: 'home', detail: 'r4' }); }}
            style={quickBtn}>🥩 제육볶음 레시피 보기</button>
          <button onClick={() => { setRoute({ tab: 'home', detail: 'r4' }); setTimeout(() => setPlannerAdd({ recipeId: 'r4' }), 300); }}
            style={quickBtn}>📥 플래너 추가 시트</button>
          <button onClick={() => { setRoute({ tab: 'home', detail: 'r4' }); setTimeout(() => setSaveModal({ recipeId: 'r4' }), 300); }}
            style={quickBtn}>🔖 저장 시트</button>
          <button onClick={() => { setRoute({ tab: 'home' }); setTimeout(() => setSortSheet(true), 200); }}
            style={quickBtn}>⇅ 정렬 시트</button>
          <button onClick={() => setLoginGate(true)}
            style={quickBtn}>🔒 로그인 게이트</button>
        </div>

        <div style={{ fontSize: 11, color: '#868E96', fontWeight: 700, marginTop: 16, marginBottom: 8 }}>Wave 1 바로가기</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
          <button onClick={() => goPage('menu-add')}
            style={quickBtn}>🍳 식사 추가 (MENU_ADD)</button>
          <button onClick={() => {
            const id = shoppingLists[0]?.id;
            if (id) goPage('shopping-detail', { listId: id });
          }} style={quickBtn}>🛒 장보기 상세 (SHOPPING_DETAIL)</button>
          <button onClick={() => goPage('leftovers')}
            style={quickBtn}>🍱 남은 재료 (LEFTOVERS)</button>
          <button onClick={() => goPage('settings')}
            style={quickBtn}>⚙️ 설정 (SETTINGS)</button>
          <button onClick={() => goPage('mypage-recipebook')}
            style={quickBtn}>📖 레시피북 탭 (MYPAGE)</button>
          <button onClick={() => goPage('mypage-shopping')}
            style={quickBtn}>🧾 장보기 목록 탭 (MYPAGE)</button>
          <button onClick={() => goPage('mypage-recipebook-detail', { bookId: 'b_custom1' })}
            style={quickBtn}>📒 레시피북 상세 (DETAIL)</button>
          <button onClick={() => { setRoute({ tab: 'home' }); setTimeout(() => setIngredientFilterOpen(true), 200); }}
            style={quickBtn}>🔎 재료 필터 모달 (INGREDIENT_FILTER)</button>
        </div>

        <div style={{ fontSize: 11, color: '#868E96', fontWeight: 700, marginTop: 16, marginBottom: 8 }}>Wave 1.6 데스크톱</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
          <button onClick={() => goPage('login')}
            style={quickBtn}>🔐 로그인 화면 (LOGIN page)</button>
          <button onClick={() => goPage('cook-list')}
            style={quickBtn}>🥘 요리 준비 리스트 (COOK_READY_LIST)</button>
          <button onClick={() => {
            const k = Object.keys(planner)[1];
            const slot = ['아침','점심','저녁'].find(s => planner[k]?.[s]) || '저녁';
            goPage('meal-detail', { date: k, slot });
          }} style={quickBtn}>🍽️ 끼니 상세 (MEAL_SCREEN)</button>
        </div>

        <div style={{ fontSize: 11, color: '#868E96', fontWeight: 700, marginTop: 16, marginBottom: 8 }}>Wave 1.7 데스크톱 (P1.3)</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
          <button onClick={() => goPage('leftovers')}
            style={quickBtn}>🥡 남은 요리 (LEFTOVERS)</button>
          <button onClick={() => goPage('ate-list')}
            style={quickBtn}>🍽️ 다먹은 기록 (ATE_LIST)</button>
          <button onClick={() => goPage('manual-create')}
            style={quickBtn}>✏️ 직접 등록 (MANUAL_CREATE)</button>
          <button onClick={() => goPage('yt-import')}
            style={quickBtn}>📺 유튜브 가져오기 (YT_IMPORT)</button>
          <button onClick={() => goPage('mypage-recipebook')}
            style={quickBtn}>📚 레시피북 목록 (MYPAGE_RECIPEBOOK)</button>
          <button onClick={() => goPage('mypage-shopping')}
            style={quickBtn}>🧾 장보기 기록 목록 (MYPAGE_SHOPPING)</button>
        </div>

        <div style={{ fontSize: 11, color: '#868E96', fontWeight: 700, marginTop: 16, marginBottom: 8 }}>Wave 1.8 데스크톱 (P2)</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
          <button onClick={() => setPantryAddSheet(true)}
            style={quickBtn}>➕ 재료 추가 dialog (PantryAdd)</button>
          <button onClick={() => setPantryBundlePicker(true)}
            style={quickBtn}>📦 재료 묶음 dialog (PantryBundle)</button>
          <button onClick={() => setReflectPicker(shoppingLists[1] || shoppingLists[0])}
            style={quickBtn}>🔄 팬트리 반영 dialog (PantryReflect)</button>
          <button onClick={() => setBookSelectorOpen(true)}
            style={quickBtn}>📕 레시피북 선택 dialog (BookSelector)</button>
          <button onClick={() => setPantryMatchPickerOpen(true)}
            style={quickBtn}>🧊 팬트리 매칭 dialog (PantryMatch)</button>
          <button onClick={() => setConsumedDialog({ recipe: RECIPES[0] })}
            style={quickBtn}>✓ 차감 재료 dialog (Consumed)</button>
        </div>
      </div>

      {tweaksOn && <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} />}
    </div>
  );
}

// ============ Tweaks panel (extracted) ============
function TweaksPanel({ tweaks, setTweaks }) {
  return (
    <div className="tweaks-panel">
      <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 10, color: '#212529' }}>Tweaks</div>
      <div style={{ marginBottom: 12 }}>
        <div style={{ fontSize: 12, color: '#495057', fontWeight: 600, marginBottom: 6 }}>포인트 컬러</div>
        <div style={{ display: 'flex', gap: 6 }}>
          {[
            ['#2AC1BC', '민트'],
            ['#12B886', '틸'],
            ['#FF6B6B', '토마토'],
            ['#FFB347', '오렌지'],
            ['#343A40', '먹색'],
          ].map(([c, n]) => (
            <button key={c} onClick={() => {
              setTweaks(t => ({ ...t, accentColor: c }));
              window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accentColor: c } }, '*');
            }} style={{
              width: 32, height: 32, borderRadius: 16, background: c,
              border: tweaks.accentColor === c ? '2px solid #212529' : '2px solid transparent',
              cursor: 'pointer',
            }} title={n} />
          ))}
        </div>
      </div>
      <div style={{ marginBottom: 12 }}>
        <label style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 12, color: '#495057', fontWeight: 600 }}>
          <input type="checkbox" checked={tweaks.showBrandFont}
            onChange={e => {
              setTweaks(t => ({ ...t, showBrandFont: e.target.checked }));
              window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { showBrandFont: e.target.checked } }, '*');
            }} />
          브랜드 폰트 (Jua)
        </label>
      </div>
      <div>
        <div style={{ fontSize: 12, color: '#495057', fontWeight: 600, marginBottom: 6 }}>밀도</div>
        <div style={{ display: 'flex', gap: 4 }}>
          {['compact', 'comfortable'].map(d => (
            <button key={d} onClick={() => {
              setTweaks(t => ({ ...t, density: d }));
              window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { density: d } }, '*');
            }} style={{
              flex: 1, padding: '6px 10px', fontSize: 11, borderRadius: 6,
              background: tweaks.density === d ? '#212529' : '#F8F9FA',
              color: tweaks.density === d ? '#fff' : '#495057',
              border: 'none', cursor: 'pointer', fontWeight: 600,
            }}>{d}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

const quickBtn = {
  textAlign: 'left', padding: '8px 10px', fontSize: 12,
  background: '#fff', border: '1px solid #DEE2E6', borderRadius: 6,
  cursor: 'pointer', color: '#495057'
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
