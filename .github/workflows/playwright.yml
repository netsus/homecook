name: QA

on:
  pull_request:
    paths:
      - "app/globals.css"
      - "app/layout.tsx"
      - "app/login/**"
      - "app/page.tsx"
      - "app/planner/**"
      - "app/recipe/**"
      - "components/**"
      - "lib/*.ts"
      - "lib/auth/**"
      - "lib/mock/**"
      - "qa/fixtures/**"
      - "stores/**"
      - "tests/e2e/helpers/**"
      - "tests/e2e/assets/**"
      - "tests/e2e/slice-*.spec.ts"
      - "tests/e2e/qa-a11y.spec.ts"
      - "tests/e2e/qa-visual.spec.ts"
      - "playwright.config.ts"
      - "lighthouserc.js"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/playwright.yml"
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - "app/globals.css"
      - "app/layout.tsx"
      - "app/login/**"
      - "app/page.tsx"
      - "app/planner/**"
      - "app/recipe/**"
      - "components/**"
      - "lib/*.ts"
      - "lib/auth/**"
      - "lib/mock/**"
      - "qa/fixtures/**"
      - "stores/**"
      - "tests/e2e/helpers/**"
      - "tests/e2e/assets/**"
      - "tests/e2e/slice-*.spec.ts"
      - "tests/e2e/qa-a11y.spec.ts"
      - "tests/e2e/qa-visual.spec.ts"
      - "playwright.config.ts"
      - "lighthouserc.js"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/playwright.yml"

permissions:
  contents: read

env:
  NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
  NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run smoke Playwright suite
        run: pnpm test:e2e:smoke

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report
          path: |
            playwright-report
            test-results

  accessibility:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run accessibility smoke suite
        run: pnpm test:e2e:a11y

      - name: Upload accessibility report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-a11y-report
          path: |
            playwright-report
            test-results

  visual:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run visual regression suite
        run: pnpm test:e2e:visual

      - name: Upload visual report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-visual-report
          path: |
            playwright-report
            test-results

  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm build

      - name: Run Lighthouse budget checks
        run: pnpm exec lhci autorun --config=./lighthouserc.js

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci
          include-hidden-files: true
