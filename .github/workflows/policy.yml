name: Policy

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate branch name
        if: github.event_name == 'pull_request'
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: node scripts/check-branch-name.mjs

      - name: Validate commit messages
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: origin/${{ github.base_ref }}
          HEAD_REF: HEAD
        run: node scripts/check-commit-messages.mjs

      - name: Validate workpack docs for feature branches
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
          BASE_REF: ${{ github.base_ref || github.event.repository.default_branch }}
        run: node scripts/check-workpack-docs.mjs

      - name: Validate workflow v2 files
        run: node scripts/validate-workflow-v2.mjs

      - name: Validate OMO bookkeeping invariants
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
          BASE_REF: ${{ github.base_ref || github.event.repository.default_branch }}
        run: node scripts/validate-omo-bookkeeping.mjs

      - name: Validate closeout sync
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
          BASE_REF: ${{ github.base_ref || github.event.repository.default_branch }}
          PR_IS_DRAFT: ${{ github.event.pull_request.draft }}
        run: node scripts/validate-closeout-sync.mjs
