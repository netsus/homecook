name: PR Governance

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened

jobs:
  labeler:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Label pull request
        uses: actions/labeler@v6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  template-check:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate PR body sections
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          printf "%s" "$PR_BODY" > /tmp/pr_body.md
          node scripts/check-pr-body.mjs /tmp/pr_body.md
