name: CI

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "stores/**"
      - "supabase/**"
      - "tests/**"
      - "scripts/**"
      - "types/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "playwright.config.ts"
      - "lighthouserc.js"
      - "tsconfig*.json"
      - "next.config.*"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "stores/**"
      - "supabase/**"
      - "tests/**"
      - "scripts/**"
      - "types/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "playwright.config.ts"
      - "lighthouserc.js"
      - "tsconfig*.json"
      - "next.config.*"
      - ".github/workflows/ci.yml"

jobs:

  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Ingredient nutrition PostgreSQL integration
        run: pnpm test:nutrition-model:postgres

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

  security-function-authorization:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@46f7f98c7f948ad727d22c1e67fab04c223a0520 # v3.0.0
        with:
          version: 2.109.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start fresh local Supabase and replay migrations
        run: supabase start

      - name: Validate fresh live state, recorded environment states, and role matrix
        run: pnpm verify:security-functions
        env:
          SECURITY_FUNCTION_ENVIRONMENT: fresh
