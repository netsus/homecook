name: CI

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "stores/**"
      - "supabase/**"
      - "tests/**"
      - "scripts/**"
      - "types/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "playwright.config.ts"
      - "lighthouserc.js"
      - "tsconfig*.json"
      - "next.config.*"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "stores/**"
      - "supabase/**"
      - "tests/**"
      - "scripts/**"
      - "types/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "playwright.config.ts"
      - "lighthouserc.js"
      - "tsconfig*.json"
      - "next.config.*"
      - ".github/workflows/ci.yml"

jobs:

  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
